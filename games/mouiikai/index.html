<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>もういいかい — 夕暮れのかくれんぼ</title>

<!-- ---------- OGP / メタ ---------- -->
<meta name="description" content="夕暮れの空き地で鬼の視線を盗んで隠れ続けるステルス・かくれんぼ。茂みから茂みへ忍び、石を投げて気をそらし、ベースにタッチしろ。クリアごとに強化を選ぶローグライト。">
<meta property="og:title" content="もういいかい — 夕暮れのかくれんぼ">
<meta property="og:description" content="鬼の視線を盗んで隠れ続けろ。茂みに潜み、石で気をそらし、ベースにタッチ。クリアごとに強化を選ぶ夕暮れのステルス・ローグライト。">
<meta property="og:type" content="website">
<meta property="og:image" content="https://nrtkumi.github.io/games/mouiikai/assets/ogp.jpg">
<meta property="og:url" content="https://nrtkumi.github.io/games/mouiikai/">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yusei+Magic&family=Zen+Maru+Gothic:wght@400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #3a2b22;
    --paper: #f4e7cf;
    --paper-2: #ecd9b7;
    --line: #c8a874;
    --sun: #e8743b;
    --amber: #f0a83c;
    --rose: #d8607a;
    --dusk: #4a3a5e;
    --grass: #6f7f48;
    --danger: #d23a3a;
    --muted: #8c7355;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    background: #1d1622;
    color: var(--ink);
    font-family: "Zen Maru Gothic", sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  /* 縦長カラムに制限して中央寄せ(PCワイド対策) */
  .app {
    position: fixed;
    top: 0; bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: min(100vw, calc(100dvh * 0.66), 480px);
    display: flex;
    flex-direction: column;
    background: #2a2030;
    box-shadow: 0 0 60px rgba(0,0,0,0.55);
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  /* ---------- HUD ---------- */
  .hud {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px 6px;
    background: linear-gradient(180deg,#3a2c46,#2a2030);
    color: var(--paper);
    z-index: 6;
  }
  .stat { font-family: "Space Mono", monospace; font-size: 0.6rem; letter-spacing: .04em; line-height: 1.25; color: #d9c7b0; }
  .stat b { display: block; font-size: 1.0rem; color: #fff; font-weight: 700; }
  .stat.sun b { color: var(--amber); }
  .hud .spacer { flex: 1; }
  .iconbtn {
    width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid #5a4a66;
    background: #38304a; color: #e9dcc6; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center; touch-action: manipulation;
  }
  .iconbtn:active { transform: scale(.94); }

  /* 発見メーター */
  .alertbar {
    height: 6px; background: #1c1626; position: relative; overflow: hidden;
  }
  .alertbar > i {
    position: absolute; left: 0; top: 0; bottom: 0; width: 0%;
    background: linear-gradient(90deg,#f0a83c,#e8743b 55%,#d23a3a);
    transition: width .05s linear;
  }

  /* ---------- canvas ---------- */
  .stage { position: relative; flex: 1; min-height: 0; }
  canvas#game {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: block; touch-action: none;
    background: #2a2030;
  }

  /* 石ボタン */
  .throw {
    position: absolute; right: 14px; bottom: 18px; z-index: 5;
    width: 78px; height: 78px; border-radius: 50%;
    border: 2.5px solid #2a2030;
    background: radial-gradient(circle at 38% 32%, #f0d9a8, #b88a4e 70%, #8a6334);
    box-shadow: 0 5px 0 #5d4326, 0 8px 16px rgba(0,0,0,.4);
    color: #3a2b22; font-family: "Yusei Magic"; font-size: .82rem;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; touch-action: none; line-height: 1.1;
  }
  .throw:active { transform: translateY(3px); box-shadow: 0 2px 0 #5d4326, 0 4px 10px rgba(0,0,0,.4); }
  .throw .big { font-size: 1.4rem; }
  .throw.disabled { filter: grayscale(.7) brightness(.78); }
  .throw small { font-family: "Space Mono"; font-size: .62rem; opacity:.8; }

  /* ---------- overlays ---------- */
  .overlay {
    position: absolute; inset: 0; z-index: 10;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 26px 22px;
    background:
      linear-gradient(180deg, rgba(58,40,70,.30), rgba(40,30,46,.62) 60%, rgba(28,20,30,.85)),
      linear-gradient(180deg, #e9956a 0%, #d8607a 32%, #7a4a6e 64%, #3a3050 100%);
    color: var(--paper);
  }
  .overlay.hidden { display: none; }
  .kv {
    position:absolute; inset:0; background-size: cover; background-position: center;
    opacity:.5; mix-blend-mode: soft-light; pointer-events:none;
  }
  .panel {
    position: relative; z-index: 2; width: 100%; max-width: 340px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  h1.title {
    font-family: "Yusei Magic"; font-weight: 400;
    font-size: 2.7rem; line-height: 1.05; color: #fff5e2;
    text-shadow: 0 2px 0 #b9485f, 0 5px 16px rgba(0,0,0,.5);
    letter-spacing: .02em;
  }
  .sub { font-size: .82rem; color: #ffe9cf; letter-spacing: .06em; }
  .callresp { font-family:"Yusei Magic"; font-size: .98rem; color:#fff3d6; opacity:.92; line-height:1.7; }
  .card {
    background: var(--paper); color: var(--ink);
    border-radius: 14px; padding: 14px 16px; width: 100%;
    box-shadow: 0 6px 0 #b08a52, 0 10px 22px rgba(0,0,0,.35);
    border: 2px solid #fff8ea;
  }
  .card .how { font-size: .78rem; line-height: 1.85; text-align: left; color: #5a4634; }
  .card .how b { color: var(--sun); }
  .btn {
    font-family: "Yusei Magic"; font-size: 1.3rem; color: #fff;
    background: linear-gradient(180deg,#f0a83c,#e8743b);
    border: none; border-radius: 14px; padding: 13px 40px;
    box-shadow: 0 5px 0 #a8421e, 0 8px 16px rgba(0,0,0,.35);
    cursor: pointer; touch-action: manipulation; letter-spacing: .08em;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #a8421e; }
  .best { font-family:"Space Mono"; font-size:.78rem; color:#ffe9cf; }

  /* 強化選択 */
  .ups { display: flex; flex-direction: column; gap: 11px; width: 100%; }
  .up {
    background: var(--paper); color: var(--ink); border-radius: 13px;
    padding: 12px 14px; text-align: left; cursor: pointer;
    box-shadow: 0 5px 0 #b08a52; border: 2px solid #fff8ea;
    display: flex; align-items: center; gap: 12px; touch-action: manipulation;
  }
  .up:active { transform: translateY(3px); box-shadow: 0 2px 0 #b08a52; }
  .up .em { font-size: 1.7rem; flex-shrink: 0; width: 34px; text-align:center; }
  .up .nm { font-family:"Yusei Magic"; font-size: 1.0rem; color: var(--sun); }
  .up .ds { font-size: .72rem; color: #6a553f; line-height: 1.4; margin-top: 2px; }
  .ovh { font-family:"Yusei Magic"; font-size:1.6rem; color:#fff5e2; text-shadow:0 2px 0 #b9485f; }
  .ovh.bad { color:#ffd9d0; text-shadow:0 2px 0 #7a1d12; }

  .toast {
    position:absolute; left:50%; top:14%; transform:translateX(-50%);
    z-index: 8; pointer-events:none;
    font-family:"Yusei Magic"; font-size: 1.5rem; color:#fff;
    text-shadow: 0 2px 8px rgba(0,0,0,.6); opacity:0; transition:opacity .2s;
    white-space:nowrap;
  }
  .toast.show { opacity:1; }
  .hint { font-size:.72rem; color:#ffe9cf; opacity:.85; margin-top:2px; }
</style>
</head>
<body>
<div class="app">
  <div class="hud">
    <div class="stat">ラウンド<b id="hRound">1</b></div>
    <div class="stat sun">スコア<b id="hScore">0</b></div>
    <div class="stat">のこり鬼<b id="hOni">1</b></div>
    <div class="spacer"></div>
    <div class="stat" style="text-align:right">最高<b id="hBest">0</b></div>
    <button class="iconbtn" id="muteBtn" aria-label="音">🔊</button>
  </div>
  <div class="alertbar"><i id="alertFill"></i></div>

  <div class="stage">
    <canvas id="game"></canvas>
    <button class="throw" id="throwBtn">
      <span class="big">🪨</span>
      <small id="throwN">2</small>
    </button>
    <div class="toast" id="toast"></div>

    <!-- タイトル -->
    <div class="overlay" id="ovTitle">
      <div class="kv" id="kvTitle"></div>
      <div class="panel">
        <h1 class="title">もう<br>いいかい</h1>
        <div class="callresp">「もう いいかい?」<br>「まあだ だよ — 」</div>
        <div class="card">
          <div class="how">
            夕暮れの空き地。<b>鬼の視線</b>を盗んで隠れ続け、<b>ベース</b>(光の輪)にタッチしろ。<br>
            ・画面を<b>ドラッグ</b>して移動(大きく弾くほど速いが見つかりやすい)<br>
            ・<b>茂み</b>に入ると姿が消える。止まると見つかりにくい<br>
            ・<b>🪨ボタン</b>で石を投げ、鬼の気をそらす<br>
            ・上の<b>発見メーター</b>が満タンで「みいつけた!」
          </div>
        </div>
        <button class="btn" id="startBtn">あそぶ</button>
        <div class="best">最高記録 ラウンド <span id="bestRound">0</span> / <span id="bestScore">0</span>点</div>
      </div>
    </div>

    <!-- 強化選択 -->
    <div class="overlay hidden" id="ovPick">
      <div class="panel">
        <div class="ovh" id="pickH">みーつけられなかった!</div>
        <div class="sub">ひとつ えらんで つよくなろう</div>
        <div class="ups" id="upList"></div>
      </div>
    </div>

    <!-- ゲームオーバー -->
    <div class="overlay hidden" id="ovOver">
      <div class="kv" id="kvOver"></div>
      <div class="panel">
        <div class="ovh bad">みいつけた。</div>
        <div class="card">
          <div class="how" id="overStat" style="text-align:center"></div>
        </div>
        <button class="btn" id="retryBtn">もういちど</button>
        <div class="best">最高記録 ラウンド <span id="bestRound2">0</span> / <span id="bestScore2">0</span>点</div>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";
(function () {
  /* ====================== 基本セットアップ ====================== */
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const DPR = Math.min(2, window.devicePixelRatio || 1);
  let cssW = 360, cssH = 560;

  const $ = id => document.getElementById(id);
  const hRound = $("hRound"), hScore = $("hScore"), hOni = $("hOni"), hBest = $("hBest");
  const alertFill = $("alertFill"), throwBtn = $("throwBtn"), throwN = $("throwN");
  const toastEl = $("toast");

  function layout() {
    const r = canvas.getBoundingClientRect();
    cssW = Math.max(1, r.width); cssH = Math.max(1, r.height);
    canvas.width = Math.round(cssW * DPR);
    canvas.height = Math.round(cssH * DPR);
  }
  window.addEventListener("resize", layout);

  /* ====================== オーディオ(iOS消音対策込み) ====================== */
  let AC = null, muted = false;
  function audio() {
    if (!AC) {
      try {
        AC = new (window.AudioContext || window.webkitAudioContext)();
        AC.onstatechange = () => { if (AC.state !== "running" && !document.hidden) { try { AC.resume(); } catch (e) {} } };
      } catch (e) {}
    }
    if (AC && AC.state !== "running") { try { AC.resume(); } catch (e) {} }
    return AC;
  }
  let silentEl = null;
  function silentWavUrl() {
    const sr = 8000, n = 800, buf = new ArrayBuffer(44 + n), v = new DataView(buf);
    const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    str(0, "RIFF"); v.setUint32(4, 36 + n, true); str(8, "WAVE");
    str(12, "fmt "); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr, true); v.setUint16(32, 1, true); v.setUint16(34, 8, true);
    str(36, "data"); v.setUint32(40, n, true);
    for (let i = 0; i < n; i++) v.setUint8(44 + i, 0x80);
    return URL.createObjectURL(new Blob([buf], { type: "audio/wav" }));
  }
  function unlockAudio() {
    if (!silentEl) {
      silentEl = document.createElement("audio");
      silentEl.setAttribute("playsinline", "");
      silentEl.loop = true; silentEl.volume = 0.01; silentEl.src = silentWavUrl();
    }
    const p = silentEl.play(); if (p && p.catch) p.catch(() => {});
    audio(); if (!AC) return;
    const done = () => { if (AC.state === "running") ["pointerdown","pointerup","touchend"].forEach(ev => document.removeEventListener(ev, unlockAudio, true)); };
    try { AC.resume().then(done); } catch (e) { done(); }
  }
  ["pointerdown","pointerup","touchend"].forEach(ev => document.addEventListener(ev, unlockAudio, true));
  document.addEventListener("visibilitychange", () => { if (!document.hidden) audio(); });

  function tone(f, d, type, vol, slideTo) {
    if (muted || !audio()) return;
    try {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type || "sine"; o.frequency.value = f;
      if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1, slideTo), AC.currentTime + d);
      g.gain.value = 0.0001; g.gain.exponentialRampToValueAtTime(vol || 0.06, AC.currentTime + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
      o.connect(g); g.connect(AC.destination);
      o.start(); o.stop(AC.currentTime + d + 0.02);
    } catch (e) {}
  }
  function noise(d, vol, lp) {
    if (muted || !audio()) return;
    try {
      const len = Math.floor(AC.sampleRate * d), b = AC.createBuffer(1, len, AC.sampleRate), ch = b.getChannelData(0);
      for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / len);
      const s = AC.createBufferSource(); s.buffer = b;
      const g = AC.createGain(); g.gain.value = vol || 0.05;
      let node = s;
      if (lp) { const f = AC.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = lp; node.connect(f); node = f; }
      node.connect(g); g.connect(AC.destination); s.start();
    } catch (e) {}
  }
  const sfx = {
    step: () => noise(0.05, 0.018, 900),
    run:  () => noise(0.05, 0.03, 1400),
    rustle: () => noise(0.16, 0.05, 2600),
    throwS: () => tone(620, 0.18, "triangle", 0.05, 220),
    land: () => { noise(0.06, 0.05, 1800); tone(300, 0.07, "sine", 0.05); },
    notice: () => { tone(740, 0.12, "triangle", 0.05); setTimeout(()=>tone(980,0.14,"triangle",0.05),90); },
    caught: () => { tone(520, 0.5, "sawtooth", 0.07, 90); noise(0.4, 0.05, 700); },
    pick: () => { tone(660,0.1,"sine",0.05); setTimeout(()=>tone(990,0.14,"sine",0.05),80); },
    chime: () => { // 夕方のチャイム風 4音
      const ns=[784,659,587,440]; ns.forEach((f,i)=>setTimeout(()=>tone(f,0.6,"sine",0.06),i*220));
    },
    safe: () => tone(880,0.08,"sine",0.04),
  };

  /* ====================== ユーティリティ ====================== */
  const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
  const lerp = (a,b,t)=> a+(b-a)*t;
  const dist2 = (ax,ay,bx,by)=>{const dx=ax-bx,dy=ay-by;return dx*dx+dy*dy;};
  function angDiff(a,b){ let d=a-b; while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI; return d; }
  function turnToward(cur,target,maxStep){ const d=angDiff(target,cur); return Math.abs(d)<=maxStep?target:cur+Math.sign(d)*maxStep; }
  // 乱数(シード付き)
  let _seed = 12345;
  function srand(){ _seed = (_seed*1664525 + 1013904223) >>> 0; return _seed/4294967296; }
  const rr=(a,b)=> a + srand()*(b-a);
  const ri=(a,b)=> Math.floor(rr(a,b+1));

  // 線分とAABBの交差(LOS判定用)
  function segRect(x1,y1,x2,y2, rx,ry,rw,rh){
    // 端点が中ならtrue
    if((x1>=rx&&x1<=rx+rw&&y1>=ry&&y1<=ry+rh)||(x2>=rx&&x2<=rx+rw&&y2>=ry&&y2<=ry+rh)) return true;
    return segSeg(x1,y1,x2,y2,rx,ry,rx+rw,ry)||segSeg(x1,y1,x2,y2,rx+rw,ry,rx+rw,ry+rh)||
           segSeg(x1,y1,x2,y2,rx+rw,ry+rh,rx,ry+rh)||segSeg(x1,y1,x2,y2,rx,ry+rh,rx,ry);
  }
  function segSeg(ax,ay,bx,by,cx,cy,dx,dy){
    const d=(bx-ax)*(dy-cy)-(by-ay)*(dx-cx); if(Math.abs(d)<1e-9) return false;
    const t=((cx-ax)*(dy-cy)-(cy-ay)*(dx-cx))/d;
    const u=((cx-ax)*(by-ay)-(cy-ay)*(bx-ax))/d;
    return t>=0&&t<=1&&u>=0&&u<=1;
  }

  /* ====================== ゲーム状態(宣言時に全初期化) ====================== */
  const G = {
    scene: "title",          // title | play | pick | over
    round: 1, score: 0, runTime: 0,
    best: { round: 0, score: 0 },
    lotW: 560, lotH: 760,
    walls: [], bushes: [], oni: [], pebbles: [], parts: [],
    base: { x: 280, y: 90, r: 30, pulse: 0 },
    player: { x: 280, y: 700, r: 13, vx: 0, vy: 0, face: -Math.PI/2, hidden: 0, moving: 0, running: 0 },
    alert: 0,                // 0..1 表示メーター
    pebbleN: 2, pebbleMax: 2, pebbleCd: 0,
    // 強化由来パラメータ
    runSpeed: 168, noiseMul: 1, throwDist: 200, distractR: 140,
    bravery: 1, seeThrough: 0, freezeBonus: 0, lives: 0, telegraph: 0,
    flash: 0, shake: 0, t: 0,
  };

  // 描画スケール(ロットを画面にフィット)
  let scale = 1, offX = 0, offY = 0;
  function recomputeFit() {
    scale = Math.min(cssW / G.lotW, cssH / G.lotH);
    offX = (cssW - G.lotW * scale) / 2;
    offY = (cssH - G.lotH * scale) / 2;
  }
  function screenToWorld(sx,sy){ return { x:(sx-offX)/scale, y:(sy-offY)/scale }; }

  /* ====================== マップ生成 ====================== */
  function rectsOverlap(a,b,pad){ return a.x < b.x+b.w+pad && a.x+a.w+pad > b.x && a.y < b.y+b.h+pad && a.y+a.h+pad > b.y; }
  function inAnyWall(x,y,pad){ for(const w of G.walls){ if(x>=w.x-pad&&x<=w.x+w.w+pad&&y>=w.y-pad&&y<=w.y+w.h+pad) return true; } return false; }

  function pathExists(sx,sy,tx,ty){
    const cs=22, cols=Math.ceil(G.lotW/cs), rows=Math.ceil(G.lotH/cs);
    const solid=new Uint8Array(cols*rows);
    for(let j=0;j<rows;j++)for(let i=0;i<cols;i++){
      const x=i*cs+cs/2, y=j*cs+cs/2;
      if(inAnyWall(x,y,G.player.r+2)||x<G.player.r||y<G.player.r||x>G.lotW-G.player.r||y>G.lotH-G.player.r) solid[j*cols+i]=1;
    }
    const si=clamp(Math.floor(sx/cs),0,cols-1), sj=clamp(Math.floor(sy/cs),0,rows-1);
    const ti=clamp(Math.floor(tx/cs),0,cols-1), tj=clamp(Math.floor(ty/cs),0,rows-1);
    if(solid[sj*cols+si]||solid[tj*cols+ti]) return false;
    const q=[si+sj*cols], seen=new Uint8Array(cols*rows); seen[si+sj*cols]=1;
    const dirs=[1,-1,cols,-cols];
    while(q.length){
      const c=q.shift(); const ci=c%cols, cj=(c-ci)/cols;
      if(ci===ti&&cj===tj) return true;
      for(const d of dirs){
        const ni=ci+(d===1?1:d===-1?-1:0), nj=cj+(d===cols?1:d===-cols?-1:0);
        if(ni<0||nj<0||ni>=cols||nj>=rows) continue;
        const nc=nj*cols+ni; if(seen[nc]||solid[nc]) continue; seen[nc]=1; q.push(nc);
      }
    }
    return false;
  }

  function buildRound() {
    const r = G.round;
    G.lotW = Math.min(680, 500 + r*14);
    G.lotH = Math.min(1180, 880 + r*26);
    const oniCount = Math.min(5, 1 + Math.floor(r/2));
    const coneR = 168 + r*6;
    const coneHalf = (30 + Math.min(14, r*1.4)) * Math.PI/180;
    const oniSpeed = 78 + r*4;

    let ok = false, tries = 0;
    while (!ok && tries < 60) {
      tries++;
      G.walls = []; G.bushes = []; G.oni = []; G.pebbles = []; G.parts = [];
      const margin = 40;
      // プレイヤー開始(下) / ベース(上)
      G.player.x = G.lotW/2 + rr(-60,60); G.player.y = G.lotH - 70;
      G.player.vx = 0; G.player.vy = 0; G.player.face = -Math.PI/2; G.player.hidden = 0;
      G.base.x = clamp(G.lotW/2 + rr(-G.lotW*0.32, G.lotW*0.32), 70, G.lotW-70);
      G.base.y = 80 + rr(0, 40); G.base.r = 30; G.base.pulse = 0;

      // 塀・物置(LOS&移動を遮る)
      const wallN = 3 + Math.floor(r/2) + ri(0,2);
      let wtry = 0;
      while (G.walls.length < Math.min(9, wallN) && wtry < 120) {
        wtry++;
        const w = ri(60,150), h = ri(34,64), horiz = srand()<0.5;
        const ww = horiz? Math.max(w,h):Math.min(w,h), hh = horiz? Math.min(w,h):Math.max(w,h);
        const rect = { x: rr(margin, G.lotW-margin-ww), y: rr(150, G.lotH-200-hh), w: ww, h: hh, kind: srand()<0.5?"shed":"fence" };
        // 開始・ベース付近は避ける
        if (dist2(rect.x+ww/2,rect.y+hh/2, G.player.x,G.player.y) < 130*130) continue;
        if (dist2(rect.x+ww/2,rect.y+hh/2, G.base.x,G.base.y) < 120*120) continue;
        let bad=false; for(const o of G.walls){ if(rectsOverlap(rect,o,26)){bad=true;break;} }
        if(!bad) G.walls.push(rect);
      }

      // 茂み(潜伏)
      const bushN = 5 + Math.floor(r*0.6) + ri(0,2);
      let btry=0;
      while (G.bushes.length < Math.min(11, bushN) && btry < 160) {
        btry++;
        const bx=rr(46,G.lotW-46), by=rr(120,G.lotH-90), br=ri(26,38);
        if (inAnyWall(bx,by, br+8)) continue;
        if (dist2(bx,by,G.player.x,G.player.y) < 70*70) continue;
        let bad=false; for(const o of G.bushes){ if(dist2(bx,by,o.x,o.y) < (br+o.r+8)**2){bad=true;break;} }
        if(!bad) G.bushes.push({x:bx,y:by,r:br});
      }

      // 鬼(巡回ルート)
      for (let k=0;k<oniCount;k++){
        const wp=[]; const cx=rr(G.lotW*0.25,G.lotW*0.75), cy=rr(G.lotH*0.3,G.lotH*0.7);
        const pts=ri(3,4), rad=rr(110,190);
        for(let p=0;p<pts;p++){
          const a=p/pts*Math.PI*2 + rr(-0.4,0.4);
          let px=clamp(cx+Math.cos(a)*rad*rr(0.6,1.1),46,G.lotW-46);
          let py=clamp(cy+Math.sin(a)*rad*rr(0.6,1.1),120,G.lotH-90);
          // 壁の中ならずらす
          let g=0; while(inAnyWall(px,py,20)&&g<8){ px=clamp(px+rr(-40,40),46,G.lotW-46); py=clamp(py+rr(-40,40),120,G.lotH-90); g++; }
          wp.push({x:px,y:py});
        }
        const o0=wp[0];
        // 開始位置がプレイヤーに近すぎ/視界内ならやり直しの種
        G.oni.push({
          x:o0.x, y:o0.y, wp, wi:1, face:Math.atan2(wp[1].y-o0.y, wp[1].x-o0.x),
          speed: oniSpeed*rr(0.92,1.08), coneR, coneHalf, susp:0, mark:0,
          distract:null, see:false, lastSeen:null,
        });
      }
      // 検証: 開始→ベースの経路 & 鬼がプレイヤー初期位置を即見ない
      ok = pathExists(G.player.x,G.player.y, G.base.x,G.base.y) && pathExists(G.player.x,G.player.y, G.oni[0].x,G.oni[0].y);
      if (ok) {
        for(const o of G.oni){ if(dist2(o.x,o.y,G.player.x,G.player.y) < 170*170){ ok=false; break; } }
      }
    }
    G.alert = 0; G.runTime = 0; G.pebbleN = G.pebbleMax; G.pebbleCd = 0;
    recomputeFit();
    hOni.textContent = G.oni.length;
  }

  /* ====================== 当たり判定・移動 ====================== */
  function resolveWalls(p){
    for(const w of G.walls){
      const cx=clamp(p.x,w.x,w.x+w.w), cy=clamp(p.y,w.y,w.y+w.h);
      const dx=p.x-cx, dy=p.y-cy, d=Math.hypot(dx,dy);
      if(d<p.r){
        if(d>0.001){ p.x=cx+dx/d*p.r; p.y=cy+dy/d*p.r; }
        else {
          // 中心が矩形内: 最短の辺へ押し出す
          const L=p.x-w.x, R=w.x+w.w-p.x, T=p.y-w.y, B=w.y+w.h-p.y;
          const m=Math.min(L,R,T,B);
          if(m===L)p.x=w.x-p.r; else if(m===R)p.x=w.x+w.w+p.r; else if(m===T)p.y=w.y-p.r; else p.y=w.y+w.h+p.r;
        }
      }
    }
    p.x=clamp(p.x,p.r,G.lotW-p.r); p.y=clamp(p.y,p.r,G.lotH-p.r);
  }

  function losClear(ax,ay,bx,by){
    for(const w of G.walls){ if(segRect(ax,ay,bx,by,w.x,w.y,w.w,w.h)) return false; }
    return true;
  }
  function inCone(o,px,py){
    const dx=px-o.x, dy=py-o.y, d=Math.hypot(dx,dy);
    if(d>o.coneR) return false;
    const a=Math.atan2(dy,dx);
    return Math.abs(angDiff(a,o.face)) <= o.coneHalf;
  }

  /* ====================== 入力 ====================== */
  const stick = { active:false, id:null, ox:0, oy:0, x:0, y:0, dx:0, dy:0, mag:0 };
  const MAXR = 64, DEAD = 9;
  function onDown(e){
    if (G.scene!=="play") return;
    const t = e.touches? e.touches[0] : e;
    stick.active=true; stick.id = e.pointerId!=null?e.pointerId:0;
    stick.ox=stick.x=t.clientX - canvas.getBoundingClientRect().left;
    stick.oy=stick.y=t.clientY - canvas.getBoundingClientRect().top;
    stick.dx=0; stick.dy=0; stick.mag=0;
  }
  function onMove(e){
    if(!stick.active||G.scene!=="play") return;
    const t = e.touches? e.touches[0] : e;
    const r=canvas.getBoundingClientRect();
    stick.x=t.clientX-r.left; stick.y=t.clientY-r.top;
    let dx=stick.x-stick.ox, dy=stick.y-stick.oy, len=Math.hypot(dx,dy);
    if(len>MAXR){ dx=dx/len*MAXR; dy=dy/len*MAXR; len=MAXR; }
    stick.dx=dx; stick.dy=dy; stick.mag=len;
  }
  function onUp(e){ stick.active=false; stick.mag=0; stick.dx=0; stick.dy=0; }
  canvas.addEventListener("pointerdown", e=>{ e.preventDefault(); onDown(e); canvas.setPointerCapture&&canvas.setPointerCapture(e.pointerId); }, {passive:false});
  canvas.addEventListener("pointermove", e=>{ onMove(e); }, {passive:false});
  canvas.addEventListener("pointerup", onUp);
  canvas.addEventListener("pointercancel", onUp);

  // キーボード(PC)
  const keys = {};
  window.addEventListener("keydown", e=>{
    keys[e.key.toLowerCase()]=true;
    if(e.key===" "||e.code==="Space"){ e.preventDefault(); if(G.scene==="play") doThrow(); else if(G.scene==="title") startGame(); }
  });
  window.addEventListener("keyup", e=>{ keys[e.key.toLowerCase()]=false; });
  function keyVec(){
    let dx=0,dy=0;
    if(keys["arrowleft"]||keys["a"])dx-=1; if(keys["arrowright"]||keys["d"])dx+=1;
    if(keys["arrowup"]||keys["w"])dy-=1; if(keys["arrowdown"]||keys["s"])dy+=1;
    const m=Math.hypot(dx,dy); if(m>0){dx/=m;dy/=m;}
    const slow = keys["shift"]?0.5:1;
    return {dx,dy,frac:m?slow:0};
  }

  // ダブルタップズーム防止
  let lastTouch=0;
  document.addEventListener("touchend", e=>{ const n=Date.now(); if(n-lastTouch<=350 && e.cancelable){ e.preventDefault(); } lastTouch=n; }, {passive:false});
  document.addEventListener("dblclick", e=>e.preventDefault());
  document.addEventListener("gesturestart", e=>e.preventDefault());

  // 石を投げる
  function bindPress(el, fn){
    el.addEventListener("pointerdown", e=>{ e.preventDefault(); fn(); }, {passive:false});
  }
  bindPress(throwBtn, ()=>{ if(G.scene==="play") doThrow(); });
  function doThrow(){
    if(G.pebbleN<=0) return;
    G.pebbleN--; sfx.throwS();
    const a=G.player.face;
    const tx=clamp(G.player.x+Math.cos(a)*G.throwDist, 20, G.lotW-20);
    const ty=clamp(G.player.y+Math.sin(a)*G.throwDist, 20, G.lotH-20);
    G.pebbles.push({ x:G.player.x, y:G.player.y, tx, ty, t:0, dur:0.42, landed:false });
  }

  /* ====================== 強化 ====================== */
  const ALL_UPS = [
    { id:"speed", em:"👟", nm:"俊足", ds:"移動が速くなる", apply:()=>{ G.runSpeed+=26; } },
    { id:"quiet", em:"🤫", nm:"忍び足", ds:"動いても見つかりにくい", apply:()=>{ G.noiseMul*=0.78; } },
    { id:"far",   em:"🎯", nm:"遠投", ds:"石が遠くまで届く", apply:()=>{ G.throwDist+=70; G.distractR+=26; } },
    { id:"stone", em:"🪨", nm:"石拾い", ds:"石の所持数+1・補充が速い", apply:()=>{ G.pebbleMax++; G.pebbleN++; } },
    { id:"brave", em:"😤", nm:"度胸", ds:"発見メーターの上昇が遅い", apply:()=>{ G.bravery*=1.32; } },
    { id:"calm",  em:"🍃", nm:"息ひそめ", ds:"立ち止まると格段に見つかりにくい", apply:()=>{ G.freezeBonus=1; } },
    { id:"eye",   em:"👁️", nm:"心の目", ds:"鬼の視線が壁ごしでも見える", apply:()=>{ G.seeThrough=1; } },
    { id:"luck",  em:"🧧", nm:"お守り", ds:"一度だけ捕まりを防ぐ", apply:()=>{ G.lives++; } },
    { id:"ear",   em:"👂", nm:"早耳", ds:"鬼がこちらを向く前に予兆が出る", apply:()=>{ G.telegraph=1; } },
  ];
  function pickUpgrades(){
    const pool = ALL_UPS.filter(u=> !(u.id==="calm"&&G.freezeBonus) && !(u.id==="eye"&&G.seeThrough) && !(u.id==="ear"&&G.telegraph) );
    const shuf = pool.slice();
    for(let i=shuf.length-1;i>0;i--){ const j=Math.floor(srand()*(i+1)); [shuf[i],shuf[j]]=[shuf[j],shuf[i]]; }
    return shuf.slice(0,3);
  }

  /* ====================== 更新 ====================== */
  function update(dt){
    G.t += dt; G.runTime += dt; G.base.pulse += dt;
    if(G.flash>0) G.flash=Math.max(0,G.flash-dt*2.4);
    if(G.shake>0) G.shake=Math.max(0,G.shake-dt*3);
    for(let i=G.parts.length-1;i>=0;i--){ const p=G.parts[i]; p.t+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.92; p.vy*=0.92; if(p.t>=p.life) G.parts.splice(i,1); }

    if(G.scene!=="play") return;

    // ---- プレイヤー移動 ----
    const p=G.player;
    let dx=0,dy=0,frac=0;
    if(stick.active && stick.mag>DEAD){
      const len=stick.mag; dx=stick.dx/len; dy=stick.dy/len;
      frac=clamp((stick.mag-DEAD)/(MAXR-DEAD),0,1);
    } else {
      const k=keyVec(); if(k.frac>0){ dx=k.dx; dy=k.dy; frac=k.frac; }
    }
    let spd=frac*G.runSpeed;
    if(p.hidden>0) spd*=0.72;                      // 茂みの中は少し動きにくい(でも移動はできる)
    p.running = frac>0.62 && spd>1 ? 1:0;
    p.moving = spd>1?1:0;
    if(spd>1){ p.x+=dx*spd*dt; p.y+=dy*spd*dt; p.face=Math.atan2(dy,dx); }
    resolveWalls(p);

    // 茂み判定
    let inBush=false;
    for(const b of G.bushes){ if(dist2(p.x,p.y,b.x,b.y) < (b.r*0.92)**2){ inBush=true; break; } }
    const prevHidden=p.hidden;
    p.hidden = inBush?1:0;
    if(p.hidden && !prevHidden) sfx.rustle();

    // 足音パーティクル&SE
    if(p.moving && !p.hidden){
      if(Math.floor(G.t*7)!==Math.floor((G.t-dt)*7)){ p.running?sfx.run():sfx.step(); }
      if(srand()<0.4) G.parts.push({x:p.x+rr(-6,6),y:p.y+10,vx:rr(-12,12),vy:rr(-4,-14),t:0,life:0.4,kind:"dust"});
    }

    // 石の補充
    if(G.pebbleN<G.pebbleMax){ G.pebbleCd+=dt; const need = G.pebbleMax> (G.pebbleN+1)?5: (6 - (G.pebbleMax>2?1.5:0)); if(G.pebbleCd>=need){ G.pebbleCd=0; G.pebbleN++; } }

    // ---- 石 ----
    for(let i=G.pebbles.length-1;i>=0;i--){
      const pb=G.pebbles[i]; pb.t+=dt;
      if(!pb.landed){
        const u=clamp(pb.t/pb.dur,0,1);
        pb.x=lerp(pb.cx0!=null?pb.cx0:(pb.cx0=pb.x), pb.tx, u);
        pb.y=lerp(pb.cy0!=null?pb.cy0:(pb.cy0=pb.y), pb.ty, u);
        if(u>=1){ pb.landed=true; pb.ring=0; sfx.land();
          for(let q=0;q<8;q++) G.parts.push({x:pb.tx,y:pb.ty,vx:rr(-40,40),vy:rr(-40,40),t:0,life:0.5,kind:"dust"});
          // 近くの鬼の気をそらす
          for(const o of G.oni){ if(dist2(o.x,o.y,pb.tx,pb.ty) < G.distractR*G.distractR && o.susp<0.55){ o.distract={x:pb.tx,y:pb.ty,t:2.6}; } }
        }
      } else {
        pb.ring+=dt; if(pb.ring>0.6) G.pebbles.splice(i,1);
      }
    }

    // ---- 鬼 ----
    let maxSusp=0; let caughtBy=null;
    for(const o of G.oni){
      // 視認
      const sees = !p.hidden && inCone(o,p.x,p.y) && losClear(o.x,o.y,p.x,p.y);
      o.see=sees;
      const od=Math.hypot(p.x-o.x,p.y-o.y);
      if(sees){
        const prox = 0.4 + 0.6*(1 - clamp(od/o.coneR,0,1));
        const motion = p.running?1.55 : (p.moving?1.0 : 0.6*(G.freezeBonus?0.45:1));
        const rate = 1.12 * prox * motion * (1 + (G.round-1)*0.05) / G.bravery;
        o.susp = clamp(o.susp + rate*dt, 0, 1);
        o.lastSeen={x:p.x,y:p.y};
        o.distract=null;
        if(o.susp<0.6 && o.markPlayed!==1){ if(o.susp>0.12){ sfx.notice(); o.markPlayed=1; } }
      } else {
        o.susp = clamp(o.susp - 0.95*dt, 0, 1);
        if(o.susp<0.1) o.markPlayed=0;
      }
      o.mark = o.susp;
      if(o.susp>=1){ caughtBy=o; }
      maxSusp=Math.max(maxSusp,o.susp);

      // 行動
      if(o.distract && o.distract.t>0 && o.susp<0.5){
        o.distract.t-=dt;
        const ta=Math.atan2(o.distract.y-o.y, o.distract.x-o.x);
        o.face=turnToward(o.face, ta, 4*dt);
        const dd=Math.hypot(o.distract.x-o.x,o.distract.y-o.y);
        if(dd>14){ o.x+=Math.cos(o.face)*o.speed*0.8*dt; o.y+=Math.sin(o.face)*o.speed*0.8*dt; }
        if(o.distract.t<=0) o.distract=null;
      } else if(o.susp>0.06 && o.lastSeen){
        // 警戒: プレイヤー(最後に見た位置)を向く・詰める
        const ta=Math.atan2(o.lastSeen.y-o.y, o.lastSeen.x-o.x);
        o.face=turnToward(o.face, ta, 5.5*dt);
        if(o.susp>0.4){ o.x+=Math.cos(o.face)*o.speed*0.55*dt; o.y+=Math.sin(o.face)*o.speed*0.55*dt; }
      } else {
        // 巡回
        const w=o.wp[o.wi]; const a=Math.atan2(w.y-o.y, w.x-o.x);
        o.face=turnToward(o.face, a, 3.2*dt);
        o.x+=Math.cos(o.face)*o.speed*dt; o.y+=Math.sin(o.face)*o.speed*dt;
        if(dist2(o.x,o.y,w.x,w.y) < 18*18){ o.wi=(o.wi+1)%o.wp.length; }
      }
      resolveWalls(o);
    }

    // 発見メーター(表示は滑らかに)
    G.alert = lerp(G.alert, maxSusp, 0.4);
    alertFill.style.width = (Math.max(maxSusp,G.alert)*100).toFixed(1)+"%";

    // 捕まり
    if(caughtBy){
      if(G.lives>0){ G.lives--; caughtBy.susp=0; for(const o of G.oni){o.susp*=0.2; o.distract=null;} G.flash=1; G.shake=1; sfx.notice(); showToast("お守りが身代わりに!"); }
      else { gameOver(caughtBy); return; }
    }

    // ベース到達 = ラウンドクリア
    if(dist2(p.x,p.y,G.base.x,G.base.y) < (G.base.r+p.r)**2){ roundClear(); return; }
  }

  let toastTimer=0;
  function showToast(txt){ toastEl.textContent=txt; toastEl.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1400); }

  /* ====================== 描画 ====================== */
  function draw(){
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.clearRect(0,0,cssW,cssH);

    // 画面外背景(夕空)
    const bg=ctx.createLinearGradient(0,0,0,cssH);
    bg.addColorStop(0,"#f2b06a"); bg.addColorStop(0.32,"#e88a64"); bg.addColorStop(0.6,"#b56a78"); bg.addColorStop(1,"#4a3a52");
    ctx.fillStyle=bg; ctx.fillRect(0,0,cssW,cssH);
    // 夕日(上のレターボックス帯に映える)
    const sunY = Math.max(offY*0.55, 26);
    const sg=ctx.createRadialGradient(cssW*0.5,sunY,2, cssW*0.5,sunY, Math.max(40,offY*1.1));
    sg.addColorStop(0,"rgba(255,244,206,0.95)"); sg.addColorStop(0.4,"rgba(255,196,120,0.7)"); sg.addColorStop(1,"rgba(255,180,110,0)");
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(cssW*0.5,sunY,Math.max(40,offY*1.1),0,7); ctx.fill();
    ctx.fillStyle="rgba(255,238,190,0.9)"; ctx.beginPath(); ctx.arc(cssW*0.5,sunY,Math.min(26,Math.max(12,offY*0.3)),0,7); ctx.fill();

    let shX=0, shY=0;
    if(G.shake>0){ shX=(srand()-0.5)*10*G.shake; shY=(srand()-0.5)*10*G.shake; }
    ctx.save();
    ctx.translate(offX+shX, offY+shY); ctx.scale(scale,scale);

    drawGround();
    // 壁の影(夕方の長い影 = 右下方向)
    const SH=18;
    for(const w of G.walls){ ctx.fillStyle="rgba(40,30,60,0.32)"; ctx.fillRect(w.x+SH*0.5,w.y+SH,w.w,w.h); }
    // 茂み
    for(const b of G.bushes) drawBush(b);
    // ベース
    drawBase();
    // 視線コーン
    for(const o of G.oni) drawCone(o);
    // 壁本体
    for(const w of G.walls) drawWall(w);
    // 鬼
    for(const o of G.oni) drawOni(o);
    // 石
    for(const pb of G.pebbles) drawPebble(pb);
    // プレイヤー
    drawPlayer();
    // パーティクル
    for(const p of G.parts) drawPart(p);

    // 暗くする(高ラウンド)
    if(G.round>=6){
      const darkA=Math.min(0.5,(G.round-6)*0.07+0.12);
      ctx.fillStyle="rgba(20,14,30,"+darkA+")"; ctx.fillRect(0,0,G.lotW,G.lotH);
    }
    ctx.restore();

    // ジョイスティック
    if(stick.active && G.scene==="play"){
      ctx.setTransform(DPR,0,0,DPR,0,0);
      ctx.globalAlpha=0.5;
      ctx.beginPath(); ctx.arc(stick.ox,stick.oy,MAXR,0,7); ctx.lineWidth=3; ctx.strokeStyle="#fff5e2"; ctx.stroke();
      ctx.beginPath(); ctx.arc(stick.ox+stick.dx,stick.oy+stick.dy,22,0,7); ctx.fillStyle="#f0a83c"; ctx.fill();
      ctx.globalAlpha=1;
    }

    if(G.flash>0){ ctx.setTransform(DPR,0,0,DPR,0,0); ctx.fillStyle="rgba(255,80,60,"+(G.flash*0.5)+")"; ctx.fillRect(0,0,cssW,cssH); }
  }

  function drawGround(){
    const g=ctx.createRadialGradient(G.lotW*0.5,G.lotH*0.32,60, G.lotW*0.5,G.lotH*0.5,G.lotH*0.8);
    g.addColorStop(0,"#d9ab6e"); g.addColorStop(0.6,"#c0915a"); g.addColorStop(1,"#9a7144");
    ctx.fillStyle=g; ctx.fillRect(0,0,G.lotW,G.lotH);
    // 砂目テクスチャ
    ctx.globalAlpha=0.06;
    for(let i=0;i<60;i++){ const x=(i*97.13)%G.lotW, y=(i*53.7*2.1)%G.lotH; ctx.fillStyle= i%2?"#5a3f22":"#fff2d0"; ctx.fillRect(x,y,3,3); }
    ctx.globalAlpha=1;
    // 外枠(塀)
    ctx.strokeStyle="#7a5a36"; ctx.lineWidth=8; ctx.strokeRect(4,4,G.lotW-8,G.lotH-8);
  }

  function drawBush(b){
    ctx.save();
    const hiding = G.player.hidden && dist2(G.player.x,G.player.y,b.x,b.y)<(b.r*0.92)**2;
    // 影
    ctx.fillStyle="rgba(40,30,60,0.28)"; ctx.beginPath(); ctx.ellipse(b.x+8,b.y+10,b.r,b.r*0.7,0,0,7); ctx.fill();
    const lobes=6;
    for(let i=0;i<lobes;i++){
      const a=i/lobes*Math.PI*2; const lx=b.x+Math.cos(a)*b.r*0.5, ly=b.y+Math.sin(a)*b.r*0.5;
      ctx.fillStyle= i%2?"#6f8043":"#5d6e36"; ctx.beginPath(); ctx.arc(lx,ly,b.r*0.52,0,7); ctx.fill();
    }
    ctx.fillStyle="#7c8d4c"; ctx.beginPath(); ctx.arc(b.x,b.y-2,b.r*0.5,0,7); ctx.fill();
    if(hiding){ ctx.strokeStyle="rgba(255,230,160,0.8)"; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(b.x,b.y,b.r+3,0,7); ctx.stroke(); }
    ctx.restore();
  }

  function drawWall(w){
    ctx.save();
    if(w.kind==="fence"){
      ctx.fillStyle="#9a6a3c"; ctx.fillRect(w.x,w.y,w.w,w.h);
      ctx.fillStyle="#7a5430"; for(let x=w.x;x<w.x+w.w-4;x+=12) ctx.fillRect(x+2,w.y,2,w.h);
      ctx.strokeStyle="#5d3f22"; ctx.lineWidth=2; ctx.strokeRect(w.x,w.y,w.w,w.h);
    } else {
      ctx.fillStyle="#8a5a3c"; ctx.fillRect(w.x,w.y,w.w,w.h);
      ctx.fillStyle="#a06b44"; ctx.fillRect(w.x,w.y,w.w,Math.min(10,w.h*0.4)); // 上面の光
      ctx.strokeStyle="#5d3f22"; ctx.lineWidth=2.5; ctx.strokeRect(w.x,w.y,w.w,w.h);
    }
    ctx.restore();
  }

  function drawBase(){
    const b=G.base; const pulse=(Math.sin(b.pulse*3)*0.5+0.5);
    ctx.save();
    // 光の輪
    const g=ctx.createRadialGradient(b.x,b.y,4,b.x,b.y,b.r+18+pulse*8);
    g.addColorStop(0,"rgba(255,225,140,0.85)"); g.addColorStop(0.5,"rgba(240,168,60,0.4)"); g.addColorStop(1,"rgba(240,168,60,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(b.x,b.y,b.r+18+pulse*8,0,7); ctx.fill();
    // 電柱
    ctx.fillStyle="rgba(40,30,60,0.3)"; ctx.fillRect(b.x-6+10,b.y-4+8,12,30);
    ctx.fillStyle="#8c8c92"; ctx.fillRect(b.x-6,b.y-30,12,52);
    ctx.fillStyle="#6f6f76"; ctx.fillRect(b.x-6,b.y-30,4,52);
    ctx.fillStyle="#3a3a40"; ctx.fillRect(b.x-16,b.y-26,32,5);
    // ベースの輪
    ctx.strokeStyle="rgba(255,235,170,"+(0.6+pulse*0.4)+")"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(b.x,b.y+8,b.r,0,7); ctx.stroke();
    ctx.fillStyle="#fff3d6"; ctx.font="bold 13px 'Yusei Magic'"; ctx.textAlign="center"; ctx.fillText("ベース",b.x,b.y+12);
    ctx.restore();
  }

  function drawCone(o){
    const intensity=o.susp;
    ctx.save();
    const r=o.coneR;
    const grd=ctx.createRadialGradient(o.x,o.y,8,o.x,o.y,r);
    let c0,c1,edge;
    if(intensity>0.6){ c0="rgba(255,86,64,0.62)"; c1="rgba(255,60,40,0.12)"; edge="rgba(255,80,60,0.95)"; }
    else if(intensity>0.12){ c0="rgba(255,150,82,0.52)"; c1="rgba(255,140,70,0.10)"; edge="rgba(255,160,90,0.85)"; }
    else { c0="rgba(255,226,150,0.46)"; c1="rgba(255,220,150,0.08)"; edge="rgba(255,230,160,0.7)"; }
    grd.addColorStop(0,c0); grd.addColorStop(0.7,c0); grd.addColorStop(1,c1);
    ctx.beginPath(); ctx.moveTo(o.x,o.y);
    ctx.arc(o.x,o.y,r,o.face-o.coneHalf,o.face+o.coneHalf); ctx.closePath();
    ctx.fillStyle=grd; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=edge; ctx.stroke();
    ctx.restore();
  }

  function drawOni(o){
    ctx.save();
    // 影
    ctx.fillStyle="rgba(40,30,60,0.32)"; ctx.beginPath(); ctx.ellipse(o.x+8,o.y+12,13,8,0,0,7); ctx.fill();
    // 体
    ctx.fillStyle="#c64b3a"; ctx.beginPath(); ctx.arc(o.x,o.y,12,0,7); ctx.fill();
    ctx.fillStyle="#e2654f"; ctx.beginPath(); ctx.arc(o.x-3,o.y-3,5,0,7); ctx.fill();
    // 頭(向き)
    ctx.fillStyle="#f0d3b0"; ctx.beginPath(); ctx.arc(o.x+Math.cos(o.face)*5,o.y+Math.sin(o.face)*5,7,0,7); ctx.fill();
    // 目
    const ex=o.x+Math.cos(o.face)*9, ey=o.y+Math.sin(o.face)*9;
    ctx.fillStyle="#2a2030"; ctx.beginPath(); ctx.arc(ex,ey,2.2,0,7); ctx.fill();
    // マーク
    if(o.susp>0.06){
      const m = o.susp>=0.6?"!":"?";
      ctx.font="bold 22px 'Yusei Magic'"; ctx.textAlign="center";
      ctx.fillStyle= o.susp>=0.6?"#ff4030":"#ffd24a";
      ctx.strokeStyle="#2a2030"; ctx.lineWidth=3;
      ctx.strokeText(m,o.x,o.y-20); ctx.fillText(m,o.x,o.y-20);
    } else if(G.telegraph){
      // 早耳: これから振り向くと予兆
      const ta=Math.atan2(G.player.y-o.y,G.player.x-o.x);
      if(Math.abs(angDiff(ta,o.face))<o.coneHalf+0.5 && Math.hypot(G.player.x-o.x,G.player.y-o.y)<o.coneR+40){
        ctx.font="16px 'Yusei Magic'"; ctx.textAlign="center"; ctx.fillStyle="rgba(255,210,90,0.8)"; ctx.fillText("…",o.x,o.y-18);
      }
    }
    ctx.restore();
  }

  function drawPlayer(){
    const p=G.player;
    ctx.save();
    ctx.globalAlpha = p.hidden?0.32:1;
    // 影
    ctx.globalAlpha *= 1;
    ctx.fillStyle="rgba(40,30,60,0.3)"; ctx.beginPath(); ctx.ellipse(p.x+6,p.y+11,12,7,0,0,7); ctx.fill();
    // 体
    ctx.fillStyle="#3f6e8c"; ctx.beginPath(); ctx.arc(p.x,p.y,11,0,7); ctx.fill();
    ctx.fillStyle="#5a93b3"; ctx.beginPath(); ctx.arc(p.x-2,p.y-3,5,0,7); ctx.fill();
    // 頭
    ctx.fillStyle="#f2d6b3"; ctx.beginPath(); ctx.arc(p.x+Math.cos(p.face)*4,p.y+Math.sin(p.face)*4,6.5,0,7); ctx.fill();
    if(p.hidden){
      ctx.globalAlpha=0.9; ctx.font="14px 'Yusei Magic'"; ctx.textAlign="center"; ctx.fillStyle="#dff0c0";
      ctx.fillText("…",p.x,p.y-16);
    }
    ctx.restore();
  }

  function drawPebble(pb){
    ctx.save();
    if(!pb.landed){
      const h=Math.sin(clamp(pb.t/pb.dur,0,1)*Math.PI)*18; // 放物線の見かけ
      ctx.fillStyle="#7a6a52"; ctx.beginPath(); ctx.arc(pb.x,pb.y-h,4,0,7); ctx.fill();
    } else {
      ctx.strokeStyle="rgba(255,230,150,"+(1-pb.ring/0.6)+")"; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(pb.tx,pb.ty,8+pb.ring*60,0,7); ctx.stroke();
    }
    ctx.restore();
  }

  function drawPart(p){
    const a=1-p.t/p.life; ctx.globalAlpha=clamp(a,0,1)*0.7;
    ctx.fillStyle = p.kind==="dust"?"#e9d3a8":"#9fb060";
    ctx.fillRect(p.x,p.y,3,3); ctx.globalAlpha=1;
  }

  /* ====================== ゲームフロー ====================== */
  function loadBest(){ try{ const s=JSON.parse(localStorage.getItem("mouiikai_best")||"null"); if(s){ G.best=s; } }catch(e){} updateBestUI(); }
  function saveBest(){ try{ localStorage.setItem("mouiikai_best", JSON.stringify(G.best)); }catch(e){} }
  function updateBestUI(){
    hBest.textContent=G.best.round;
    $("bestRound").textContent=G.best.round; $("bestScore").textContent=G.best.score;
    $("bestRound2").textContent=G.best.round; $("bestScore2").textContent=G.best.score;
  }

  function startGame(){
    audio();
    _seed = (Date.now()>>>0) ^ 0x9e3779b9;
    G.round=1; G.score=0;
    G.runSpeed=168; G.noiseMul=1; G.throwDist=200; G.distractR=140; G.bravery=1;
    G.seeThrough=0; G.freezeBonus=0; G.lives=0; G.telegraph=0; G.pebbleMax=2;
    hideAllOverlays();
    buildRound();
    G.scene="play";
    syncHud();
    showToast("もう いいかい? — 「まあだ だよ」");
  }
  function roundClear(){
    G.scene="pick"; sfx.chime();
    const tb=Math.max(0, Math.round(60 - G.runTime*2));
    G.score += 100 + tb;
    if(G.round>G.best.round || (G.round===G.best.round && G.score>G.best.score)){ G.best={round:G.round, score:G.score}; saveBest(); updateBestUI(); }
    syncHud();
    $("pickH").textContent = G.round===1?"みーつけられなかった!":"ラウンド "+G.round+" 突破!";
    const ups=pickUpgrades(); const list=$("upList"); list.innerHTML="";
    ups.forEach(u=>{
      const d=document.createElement("div"); d.className="up";
      d.innerHTML='<div class="em">'+u.em+'</div><div><div class="nm">'+u.nm+'</div><div class="ds">'+u.ds+'</div></div>';
      bindPress(d, ()=>{ u.apply(); sfx.pick(); G.round++; hideAllOverlays(); buildRound(); G.scene="play"; syncHud(); });
      list.appendChild(d);
    });
    $("ovPick").classList.remove("hidden");
  }
  function gameOver(o){
    G.scene="over"; sfx.caught(); G.shake=1; G.flash=1;
    if(G.round-1>G.best.round || ((G.round-1)===G.best.round && G.score>G.best.score)){
      G.best={round:Math.max(G.best.round,G.round-1), score:Math.max(G.best.score,G.score)}; saveBest(); updateBestUI();
    }
    $("overStat").innerHTML="ラウンド <b style='color:#e8743b'>"+G.round+"</b> で みつかった<br>スコア <b style='color:#e8743b'>"+G.score+"</b>";
    $("ovOver").classList.remove("hidden");
  }
  function hideAllOverlays(){ ["ovTitle","ovPick","ovOver"].forEach(id=>$(id).classList.add("hidden")); }
  function syncHud(){ hRound.textContent=G.round; hScore.textContent=G.score; hOni.textContent=G.oni.length; throwN.textContent=G.pebbleN; }

  bindPress($("startBtn"), startGame);
  bindPress($("retryBtn"), startGame);
  $("muteBtn").addEventListener("pointerdown", e=>{ e.preventDefault(); muted=!muted; $("muteBtn").textContent=muted?"🔇":"🔊"; if(!muted)audio(); });

  // タイトル/OGP キービジュアル(あれば)
  (function(){ const img=new Image(); img.onload=()=>{ $("kvTitle").style.backgroundImage="url('assets/title.jpg')"; $("kvOver").style.backgroundImage="url('assets/title.jpg')"; }; img.src="assets/title.jpg"; })();

  /* ====================== メインループ(タイトルから常時回す) ====================== */
  let last=0;
  function frame(ts){
    if(!last) last=ts;
    let dt=(ts-last)/1000; last=ts;
    if(dt>0.05) dt=0.05;        // タブ復帰などの大ジャンプを抑制
    try { update(dt); } catch(e){ /* ループを止めない */ }
    // 石ボタンの見た目
    throwN.textContent = G.pebbleN;
    throwBtn.classList.toggle("disabled", G.pebbleN<=0);
    draw();
    requestAnimationFrame(frame);
  }

  // 初期化
  layout(); recomputeFit(); loadBest();
  try { window.__G = G; } catch(e) {}   // デバッグ/E2E用
  requestAnimationFrame(frame);
})();
</script>
</body>
