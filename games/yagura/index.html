<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>ヤグラ — 夏祭りの櫓を積み上げろ</title>
<meta name="description" content="提灯のタイルが左右に流れる。ピタッと重なる瞬間にタップして、夏祭りの櫓を空へ積み上げろ。ど真ん中で重ねるとPERFECTで太鼓が鳴り、コンボが燃え、花火が上がる。何段まで届くかの一発勝負スタッキング。">
<meta property="og:type" content="website">
<meta property="og:title" content="ヤグラ — 夏祭りの櫓を積み上げろ">
<meta property="og:description" content="流れる提灯タイルをピタッと重ねて櫓を空へ。PERFECTで太鼓が鳴りコンボが燃え花火が上がる、一発勝負のスタッキング。">
<meta property="og:image" content="https://nrtkumi.github.io/games/yagura/assets/ogp.jpg">
<meta property="og:url" content="https://nrtkumi.github.io/games/yagura/">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ヤグラ — 夏祭りの櫓を積み上げろ">
<meta name="twitter:description" content="流れる提灯タイルをピタッと重ねて櫓を空へ。PERFECTで太鼓が鳴る一発勝負スタッキング。">
<meta name="twitter:image" content="https://nrtkumi.github.io/games/yagura/assets/ogp.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Reggae+One&family=Dela+Gothic+One&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f4cf6b;
    --gold-d: #c79a3a;
    --red: #e2433a;
    --night: #1a1235;
    --ink: #2a1f3a;
    --cream: #fdf3df;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body { height: 100%; }
  body {
    background: #0c0820;
    color: var(--cream);
    font-family: "Zen Maru Gothic", sans-serif;
    overflow: hidden; overscroll-behavior: none;
    -webkit-touch-callout: none; user-select: none; -webkit-user-select: none;
  }
  #app {
    position: fixed; top: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: min(480px, 64vh); height: 100%;
    background: #0c0820;
    box-shadow: 0 0 60px rgba(0,0,0,.7);
    overflow: hidden;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; display: block; }

  /* HUD */
  #hud {
    position: absolute; top: calc(env(safe-area-inset-top) + 12px); left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 0 16px; z-index: 6; pointer-events: none;
  }
  .danH { font-family: "Dela Gothic One"; line-height: 1; }
  #hHeight { font-size: 64px; color: var(--gold); text-shadow: 0 3px 0 var(--gold-d), 0 0 24px rgba(244,207,107,.5); }
  #hHeight small { font-size: 20px; color: var(--cream); margin-left: 4px; text-shadow: none; }
  #hRight { text-align: right; font-size: 13px; color: #c8bcdf; line-height: 1.7; }
  #hRight b { font-family: "Dela Gothic One"; color: var(--gold); font-size: 17px; }
  #combo {
    position: absolute; top: 38%; left: 50%; transform: translateX(-50%) scale(0);
    font-family: "Dela Gothic One"; font-size: 30px; color: #fff; z-index: 7;
    text-shadow: 0 0 18px var(--red), 0 2px 0 var(--gold-d); pointer-events: none; opacity: 0;
  }

  /* screens */
  .screen {
    position: absolute; inset: 0; z-index: 10;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  .screen.on { display: flex; }
  #start { background: radial-gradient(120% 80% at 50% 18%, #2a1d52 0%, #150f30 55%, #0c0820 100%); }
  .title {
    font-family: "Reggae One"; font-size: 78px; color: var(--gold); line-height: .92;
    letter-spacing: 2px; text-shadow: 0 5px 0 var(--gold-d), 0 0 30px rgba(244,207,107,.45);
    margin-bottom: 6px;
  }
  .lanterns { font-size: 30px; letter-spacing: 10px; margin-bottom: 18px; filter: drop-shadow(0 0 10px rgba(226,67,58,.6)); }
  .lead { font-size: 15px; color: #d8cdec; line-height: 1.85; max-width: 320px; margin-bottom: 26px; }
  .lead b { color: var(--gold); }
  .btn {
    font-family: "Reggae One"; font-size: 26px; color: #3a1410;
    background: linear-gradient(180deg, #ffd866 0%, var(--gold) 55%, var(--gold-d) 100%);
    border: none; border-radius: 16px; padding: 16px 46px; cursor: pointer;
    box-shadow: 0 6px 0 #8c6a23, 0 10px 24px rgba(0,0,0,.4);
    pointer-events: auto; letter-spacing: 2px;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #8c6a23, 0 4px 12px rgba(0,0,0,.4); }
  .hint { margin-top: 22px; font-size: 12.5px; color: #9d90bb; line-height: 1.7; }

  #over { background: rgba(8,5,22,.84); backdrop-filter: blur(3px); }
  #over .title { font-size: 50px; margin-bottom: 4px; }
  .resultCard {
    background: linear-gradient(180deg, #241a45, #190f33);
    border: 2px solid var(--gold-d); border-radius: 20px;
    padding: 22px 30px; margin: 12px 0 8px; min-width: 250px;
    box-shadow: 0 0 30px rgba(0,0,0,.5), inset 0 0 30px rgba(244,207,107,.06);
  }
  .resultBig { font-family: "Dela Gothic One"; font-size: 70px; color: var(--gold); line-height: 1; text-shadow: 0 3px 0 var(--gold-d); }
  .resultBig small { font-size: 22px; color: var(--cream); }
  .resultRow { display: flex; justify-content: space-between; gap: 28px; margin-top: 14px; font-size: 14px; color: #cabfe0; }
  .resultRow b { font-family: "Dela Gothic One"; color: #fff; font-size: 20px; display: block; }
  .newbest { color: var(--red); font-weight: 900; margin-top: 8px; font-size: 15px; letter-spacing: 1px; animation: blink 1s infinite; }
  @keyframes blink { 50% { opacity: .35; } }
  .row2 { display: flex; gap: 12px; margin-top: 16px; }
  .btn.sub { font-size: 18px; padding: 14px 22px; background: linear-gradient(180deg,#5b4a86,#3f3168); color: #fff; box-shadow: 0 5px 0 #271d49; }
  #muteBtn {
    position: absolute; top: calc(env(safe-area-inset-top) + 12px); left: 50%; transform: translateX(-50%);
    z-index: 8; background: rgba(0,0,0,.3); border: 1px solid rgba(244,207,107,.3); color: var(--gold);
    width: 38px; height: 38px; border-radius: 50%; font-size: 16px; cursor: pointer; display: none;
  }
  #muteBtn.show { display: block; }
</style>
</head>
<body>
<div id="app">
  <canvas id="cv"></canvas>

  <div id="hud">
    <div class="danH" id="hHeight">0<small>段</small></div>
    <div id="hRight">SCORE <b id="hScore">0</b><br>BEST <b id="hBest">0</b></div>
  </div>
  <div id="combo"></div>
  <button id="muteBtn">♪</button>

  <div id="start" class="screen on">
    <div class="title">ヤグラ</div>
    <div class="lanterns">🏮🏮🏮</div>
    <div class="lead">流れてくる<b>提灯タイル</b>を、下の段に<b>ピタッ</b>と重なる瞬間にタップ。<br>はみ出しは切り落とされ、ズレるほど櫓は細くなる。<br><b>ど真ん中=PERFECT</b>で太鼓が鳴り、コンボで花火が上がる。</div>
    <button class="btn" id="startBtn">積みはじめる</button>
    <div class="hint">画面のどこでもタップでドロップ<br>スペース / クリックでも可</div>
  </div>

  <div id="over" class="screen">
    <div class="title">櫓くずれ</div>
    <div class="resultCard">
      <div class="resultBig" id="oHeight">0<small>段</small></div>
      <div class="resultRow">
        <div>SCORE<b id="oScore">0</b></div>
        <div>最高コンボ<b id="oCombo">0</b></div>
        <div>PERFECT<b id="oPerfect">0</b></div>
      </div>
      <div class="newbest" id="newbest" style="display:none">★ 自己ベスト更新! ★</div>
    </div>
    <div class="row2">
      <button class="btn" id="retryBtn">もう一度</button>
      <button class="btn sub" id="shareBtn">記録を共有</button>
    </div>
    <div class="hint" id="bestLine">BEST 0段</div>
  </div>
</div>

<script>
(function () {
  "use strict";
  const $ = id => document.getElementById(id);
  const cv = $("cv"), ctx = cv.getContext("2d");
  const app = $("app");

  /* ---------- canvas / DPR ---------- */
  let W = 0, H = 0, dpr = 1;
  function resize() {
    const r = app.getBoundingClientRect();
    W = r.width; H = r.height;
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", resize);

  /* ---------- audio (iOS-safe) ---------- */
  let AC = null, muted = false;
  function audio() {
    if (!AC) {
      try {
        AC = new (window.AudioContext || window.webkitAudioContext)();
        AC.onstatechange = () => { if (AC.state !== "running" && !document.hidden) { try { AC.resume(); } catch (e) {} } };
      } catch (e) {}
    }
    if (AC && AC.state !== "running") { try { AC.resume(); } catch (e) {} }
    return AC;
  }
  let silentEl = null;
  function silentWavUrl() {
    const sr = 8000, n = 800, buf = new ArrayBuffer(44 + n), v = new DataView(buf);
    const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    str(0, "RIFF"); v.setUint32(4, 36 + n, true); str(8, "WAVE");
    str(12, "fmt "); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr, true); v.setUint16(32, 1, true); v.setUint16(34, 8, true);
    str(36, "data"); v.setUint32(40, n, true);
    for (let i = 0; i < n; i++) v.setUint8(44 + i, 0x80);
    return URL.createObjectURL(new Blob([buf], { type: "audio/wav" }));
  }
  function unlockAudio() {
    if (!silentEl) {
      silentEl = document.createElement("audio");
      silentEl.setAttribute("playsinline", ""); silentEl.loop = true; silentEl.volume = 0.01;
      silentEl.src = silentWavUrl();
    }
    const p = silentEl.play(); if (p && p.catch) p.catch(() => {});
    audio(); if (!AC) return;
    const done = () => { if (AC.state === "running") ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.removeEventListener(ev, unlockAudio, true)); };
    try { AC.resume().then(done); } catch (e) { done(); }
  }
  ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.addEventListener(ev, unlockAudio, true));
  document.addEventListener("visibilitychange", () => { if (!document.hidden) audio(); });

  function tone(f, d, type, vol, slideTo) {
    if (muted || !audio()) return;
    try {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type || "sine"; o.frequency.value = f;
      if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, AC.currentTime + d);
      g.gain.value = vol || 0.06;
      g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
      o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + d);
    } catch (e) {}
  }
  function noise(d, vol, lp) {
    if (muted || !audio()) return;
    try {
      const n = Math.floor(AC.sampleRate * d);
      const buf = AC.createBuffer(1, n, AC.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / n);
      const src = AC.createBufferSource(); src.buffer = buf;
      const g = AC.createGain(); g.gain.value = vol || 0.08;
      if (lp) { const f = AC.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = lp; src.connect(f); f.connect(g); }
      else src.connect(g);
      g.connect(AC.destination); src.start();
    } catch (e) {}
  }
  // 太鼓 (taiko) — low thump scaling with combo pitch
  function sTaiko(combo) {
    const base = 90 + Math.min(combo, 18) * 9;
    tone(base, 0.18, "sine", 0.16, base * 0.5);
    noise(0.08, 0.05, 1200);
  }
  function sPerfect(combo) {
    sTaiko(combo);
    const f = 740 + Math.min(combo, 16) * 60;
    tone(f, 0.14, "triangle", 0.08);
    setTimeout(() => tone(f * 1.5, 0.16, "sine", 0.06), 50); // 鈴
  }
  function sTrim() { noise(0.12, 0.06, 800); tone(150, 0.1, "sawtooth", 0.04, 80); }
  function sFall() { [330, 262, 196, 147, 110].forEach((f, i) => setTimeout(() => tone(f, 0.22, "sawtooth", 0.06, f * 0.8), i * 120)); noise(0.3, 0.05, 500); }
  function sFirework() {
    noise(0.05, 0.04, 3000);
    setTimeout(() => { for (let i = 0; i < 5; i++) setTimeout(() => tone(900 + Math.random() * 800, 0.18, "sine", 0.04), i * 28); }, 60);
    setTimeout(() => tone(70, 0.3, "sine", 0.1, 40), 30);
  }
  function sCheer() {
    if (muted || !audio()) return;
    try {
      const d = 0.7, n = Math.floor(AC.sampleRate * d), buf = AC.createBuffer(1, n, AC.sampleRate), data = buf.getChannelData(0);
      for (let i = 0; i < n; i++) { const t = i / n; data[i] = (Math.random() * 2 - 1) * Math.sin(t * Math.PI) * 0.9; }
      const src = AC.createBufferSource(); src.buffer = buf;
      const f = AC.createBiquadFilter(); f.type = "bandpass"; f.frequency.value = 900; f.Q.value = 0.7;
      const g = AC.createGain(); g.gain.value = 0.09;
      src.connect(f); f.connect(g); g.connect(AC.destination); src.start();
    } catch (e) {}
  }
  const vibe = ms => { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} };

  /* ---------- store ---------- */
  const store = {
    load(k, fb) { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch { return fb; } },
    save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
  };
  let best = store.load("yagura_best", { height: 0, score: 0 });
  const BOT = /bot/.test(location.search);

  /* ---------- palette ---------- */
  // 祭りの色帯（高さで巡回）front/top/side をHSLで生成
  const HUES = [
    [352, 70, 54], // 紅
    [28, 78, 55],  // 山吹
    [205, 55, 50], // 藍
    [14, 72, 53],  // 朱
    [86, 42, 47],  // 抹茶
    [276, 38, 56], // 藤
    [340, 55, 60], // 桃
  ];
  function blockColors(idx) {
    const h = HUES[idx % HUES.length];
    const drift = Math.floor(idx / HUES.length) * 9;
    const H0 = (h[0] + drift) % 360;
    return {
      front: `hsl(${H0} ${h[1]}% ${h[2]}%)`,
      top: `hsl(${H0} ${h[1]}% ${Math.min(h[2] + 16, 80)}%)`,
      side: `hsl(${H0} ${h[1]}% ${Math.max(h[2] - 16, 14)}%)`,
      glow: `hsl(${H0} ${h[1]}% 70%)`,
    };
  }

  /* ---------- geometry ---------- */
  const BLOCK_H = 30;       // front face height
  const DEPTH = 13;         // pseudo-3D top/side depth
  let baseW = 200;
  const MARGIN = 26;
  const ANCHOR = () => H * 0.50; // screen Y where the incoming row top sits

  /* ---------- state (init at declaration: loop runs from start screen) ---------- */
  let state = "start"; // start | play | falling | over
  let blocks = [];     // placed: {x(center), w, top(worldY top), colorIdx}
  let moving = null;   // {x, w, dir, speed, top, colorIdx}
  let debris = [];     // trimmed pieces
  let particles = [];
  let fireworks = [];
  let camY = 0, camTarget = 0;
  let score = 0, combo = 0, maxCombo = 0, perfects = 0, height = 0;
  let shake = 0, flash = 0, t = 0;
  let comboPop = { v: 0, txt: "" };
  let bg = { stars: [], farLanterns: [] };
  let pendingOver = 0;
  let restoreFx = 0;

  function buildBg() {
    bg.stars = [];
    for (let i = 0; i < 60; i++) bg.stars.push({ x: Math.random(), y: Math.random(), r: Math.random() * 1.4 + 0.3, tw: Math.random() * 6.28 });
  }
  buildBg();

  function init() {
    baseW = Math.min(220, W - MARGIN * 2 - 40);
    blocks = []; debris = []; particles = []; fireworks = [];
    score = 0; combo = 0; maxCombo = 0; perfects = 0; height = 0;
    shake = 0; flash = 0; comboPop.v = 0; pendingOver = 0; restoreFx = 0;
    // base block
    blocks.push({ x: W / 2, w: baseW, top: 0, colorIdx: 0 });
    camTarget = camFor(1); camY = camTarget;
    spawnMoving();
    state = "play";
    syncHud();
  }

  function camFor(n) {
    // incoming row index n; its top worldY = -(n)*BLOCK_H ; we want it at ANCHOR
    return -n * BLOCK_H - ANCHOR();
  }

  function spawnMoving() {
    const topB = blocks[blocks.length - 1];
    const n = blocks.length; // incoming index
    const speed = 1.9 + Math.min(n * 0.05, 3.4); // px per frame-ish (scaled by dt)
    const dir = (n % 2 === 0) ? 1 : -1;
    const startX = dir === 1 ? MARGIN + topB.w / 2 : W - MARGIN - topB.w / 2;
    moving = { x: startX, w: topB.w, dir, speed, top: -n * BLOCK_H, colorIdx: n };
    camTarget = camFor(n);
  }

  /* ---------- drop logic ---------- */
  function drop() {
    if (state !== "play" || !moving) return;
    const top = blocks[blocks.length - 1];
    const dx = moving.x - top.x;
    const overlap = moving.w - Math.abs(dx);
    if (overlap <= 2) {
      // total miss -> tower falls
      moving.vy = 0; moving.vx = moving.dir * 1.5; moving.rot = 0; moving.va = (Math.random() - .5) * 0.2;
      debris.push(Object.assign({}, moving, { full: true }));
      moving = null;
      state = "falling"; pendingOver = 40;
      sFall(); vibe([40, 60, 90]);
      shake = 18;
      return;
    }
    const PERFECT = Math.max(5, top.w * 0.045);
    let newW, newX, perfect = false;
    if (Math.abs(dx) <= PERFECT) {
      // perfect: snap, grow back a little
      perfect = true;
      newX = top.x;
      newW = Math.min(moving.w + Math.min(8 + combo, 18), baseW);
      combo++; perfects++;
      maxCombo = Math.max(maxCombo, combo);
      sPerfect(combo); vibe(combo > 3 ? 28 : 16);
      flash = Math.min(0.18 + combo * 0.02, 0.5);
      shake = Math.min(4 + combo * 1.2, 16);
      restoreFx = 1;
      sparkle(top.x, screenY(moving.top) + BLOCK_H / 2, 22, blockColors(moving.colorIdx).glow);
      popCombo(combo);
    } else {
      // trimmed
      newW = overlap;
      newX = moving.x - dx / 2;
      // spawn trimmed debris on the overhang side
      const trimW = Math.abs(dx);
      const trimX = dx > 0 ? newX + newW / 2 + trimW / 2 : newX - newW / 2 - trimW / 2;
      debris.push({ x: trimX, w: trimW, top: moving.top, colorIdx: moving.colorIdx, vy: -1, vx: dx > 0 ? 1.5 : -1.5, rot: 0, va: (dx > 0 ? 1 : -1) * 0.12 });
      combo = 0;
      sTaiko(0); sTrim(); vibe(10);
      shake = Math.min(3 + Math.abs(dx) * 0.04, 7);
    }
    const placed = { x: newX, w: newW, top: moving.top, colorIdx: moving.colorIdx, lit: true, born: t };
    blocks.push(placed);
    height = blocks.length - 1;
    // scoring
    let gain = 1 + (perfect ? combo : 0);
    score += gain;
    floatScore(newX, screenY(placed.top), perfect ? "PERFECT +" + gain : "+" + gain, perfect);

    // milestones
    if (height % 10 === 0) { launchFirework(); sCheer(); flash = Math.max(flash, 0.35); }

    syncHud();
    if (blocks.length > 90) blocks.shift(); // cap memory; off-screen anyway
    spawnMoving();
  }

  /* ---------- fx ---------- */
  let floats = [];
  function floatScore(x, y, txt, big) { floats.push({ x, y, txt, life: 1, big }); }
  function popCombo(c) {
    if (c < 2) return;
    comboPop.v = 1; comboPop.txt = c + " COMBO";
    const el = $("combo"); el.textContent = comboPop.txt;
  }
  function sparkle(x, y, n, col) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * 6.28, sp = Math.random() * 4 + 1.5;
      particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1, life: 1, col, r: Math.random() * 2.5 + 1.5 });
    }
  }
  function launchFirework() {
    const fx = MARGIN + 30 + Math.random() * (W - MARGIN * 2 - 60);
    fireworks.push({ x: fx, y: H + 20, vy: -(7 + Math.random() * 3), tx: H * (0.15 + Math.random() * 0.25), exploded: false, hue: Math.floor(Math.random() * 360), life: 1 });
    sFirework();
  }

  /* ---------- world<->screen ---------- */
  function screenY(worldTop) { return worldTop - camY; }

  /* ---------- input ---------- */
  function onTap(e) {
    if (e && e.cancelable) e.preventDefault();
    if (state === "play") drop();
  }
  cv.addEventListener("pointerdown", onTap);
  window.addEventListener("keydown", e => {
    if (e.code === "Space" || e.code === "Enter") { e.preventDefault();
      if (state === "start") startGame();
      else if (state === "over") init();
      else onTap();
    }
  });
  // block double-tap zoom
  let lastTouch = 0;
  document.addEventListener("touchend", e => {
    const now = Date.now();
    if (now - lastTouch < 350) e.preventDefault();
    lastTouch = now;
  }, { passive: false });
  document.addEventListener("gesturestart", e => e.preventDefault());
  document.addEventListener("dblclick", e => e.preventDefault());

  /* ---------- screen control ---------- */
  function show(id) { ["start", "over"].forEach(s => $(s).classList.toggle("on", s === id)); }
  function startGame() { show(""); $("muteBtn").classList.add("show"); init(); }

  $("startBtn").addEventListener("pointerdown", e => { e.preventDefault(); startGame(); });
  $("retryBtn").addEventListener("pointerdown", e => { e.preventDefault(); show(""); init(); });
  $("shareBtn").addEventListener("pointerdown", e => { e.preventDefault(); doShare(); });
  $("muteBtn").addEventListener("pointerdown", e => {
    e.preventDefault(); muted = !muted; $("muteBtn").textContent = muted ? "🔇" : "♪";
  });

  function doShare() {
    const txt = `ヤグラで${height}段(${score}点)積んだ! 最高${maxCombo}コンボ🏮`;
    const url = "https://nrtkumi.github.io/games/yagura/";
    if (navigator.share) { navigator.share({ title: "ヤグラ", text: txt, url }).catch(() => {}); }
    else {
      try { navigator.clipboard.writeText(txt + " " + url); $("shareBtn").textContent = "コピー!"; setTimeout(() => $("shareBtn").textContent = "記録を共有", 1400); } catch (e) {}
    }
  }

  function syncHud() {
    $("hHeight").innerHTML = height + '<small>段</small>';
    $("hScore").textContent = score;
    $("hBest").textContent = best.height;
  }

  function gameOver() {
    state = "over";
    $("muteBtn").classList.remove("show");
    const nb = height > best.height || (height === best.height && score > best.score);
    if (nb) { best = { height, score }; store.save("yagura_best", best); }
    $("oHeight").innerHTML = height + '<small>段</small>';
    $("oScore").textContent = score;
    $("oCombo").textContent = maxCombo;
    $("oPerfect").textContent = perfects;
    $("newbest").style.display = nb ? "block" : "none";
    $("bestLine").textContent = `BEST ${best.height}段 / ${best.score}点`;
    show("over");
  }

  /* ---------- update ---------- */
  let last = performance.now();
  function update(dt) {
    t += dt;
    // camera smoothing
    camY += (camTarget - camY) * Math.min(1, dt * 6);
    if (shake > 0) shake = Math.max(0, shake - dt * 40);
    if (flash > 0) flash = Math.max(0, flash - dt * 1.4);
    if (comboPop.v > 0) comboPop.v = Math.max(0, comboPop.v - dt * 1.1);
    if (restoreFx > 0) restoreFx = Math.max(0, restoreFx - dt * 2);

    if (state === "play" && moving) {
      moving.x += moving.dir * moving.speed * dt * 60;
      const half = moving.w / 2;
      if (moving.x - half < MARGIN) { moving.x = MARGIN + half; moving.dir = 1; }
      if (moving.x + half > W - MARGIN) { moving.x = W - MARGIN - half; moving.dir = -1; }
      // bot mode (?bot) — auto-drop on near-perfect alignment (screenshots / balance)
      if (BOT) { const top = blocks[blocks.length - 1]; if (Math.abs(moving.x - top.x) < 3) drop(); }
    }

    // debris physics
    for (const d of debris) {
      d.vy = (d.vy || 0) + dt * 34;
      d.top += d.vy * dt * 60 * 0.5;
      d.x += (d.vx || 0) * dt * 60;
      d.rot = (d.rot || 0) + (d.va || 0) * dt * 60;
      d.life = (d.life == null ? 1 : d.life) - dt * 0.5;
    }
    debris = debris.filter(d => screenY(d.top) < H + 120 && (d.life == null || d.life > -0.5));

    // particles
    for (const p of particles) {
      p.vy += dt * 14; p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.life -= dt * 1.6;
    }
    particles = particles.filter(p => p.life > 0);

    // floats
    for (const f of floats) { f.y -= dt * 34; f.life -= dt * 1.1; }
    floats = floats.filter(f => f.life > 0);

    // fireworks
    for (const f of fireworks) {
      if (!f.exploded) {
        f.y += f.vy * dt * 60; f.vy += dt * 6;
        if (f.y <= f.tx || f.vy >= 0) { f.exploded = true; f.parts = []; for (let i = 0; i < 36; i++) { const a = (i / 36) * 6.28, s = Math.random() * 3 + 2; f.parts.push({ x: f.x, y: f.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1 }); } }
      } else {
        for (const p of f.parts) { p.x += p.vx * dt * 60; p.y += p.vy * dt * 60; p.vy += dt * 4; p.life -= dt * 0.9; }
        f.life -= dt * 0.7;
      }
    }
    fireworks = fireworks.filter(f => f.life > 0);

    if (state === "falling") {
      camTarget += dt * 30; // slight drift
      pendingOver -= dt * 60;
      if (pendingOver <= 0) gameOver();
    }
  }

  /* ---------- draw ---------- */
  function drawBg() {
    // sky gradient shifts with height
    const band = Math.min(height / 120, 1);
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, `hsl(${258 - band * 30} ${40 + band * 10}% ${10 + band * 6}%)`);
    g.addColorStop(0.55, `hsl(${262 - band * 40} 45% ${16 + band * 8}%)`);
    g.addColorStop(1, `hsl(${276 - band * 30} 42% ${9 + band * 4}%)`);
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    // moon
    const mx = W * 0.76, my = H * 0.16 - Math.min(height, 100) * 0.4;
    const mg = ctx.createRadialGradient(mx, my, 4, mx, my, 60);
    mg.addColorStop(0, "rgba(255,244,210,.95)"); mg.addColorStop(.5, "rgba(255,236,180,.5)"); mg.addColorStop(1, "rgba(255,236,180,0)");
    ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx, my, 60, 0, 6.28); ctx.fill();
    ctx.fillStyle = "#fdf3df"; ctx.beginPath(); ctx.arc(mx, my, 26, 0, 6.28); ctx.fill();
    // stars
    for (const s of bg.stars) {
      const tw = 0.5 + 0.5 * Math.sin(t * 2 + s.tw);
      ctx.fillStyle = `rgba(255,250,230,${0.25 + tw * 0.55})`;
      ctx.beginPath(); ctx.arc(s.x * W, s.y * H * 0.7, s.r, 0, 6.28); ctx.fill();
    }
    // lantern garland near top
    drawGarland();
  }
  function drawGarland() {
    const y0 = 6;
    ctx.strokeStyle = "rgba(90,60,40,.6)"; ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = -10; x <= W + 10; x += 6) {
      const yy = y0 + Math.sin(x * 0.06) * 8 + 8;
      x === -10 ? ctx.moveTo(x, yy) : ctx.lineTo(x, yy);
    }
    ctx.stroke();
    const cols = ["#e2433a", "#f2a93b", "#ffe9a8", "#7cc0e8"];
    for (let i = 0, x = 20; x < W; x += 46, i++) {
      const yy = y0 + Math.sin(x * 0.06) * 8 + 14;
      ctx.fillStyle = cols[i % cols.length];
      ctx.shadowColor = cols[i % cols.length]; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.ellipse(x, yy, 7, 9, 0, 0, 6.28); ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function drawBlock(b, isMoving) {
    const sy = screenY(b.top); // top edge screen Y
    if (sy > H + 60 || sy < -120) return;
    const c = blockColors(b.colorIdx);
    const left = b.x - b.w / 2, right = b.x + b.w / 2;
    // top face (parallelogram going up-right)
    ctx.fillStyle = c.top;
    ctx.beginPath();
    ctx.moveTo(left, sy); ctx.lineTo(left + DEPTH, sy - DEPTH);
    ctx.lineTo(right + DEPTH, sy - DEPTH); ctx.lineTo(right, sy);
    ctx.closePath(); ctx.fill();
    // side face (right)
    ctx.fillStyle = c.side;
    ctx.beginPath();
    ctx.moveTo(right, sy); ctx.lineTo(right + DEPTH, sy - DEPTH);
    ctx.lineTo(right + DEPTH, sy - DEPTH + BLOCK_H); ctx.lineTo(right, sy + BLOCK_H);
    ctx.closePath(); ctx.fill();
    // front face
    ctx.fillStyle = c.front;
    ctx.fillRect(left, sy, b.w, BLOCK_H);
    // lantern dots (lit) on the front
    const dots = Math.max(1, Math.floor(b.w / 34));
    for (let i = 0; i < dots; i++) {
      const dx = left + (b.w / dots) * (i + 0.5);
      ctx.fillStyle = "rgba(255,230,150,.92)";
      ctx.shadowColor = "rgba(255,210,120,.9)"; ctx.shadowBlur = isMoving ? 4 : 9;
      ctx.beginPath(); ctx.ellipse(dx, sy + BLOCK_H * 0.5, 3.4, 4.6, 0, 0, 6.28); ctx.fill();
      ctx.shadowBlur = 0;
    }
    // gold edge highlight for recently placed / perfect restore
    if (restoreFx > 0 && b === blocks[blocks.length - 1]) {
      ctx.strokeStyle = `rgba(255,220,120,${restoreFx})`; ctx.lineWidth = 3;
      ctx.strokeRect(left + 1, sy + 1, b.w - 2, BLOCK_H - 2);
    }
  }

  function draw() {
    ctx.save();
    let sx = 0, syk = 0;
    if (shake > 0) { sx = (Math.random() - .5) * shake; syk = (Math.random() - .5) * shake; ctx.translate(sx, syk); }
    drawBg();

    // fireworks (behind tower glow but in sky)
    for (const f of fireworks) {
      if (!f.exploded) {
        ctx.fillStyle = "#ffe9a8"; ctx.beginPath(); ctx.arc(f.x, f.y, 2.5, 0, 6.28); ctx.fill();
      } else {
        for (const p of f.parts) {
          if (p.life <= 0) continue;
          ctx.fillStyle = `hsla(${f.hue} 90% 65% / ${p.life})`;
          ctx.beginPath(); ctx.arc(p.x, p.y, 2.4, 0, 6.28); ctx.fill();
        }
      }
    }

    // blocks
    for (const b of blocks) drawBlock(b, false);
    if (moving) drawBlock(moving, true);
    // debris
    for (const d of debris) {
      ctx.save();
      const sy = screenY(d.top);
      ctx.translate(d.x, sy + BLOCK_H / 2); ctx.rotate(d.rot || 0);
      ctx.globalAlpha = Math.max(0, Math.min(1, d.life == null ? 1 : d.life));
      const c = blockColors(d.colorIdx);
      ctx.fillStyle = c.front; ctx.fillRect(-d.w / 2, -BLOCK_H / 2, d.w, BLOCK_H);
      ctx.fillStyle = c.top; ctx.fillRect(-d.w / 2, -BLOCK_H / 2, d.w, 4);
      ctx.restore();
    }
    ctx.globalAlpha = 1;

    // particles
    for (const p of particles) {
      ctx.fillStyle = typeof p.col === "string" ? p.col : "#ffd";
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.28); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // floating scores
    for (const f of floats) {
      ctx.globalAlpha = Math.max(0, f.life);
      ctx.font = (f.big ? "900 22px" : "700 16px") + ' "Dela Gothic One", sans-serif';
      ctx.textAlign = "center";
      ctx.fillStyle = f.big ? "#ffe27a" : "#fff";
      ctx.strokeStyle = "rgba(0,0,0,.4)"; ctx.lineWidth = 3;
      ctx.strokeText(f.txt, f.x, f.y); ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1; ctx.textAlign = "left";

    ctx.restore();

    // flash overlay
    if (flash > 0) { ctx.fillStyle = `rgba(255,240,200,${flash})`; ctx.fillRect(0, 0, W, H); }

    // combo pop (DOM is separate; draw nothing here)
    const ce = $("combo");
    if (comboPop.v > 0) {
      ce.style.opacity = Math.min(1, comboPop.v * 1.6);
      const sc = 1 + (1 - comboPop.v) * 0.4 + Math.sin(t * 30) * 0.02 * comboPop.v;
      ce.style.transform = `translateX(-50%) scale(${sc})`;
    } else ce.style.opacity = 0;
  }

  /* ---------- loop ---------- */
  function frame(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  function boot() {
    resize();
    // guard: if size 0 (hidden), retry
    if (W < 10) { setTimeout(boot, 50); return; }
    buildBg();
    syncHud();
    $("hBest").textContent = best.height;
    $("bestLine").textContent = `BEST ${best.height}段`;
    last = performance.now();
    requestAnimationFrame(frame);
    if (BOT) setTimeout(startGame, 500);
  }
  boot();
})();
</script>
</body>
</html>
