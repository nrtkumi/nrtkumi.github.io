<!DOCTYPE html>

<meta name="description" content="カメラの前で手を振って、画面を飛び回る蚊を叩き潰すモーションアクション。蜂に注意、刺される前に叩け!映像は端末内処理のみで送信されません。">
<meta property="og:title" content="KATAKI — 蚊叩き">
<meta property="og:description" content="カメラの前で手を振って蚊を叩き潰せ!刺される前に叩く、夏のモーションアクション。カメラなしでもタッチでプレイ可。">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #06070d; overscroll-behavior: none; }
  body { font-family: "Zen Kaku Gothic New", sans-serif; color: #f2efe6; }
  #wrap {
    position: fixed; top: 0; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: min(520px, 64vh); height: 100%;
    background: #0a0c14; box-shadow: 0 0 60px rgba(0,0,0,.8); overflow: hidden;
  }
  #cam { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
  canvas#game { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; display: block; }
  .overlay {
    position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 24px 20px; padding-top: calc(24px + env(safe-area-inset-top)); padding-bottom: calc(24px + env(safe-area-inset-bottom));
    background: rgba(6, 8, 16, .82); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); z-index: 10;
  }
  .overlay.show { display: flex; }
  .title { font-family: "Bungee", cursive; font-size: clamp(44px, 13vw, 64px); line-height: 1; color: #aef25d; text-shadow: 0 4px 0 #2a5410, 0 8px 24px rgba(174,242,93,.35); letter-spacing: .02em; }
  .subtitle { font-weight: 900; font-size: 15px; color: #ffd95e; margin-top: 10px; letter-spacing: .15em; }
  .desc { font-size: 13px; font-weight: 700; line-height: 1.9; color: #cfd6c8; margin: 18px 0 6px; }
  .privacy { font-size: 11px; color: #8a937f; margin-top: 12px; line-height: 1.7; }
  .bigbtn {
    margin-top: 18px; padding: 16px 34px; border: none; border-radius: 999px;
    font-family: "Zen Kaku Gothic New", sans-serif; font-weight: 900; font-size: 18px; color: #0a1402;
    background: linear-gradient(180deg, #c6ff7a, #8edb3a); box-shadow: 0 5px 0 #3f6e12, 0 10px 26px rgba(140,220,60,.35);
    cursor: pointer; touch-action: none;
  }
  .bigbtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #3f6e12; }
  .ghostbtn { margin-top: 14px; padding: 10px 18px; border: 1.5px solid #5a6450; border-radius: 999px; background: transparent; color: #b8c2aa; font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; touch-action: none; }
  .best { font-family: "Space Mono", monospace; font-size: 13px; color: #9aa48c; margin-top: 16px; }
  .result-score { font-family: "Space Mono", monospace; font-size: clamp(40px, 12vw, 56px); font-weight: 700; color: #ffd95e; margin: 8px 0 0; }
  .result-label { font-size: 13px; font-weight: 700; color: #9aa48c; letter-spacing: .2em; margin-top: 14px; }
  .newbest { color: #ff8a5c; font-weight: 900; font-size: 14px; margin-top: 8px; display: none; }
  .upcards { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; margin-top: 18px; }
  .upcard {
    display: flex; align-items: center; gap: 14px; text-align: left; padding: 14px 16px;
    border: 2px solid #44503a; border-radius: 16px; background: rgba(20, 26, 14, .9); cursor: pointer; touch-action: none;
  }
  .upcard:active { background: rgba(60, 80, 30, .9); border-color: #aef25d; }
  .upcard .ic { font-size: 30px; flex: 0 0 auto; }
  .upcard .nm { font-weight: 900; font-size: 15px; color: #d8f5ad; }
  .upcard .lv { font-family: "Space Mono", monospace; font-size: 11px; color: #ffd95e; margin-left: 6px; }
  .upcard .ds { font-size: 12px; color: #aab59b; line-height: 1.5; margin-top: 2px; }
  #camhint { font-size: 12px; color: #ffd95e; font-weight: 700; margin-top: 10px; display: none; }
  #safeprobe { position: absolute; top: 0; left: 0; width: 0; height: 0; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); visibility: hidden; pointer-events: none; }
  #mute {
    position: absolute; right: 10px; bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 5;
    width: 42px; height: 42px; border-radius: 50%; border: 1.5px solid #5a6450;
    background: rgba(10, 14, 8, .55); color: #d8f5ad; font-size: 18px; cursor: pointer; touch-action: none;
  }

<body>
<div id="wrap">
  <video id="cam" playsinline muted autoplay></video>
  <canvas id="game"></canvas>
  <div id="safeprobe"></div>
  <button id="mute" aria-label="ミュート切り替え">🔊</button>

  <div id="start" class="overlay show">
    <div class="title">KATAKI</div>
    <div class="subtitle">— 蚊 叩 き —</div>
    <div class="desc">
      カメラの前で <b style="color:#aef25d">手を振って</b> 蚊を叩け!<br>
      着地した蚊は吸血開始、刺される前に潰せ。<br>
      🐝 蜂を叩くとシビれるぞ。🌀 蚊取り線香でスロー。
    </div>
    <button id="btnCam" class="bigbtn">📷 カメラで叩く</button>
    <button id="btnTouch" class="ghostbtn">カメラなし(タッチで叩く)</button>
    <div id="camhint">カメラ起動中…(許可してください)</div>
    <div class="privacy">カメラ映像はこの端末の中だけで処理されます。<br>保存・送信は一切ありません。</div>
    <div class="best" id="bestStart"></div>
  </div>

  <div id="upgrade" class="overlay">
    <div class="subtitle" style="font-size:18px;color:#aef25d">WAVE CLEAR!</div>
    <div class="desc">強化を1つ選べ</div>
    <div class="upcards" id="upcards"></div>
  </div>

  <div id="over" class="overlay">
    <div class="title" style="font-size:clamp(34px,10vw,46px);color:#ff8a5c;text-shadow:0 4px 0 #5e2510">吸われた…</div>
    <div class="result-label">SCORE</div>
    <div class="result-score" id="finalScore">0</div>
    <div class="newbest" id="newBest">★ NEW BEST!</div>
    <div class="best" id="bestOver"></div>
    <button id="btnRetry" class="bigbtn">もう一回叩く</button>
  </div>
</div>

<script>
(() => {
  "use strict";
  /* ============ 基本セットアップ ============ */
  const wrap = document.getElementById("wrap");
  const cvs = document.getElementById("game");
  const ctx = cvs.getContext("2d");
  const video = document.getElementById("cam");
  let W = 360, H = 640, dpr = 1;

  function resize() {
    const r = wrap.getBoundingClientRect();
    W = r.width; H = r.height;
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    cvs.width = Math.round(W * dpr); cvs.height = Math.round(H * dpr);
  }
  resize();
  window.addEventListener("resize", resize);

  /* ダブルタップズーム無効化(3点セットの2) */
  document.addEventListener("dblclick", e => e.preventDefault(), { passive: false });
  document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
  let lastTouchEnd = 0;
  document.addEventListener("touchend", e => {
    const now = Date.now();
    if (now - lastTouchEnd < 350) e.preventDefault();
    lastTouchEnd = now;
  }, { passive: false });

  /* ============ 音(Web Audio合成 + iOS消音スイッチ対策) ============ */
  let AC = null, muted = false;
  function audio() {
    if (!AC) {
      try {
        AC = new (window.AudioContext || window.webkitAudioContext)();
        AC.onstatechange = () => { if (AC.state === "interrupted" || AC.state === "suspended") { try { AC.resume(); } catch (e) {} } };
      } catch (e) { return null; }
    }
    if (AC.state !== "running") { try { AC.resume(); } catch (e) {} }
    return AC.state === "running" ? AC : null;
  }
  let silentEl = null;
  function silentWavUrl() {
    const sr = 8000, n = 800, buf = new ArrayBuffer(44 + n), v = new DataView(buf);
    const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    str(0, "RIFF"); v.setUint32(4, 36 + n, true); str(8, "WAVE");
    str(12, "fmt "); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr, true); v.setUint16(32, 1, true); v.setUint16(34, 8, true);
    str(36, "data"); v.setUint32(40, n, true);
    for (let i = 0; i < n; i++) v.setUint8(44 + i, 0x80);
    return URL.createObjectURL(new Blob([buf], { type: "audio/wav" }));
  }
  function unlockAudio() {
    if (!silentEl) {
      silentEl = document.createElement("audio");
      silentEl.setAttribute("playsinline", "");
      silentEl.loop = true; silentEl.volume = 0.01;
      silentEl.src = silentWavUrl();
    }
    const p = silentEl.play();
    if (p && p.catch) p.catch(() => {});
    audio();
    if (!AC) return;
    const done = () => {
      if (AC.state === "running") {
        ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.removeEventListener(ev, unlockAudio, true));
      }
    };
    try { AC.resume().then(done); } catch (e) { done(); }
  }
  ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.addEventListener(ev, unlockAudio, true));
  document.addEventListener("visibilitychange", () => { if (!document.hidden) audio(); });

  function tone(f, d, type, vol, slideTo) {
    if (muted || !audio()) return;
    try {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type || "sine"; o.frequency.value = f;
      if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, AC.currentTime + d);
      g.gain.value = vol || 0.06;
      g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
      o.connect(g); g.connect(AC.destination);
      o.start(); o.stop(AC.currentTime + d);
    } catch (e) {}
  }
  function noise(d, vol) {
    if (muted || !audio()) return;
    try {
      const n = Math.floor(AC.sampleRate * d);
      const buf = AC.createBuffer(1, n, AC.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / n);
      const src = AC.createBufferSource(); src.buffer = buf;
      const g = AC.createGain(); g.gain.value = vol || 0.08;
      src.connect(g); g.connect(AC.destination); src.start();
    } catch (e) {}
  }
  /* 蚊の羽音: 数に応じた持続ノコギリ波 + ビブラート */
  let buzzOsc = null, buzzGain = null, buzzLfo = null;
  function ensureBuzz() {
    if (buzzOsc || muted || !audio()) return;
    try {
      buzzOsc = AC.createOscillator(); buzzGain = AC.createGain();
      buzzOsc.type = "sawtooth"; buzzOsc.frequency.value = 520;
      buzzGain.gain.value = 0;
      buzzLfo = AC.createOscillator(); const lg = AC.createGain();
      buzzLfo.frequency.value = 9; lg.gain.value = 40;
      buzzLfo.connect(lg); lg.connect(buzzOsc.frequency);
      buzzOsc.connect(buzzGain); buzzGain.connect(AC.destination);
      buzzOsc.start(); buzzLfo.start();
    } catch (e) { buzzOsc = null; }
  }
  function setBuzz(level) {
    if (muted || !AC || AC.state !== "running") { if (buzzGain) try { buzzGain.gain.value = 0; } catch (e) {} return; }
    ensureBuzz();
    if (buzzGain) try { buzzGain.gain.setTargetAtTime(Math.min(0.035, level), AC.currentTime, 0.15); } catch (e) {}
  }
  const sSwat = () => { noise(0.05, 0.1); tone(160, 0.06, "square", 0.04); };
  const sKill = c => { noise(0.07, 0.12); tone(Math.min(500 + c * 60, 1600), 0.1, "square", 0.05, 200); };
  const sMiss = () => tone(120, 0.05, "triangle", 0.02);
  const sBite = () => { [880, 740, 620].forEach((f, i) => setTimeout(() => tone(f, 0.16, "sawtooth", 0.06), i * 90)); };
  const sSting = () => { noise(0.12, 0.1); tone(90, 0.3, "sawtooth", 0.07); };
  const sSenko = () => { [523, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.18, "sine", 0.05), i * 70)); };
  const sUpOpen = () => [523, 659, 784].forEach((f, i) => setTimeout(() => tone(f, 0.2, "square", 0.04), i * 70));
  const sUpPick = () => [659, 880, 1319].forEach((f, i) => setTimeout(() => tone(f, 0.22, "square", 0.05), i * 70));
  const sOver = () => [392, 311, 233, 156].forEach((f, i) => setTimeout(() => tone(f, 0.3, "sawtooth", 0.05), i * 160));
  const vibe = ms => { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} };

  /* ============ 永続化 ============ */
  const store = {
    load(k, fb) { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch { return fb; } },
    save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
  };
  let best = store.load("kataki_best", { score: 0, wave: 0 });

  /* ============ カメラ + モーション検出(フレーム差分) ============ */
  let camActive = false, camStream = null;
  const MW = 90;                            // モーション解析の解像度(高さは画面比で追従)
  let MH = 160;
  const GW = 9, GH = 12;                    // モーション集計グリッド
  const mcv = document.createElement("canvas");
  const mctx = mcv.getContext("2d", { willReadFrequently: true });
  function fitMotionCanvas() {
    MH = Math.max(60, Math.min(220, Math.round(MW * H / Math.max(1, W))));
    mcv.width = MW; mcv.height = MH;
    prevLum = null;                         // 解像度が変わったら差分をリセット
  }
  let prevLum = null;
  const motionGrid = new Float32Array(GW * GH);
  let globalMotion = 0, motionFrame = 0, camWarmup = 0;
  fitMotionCanvas();
  window.addEventListener("resize", fitMotionCanvas);

  async function startCamera() {
    if (camActive) return true;
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return false;
    try {
      camStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
      });
      video.srcObject = camStream;
      await video.play().catch(() => {});
      camActive = true; camWarmup = 30; prevLum = null;
      return true;
    } catch (e) { return false; }
  }

  /* 表示と同じミラー&cover-fitでモーション用キャンバスに描く(座標系を一致させる) */
  function drawVideoTo(c, w, h) {
    const vw = video.videoWidth, vh = video.videoHeight;
    if (!vw || !vh) return false;
    const s = Math.max(w / vw, h / vh);
    const dw = vw * s, dh = vh * s;
    c.save();
    c.translate(w, 0); c.scale(-1, 1);    // ミラー
    c.drawImage(video, (w - dw) / 2, (h - dh) / 2, dw, dh);
    c.restore();
    return true;
  }

  function processMotion() {
    if (!camActive) return;
    motionFrame++;
    if (motionFrame % 2) return;            // 1フレームおき
    if (!drawVideoTo(mctx, MW, MH)) return;
    let img;
    try { img = mctx.getImageData(0, 0, MW, MH); } catch (e) { return; }
    const d = img.data, n = MW * MH;
    if (!prevLum) { prevLum = new Uint8Array(n); for (let i = 0; i < n; i++) prevLum[i] = (d[i * 4] + 2 * d[i * 4 + 1] + d[i * 4 + 2]) >> 2; return; }
    motionGrid.fill(0);
    let total = 0;
    const cw = MW / GW, ch = MH / GH;
    for (let y = 0; y < MH; y++) {
      const gy = (y / ch) | 0;
      for (let x = 0; x < MW; x++) {
        const i = y * MW + x;
        const lum = (d[i * 4] + 2 * d[i * 4 + 1] + d[i * 4 + 2]) >> 2;
        if (Math.abs(lum - prevLum[i]) > 26) {
          motionGrid[gy * GW + ((x / cw) | 0)]++;
          total++;
        }
        prevLum[i] = lum;
      }
    }
    const cellPx = cw * ch;
    for (let i = 0; i < GW * GH; i++) motionGrid[i] /= cellPx;
    globalMotion = total / n;
    if (camWarmup > 0) camWarmup--;
  }

  /* 画面座標(x,y)・半径r内のモーション強度(最大セル値) */
  function motionAt(x, y, r) {
    if (!camActive || camWarmup > 0) return 0;
    let m = 0;
    const gx0 = Math.max(0, ((x - r) / W * GW) | 0), gx1 = Math.min(GW - 1, ((x + r) / W * GW) | 0);
    const gy0 = Math.max(0, ((y - r) / H * GH) | 0), gy1 = Math.min(GH - 1, ((y + r) / H * GH) | 0);
    for (let gy = gy0; gy <= gy1; gy++)
      for (let gx = gx0; gx <= gx1; gx++)
        m = Math.max(m, motionGrid[gy * GW + gx]);
    return m;
  }

  /* ============ ゲーム状態(全て宣言時に初期化 — ループはスタート前から回る) ============ */
  let phase = "start";                       // start | play | upgrade | over
  let score = 0, wave = 1, hp = 3, hpMax = 3;
  let kills = 0, killsNeeded = 6;
  let combo = 0, comboTimer = 0;
  let bugs = [], splats = [], particles = [], floats = [];
  let senko = null, slowT = 0, stunT = 0;
  let spawnT = 1, waveT = 0, shake = 0, flash = 0;
  let upHit = 0, upSharp = 0, upSenko = 0, upScore = 0, upHeal = 0;
  let injected = [];                          // テスト用モーション注入 [{x,y,r,s,t}]
  let lastTs = 0, newBestFlag = false;

  const rnd = (a, b) => a + Math.random() * (b - a);
  const unit = () => Math.min(W, H) / 360;    // サイズ基準

  function hitRadius() { return (34 + upHit * 8) * unit(); }
  function motionThresh() { return Math.max(0.1, 0.26 - upSharp * 0.045); }

  function resetGame() {
    score = 0; wave = 1; hp = 3; hpMax = 3;
    kills = 0; killsNeeded = 6;
    combo = 0; comboTimer = 0;
    bugs = []; splats = []; particles = []; floats = [];
    senko = null; slowT = 0; stunT = 0;
    spawnT = 0.6; waveT = 0; shake = 0; flash = 0;
    upHit = 0; upSharp = 0; upSenko = 0; upScore = 0; upHeal = 0;
    newBestFlag = false;
  }

  /* ============ 虫 ============ */
  // type: 'ka'(蚊) | 'hachi'(蜂)  state: fly | land | bite | flee
  function spawnBug(type, ambient) {
    const side = (Math.random() * 4) | 0;
    const m = 30 * unit();
    let x, y;
    if (side === 0) { x = rnd(0, W); y = -m; }
    else if (side === 1) { x = W + m; y = rnd(0, H * 0.7); }
    else if (side === 2) { x = rnd(0, W); y = H + m; }
    else { x = -m; y = rnd(0, H * 0.7); }
    bugs.push({
      type: type || "ka", state: "fly", x, y,
      tx: rnd(W * 0.15, W * 0.85), ty: rnd(H * 0.18, H * 0.8),
      vx: 0, vy: 0, t: 0, wob: rnd(0, 7),
      flyFor: ambient ? 1e9 : rnd(3.5, 6.5) / (1 + wave * 0.06),
      biteT: 0, biteDur: Math.max(1.4, 2.4 - wave * 0.08),
      r: (type === "hachi" ? 16 : 13) * unit(),
      grace: 0.45, fat: false, life: type === "hachi" ? rnd(5, 7) : 1e9,
      dead: false
    });
  }

  function killBug(b, byTouch) {
    if (b.dead) return;
    b.dead = true;
    if (b.type === "hachi") {
      stunT = 1.3; combo = 0; flash = 0.5;
      floats.push({ x: b.x, y: b.y, txt: "🐝シビれた!", t: 1.2, c: "#ffd95e" });
      sSting(); vibe([60, 40, 60]); shake = 8;
      return;
    }
    combo++; comboTimer = 2.0;
    const mult = 1 + Math.min(combo - 1, 10) * 0.25;
    const base = (b.fat ? 250 : 100) * (1 + upScore * 0.3);
    const pts = Math.round(base * mult);
    score += pts;
    kills++;
    splats.push({ x: b.x, y: b.y, t: 6, a: rnd(0, Math.PI * 2), s: b.r * rnd(1.5, 2.1) });
    for (let i = 0; i < 10; i++) {
      const a = rnd(0, Math.PI * 2), v = rnd(40, 200) * unit() / 2;
      particles.push({ x: b.x, y: b.y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, t: rnd(0.3, 0.6), c: i % 3 ? "#8e1f1f" : "#c93535" });
    }
    floats.push({ x: b.x, y: b.y - 20, txt: "+" + pts + (combo >= 3 ? " ×" + combo : ""), t: 1.0, c: combo >= 5 ? "#ff8a5c" : "#ffd95e" });
    sKill(combo); vibe(25); shake = Math.min(shake + 3, 7);
    if (phase === "play" && kills >= killsNeeded) waveClear();
  }

  /* 叩く(タッチ/モーション共通の判定) */
  function swatAt(x, y, r) {
    if (stunT > 0) return false;
    let hitAny = false;
    for (const b of bugs) {
      if (b.dead || b.grace > 0) continue;
      const dx = b.x - x, dy = b.y - y;
      if (dx * dx + dy * dy < (r + b.r) * (r + b.r)) { killBug(b); hitAny = true; }
    }
    if (senko && !senko.used) {
      const dx = senko.x - x, dy = senko.y - y;
      if (dx * dx + dy * dy < (r + senko.r) * (r + senko.r)) { activateSenko(); hitAny = true; }
    }
    return hitAny;
  }

  function activateSenko() {
    if (!senko) return;
    senko.used = true; senko = null;
    slowT = 4 + upSenko * 1.5;
    floats.push({ x: W / 2, y: H * 0.35, txt: "🌀 スロー!", t: 1.2, c: "#7fd8ff" });
    sSenko(); vibe(30);
  }

  /* ============ ウェーブ・強化 ============ */
  const UPGRADES = [
    { id: "hit", ic: "🖐️", nm: "でかい手", ds: "叩ける範囲が広がる", get lv() { return upHit; }, apply() { upHit++; } },
    { id: "sharp", ic: "⚡", nm: "鋭い反応", ds: "小さな動きでも叩ける(カメラ感度UP)", get lv() { return upSharp; }, apply() { upSharp++; } },
    { id: "senko", ic: "🌀", nm: "蚊取りマスター", ds: "蚊取り線香が出やすく、スローが長くなる", get lv() { return upSenko; }, apply() { upSenko++; } },
    { id: "heart", ic: "❤️", nm: "強心臓", ds: "最大HP+1して全回復", get lv() { return hpMax - 3; }, apply() { hpMax++; hp = hpMax; } },
    { id: "score", ic: "🩸", nm: "返り血ボーナス", ds: "獲得スコア+30%", get lv() { return upScore; }, apply() { upScore++; } },
    { id: "heal", ic: "💊", nm: "かゆみ止め", ds: "HP1回復(今すぐ)", get lv() { return upHeal; }, apply() { upHeal++; hp = Math.min(hpMax, hp + 1); } },
  ];
  function waveClear() {
    phase = "upgrade";
    bugs = bugs.filter(b => !b.dead);
    bugs.forEach(b => { b.state = "flee"; });
    score += 200 * wave;
    floats.push({ x: W / 2, y: H * 0.3, txt: "WAVE " + wave + " CLEAR! +" + 200 * wave, t: 1.5, c: "#aef25d" });
    sUpOpen();
    const pool = UPGRADES.slice().sort(() => Math.random() - 0.5).slice(0, 3);
    const box = document.getElementById("upcards");
    box.innerHTML = "";
    pool.forEach(u => {
      const el = document.createElement("div");
      el.className = "upcard";
      el.innerHTML = '<div class="ic">' + u.ic + '</div><div><span class="nm">' + u.nm + '</span><span class="lv">' + (u.lv > 0 ? "Lv" + (u.lv + 1) : "") + '</span><div class="ds">' + u.ds + '</div></div>';
      el.addEventListener("pointerdown", e => {
        e.preventDefault();
        u.apply(); sUpPick();
        document.getElementById("upgrade").classList.remove("show");
        wave++; kills = 0; killsNeeded = 5 + wave * 2;
        spawnT = 1; phase = "play";
      });
      box.appendChild(el);
    });
    document.getElementById("upgrade").classList.add("show");
  }

  function gameOver() {
    phase = "over";
    sOver(); vibe([80, 60, 120]);
    setBuzz(0);
    if (score > best.score) { best = { score, wave }; store.save("kataki_best", best); newBestFlag = true; }
    document.getElementById("finalScore").textContent = score.toLocaleString();
    document.getElementById("newBest").style.display = newBestFlag ? "block" : "none";
    document.getElementById("bestOver").textContent = "BEST " + best.score.toLocaleString() + " / WAVE " + Math.max(best.wave, 0);
    document.getElementById("over").classList.add("show");
  }

  /* ============ 更新 ============ */
  function update(dt) {
    processMotion();
    if (shake > 0) shake = Math.max(0, shake - dt * 30);
    if (flash > 0) flash = Math.max(0, flash - dt);
    if (stunT > 0) stunT -= dt;
    if (slowT > 0) slowT -= dt;
    if (comboTimer > 0) { comboTimer -= dt; if (comboTimer <= 0) combo = 0; }
    const slow = slowT > 0 ? 0.35 : 1;

    /* スタート/オーバー画面では雰囲気用の蚊だけ飛ばす */
    if (phase !== "play") {
      if (bugs.length < 3 && Math.random() < dt * 0.5) spawnBug("ka", true);
    } else {
      /* 出現 */
      spawnT -= dt;
      const maxBugs = Math.min(3 + Math.floor(wave / 2), 8);
      if (spawnT <= 0 && bugs.filter(b => !b.dead).length < maxBugs) {
        const hachiP = wave >= 2 ? Math.min(0.08 + wave * 0.025, 0.3) : 0;
        spawnBug(Math.random() < hachiP ? "hachi" : "ka");
        spawnT = Math.max(0.5, rnd(1.2, 2.2) - wave * 0.07);
      }
      /* 蚊取り線香 */
      if (!senko && slowT <= 0 && Math.random() < dt * (0.025 + upSenko * 0.02)) {
        senko = { x: rnd(W * 0.2, W * 0.8), y: rnd(H * 0.25, H * 0.7), r: 22 * unit(), t: 6, used: false };
      }
      if (senko) { senko.t -= dt; if (senko.t <= 0) senko = null; }
    }

    /* 虫の更新 */
    for (const b of bugs) {
      if (b.dead) continue;
      b.t += dt; b.grace = Math.max(0, b.grace - dt);
      b.life -= dt;
      const sp = (b.type === "hachi" ? 150 : 90) * (1 + wave * 0.05) * slow * unit();
      if (b.state === "fly") {
        b.flyFor -= dt;
        const dx = b.tx - b.x, dy = b.ty - b.y, dist = Math.hypot(dx, dy) || 1;
        if (dist < 20 * unit()) { b.tx = rnd(W * 0.1, W * 0.9); b.ty = rnd(H * 0.15, H * 0.85); }
        b.vx += (dx / dist * sp - b.vx) * Math.min(1, dt * 3);
        b.vy += (dy / dist * sp - b.vy) * Math.min(1, dt * 3);
        b.x += b.vx * dt + Math.sin(b.t * 11 + b.wob) * 36 * unit() * dt;
        b.y += b.vy * dt + Math.cos(b.t * 9 + b.wob) * 30 * unit() * dt;
        if (phase === "play" && b.type === "ka" && b.flyFor <= 0) {
          b.state = "land";
          b.tx = rnd(W * 0.2, W * 0.8); b.ty = rnd(H * 0.3, H * 0.85);
        }
        if (b.type === "hachi" && b.life <= 0) b.state = "flee";
      } else if (b.state === "land") {
        const dx = b.tx - b.x, dy = b.ty - b.y, dist = Math.hypot(dx, dy) || 1;
        b.x += dx / dist * sp * 1.2 * dt; b.y += dy / dist * sp * 1.2 * dt;
        if (dist < 6 * unit()) { b.state = "bite"; b.biteT = 0; sBite(); }
      } else if (b.state === "bite") {
        b.biteT += dt * slow;
        if (b.biteT >= b.biteDur) {
          b.state = "flee"; b.fat = true;
          hp--; flash = 0.7; shake = 10;
          floats.push({ x: b.x, y: b.y - 24, txt: "刺された! -1", t: 1.3, c: "#ff5c5c" });
          sSting(); vibe([80, 50, 80]);
          if (hp <= 0) { gameOver(); return; }
        }
      } else if (b.state === "flee") {
        b.y -= sp * 1.6 * dt; b.x += Math.sin(b.t * 10) * 50 * unit() * dt;
        if (b.y < -60 * unit()) b.dead = true;
      }
    }
    bugs = bugs.filter(b => !b.dead);

    /* カメラモーションによる叩き判定 */
    if (phase === "play" && camActive && stunT <= 0 && globalMotion < 0.5) {
      const th = motionThresh();
      for (const b of bugs) {
        if (b.dead || b.grace > 0) continue;
        const m = motionAt(b.x, b.y, hitRadius());
        if (m > th && m > globalMotion * 1.8 + 0.06) killBug(b);
      }
      if (senko && !senko.used) {
        const m = motionAt(senko.x, senko.y, hitRadius());
        if (m > th && m > globalMotion * 1.8 + 0.06) activateSenko();
      }
    }
    /* テスト用注入モーション */
    if (injected.length) {
      for (const inj of injected) { inj.t -= dt; swatAt(inj.x, inj.y, inj.r); }
      injected = injected.filter(i => i.t > 0);
    }

    /* エフェクト */
    for (const p of particles) { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 500 * unit() * dt; p.t -= dt; }
    particles = particles.filter(p => p.t > 0);
    for (const f of floats) { f.y -= 36 * unit() * dt; f.t -= dt; }
    floats = floats.filter(f => f.t > 0);
    for (const s of splats) s.t -= dt;
    splats = splats.filter(s => s.t > 0);

    setBuzz(phase === "play" ? bugs.filter(b => !b.dead && b.type === "ka").length * 0.01 : bugs.length * 0.004);
  }

  /* ============ 描画 ============ */
  function drawBug(b) {
    /* 実写映像の上でも視認できるよう淡い光彩を背後に敷く */
    ctx.fillStyle = b.type === "hachi" ? "rgba(255,220,80,.22)" : "rgba(220,235,255,.20)";
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 2.1, 0, 7); ctx.fill();
    ctx.save();
    ctx.translate(b.x, b.y);
    const ang = Math.atan2(b.vy, b.vx || 0.01);
    if (b.state === "fly" || b.state === "land" || b.state === "flee") ctx.rotate(ang + Math.PI / 2);
    const r = b.r * (b.fat ? 1.3 : 1);
    const wing = Math.sin(b.t * 60) * 0.9;
    if (b.type === "hachi") {
      /* 蜂 */
      ctx.fillStyle = "rgba(230,230,255,.55)";
      ctx.save(); ctx.rotate(wing * 0.5);
      ctx.beginPath(); ctx.ellipse(-r * 0.8, -r * 0.2, r * 0.75, r * 0.35, -0.5, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(r * 0.8, -r * 0.2, r * 0.75, r * 0.35, 0.5, 0, 7); ctx.fill();
      ctx.restore();
      ctx.fillStyle = "#ffce33";
      ctx.beginPath(); ctx.ellipse(0, 0, r * 0.55, r * 0.8, 0, 0, 7); ctx.fill();
      ctx.strokeStyle = "#221b08"; ctx.lineWidth = r * 0.22;
      for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(-r * 0.5, i * r * 0.3); ctx.lineTo(r * 0.5, i * r * 0.3); ctx.stroke(); }
      ctx.fillStyle = "#221b08";
      ctx.beginPath(); ctx.moveTo(0, r * 0.9); ctx.lineTo(-r * 0.16, r * 0.65); ctx.lineTo(r * 0.16, r * 0.65); ctx.fill();
    } else {
      /* 蚊 */
      ctx.fillStyle = "rgba(220,228,255,.5)";
      ctx.save(); ctx.rotate(wing * 0.6);
      ctx.beginPath(); ctx.ellipse(-r * 0.7, -r * 0.1, r * 0.8, r * 0.28, -0.4, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.ellipse(r * 0.7, -r * 0.1, r * 0.8, r * 0.28, 0.4, 0, 7); ctx.fill();
      ctx.restore();
      ctx.strokeStyle = "#1c2030"; ctx.lineWidth = Math.max(1, r * 0.1);
      for (let i = 0; i < 3; i++) {
        const la = -0.5 + i * 0.5;
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(Math.cos(la + 1.8) * r, Math.sin(la + 1.8) * r, Math.cos(la + 1.6) * r * 1.5, Math.sin(la + 1.6) * r * 1.5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.quadraticCurveTo(-Math.cos(la + 1.8) * r, Math.sin(la + 1.8) * r, -Math.cos(la + 1.6) * r * 1.5, Math.sin(la + 1.6) * r * 1.5); ctx.stroke();
      }
      ctx.fillStyle = b.fat ? "#7e2430" : "#2a2f42";
      ctx.beginPath(); ctx.ellipse(0, r * 0.25, r * 0.32, r * 0.62, 0, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(0, -r * 0.45, r * 0.28, 0, 7); ctx.fill();
      ctx.strokeStyle = "#2a2f42"; ctx.lineWidth = Math.max(1, r * 0.12);
      ctx.beginPath(); ctx.moveTo(0, -r * 0.65); ctx.lineTo(0, -r * 1.15); ctx.stroke();
    }
    ctx.restore();
    /* 吸血リング */
    if (b.state === "bite") {
      const p = 1 - b.biteT / b.biteDur;
      ctx.strokeStyle = p > 0.4 ? "#ffd95e" : "#ff5c5c";
      ctx.lineWidth = 3 * unit();
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 1.9, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * p); ctx.stroke();
      ctx.font = "900 " + 11 * unit() + "px 'Zen Kaku Gothic New'";
      ctx.fillStyle = "#ff8a8a"; ctx.textAlign = "center";
      ctx.fillText("吸血中!", b.x, b.y - b.r * 2.4);
    }
  }

  function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);  // 毎フレーム再設定(コンテキスト喪失対策)
    const sx = shake > 0 ? rnd(-shake, shake) : 0, sy = shake > 0 ? rnd(-shake, shake) : 0;
    ctx.translate(sx, sy);

    /* 背景: カメラ映像 or 部屋イラスト */
    if (camActive && video.videoWidth) {
      drawVideoTo(ctx, W, H);
      ctx.fillStyle = "rgba(8,10,18,.22)";
      ctx.fillRect(-20, -20, W + 40, H + 40);
    } else {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#101626"); g.addColorStop(0.6, "#181430"); g.addColorStop(1, "#251a30");
      ctx.fillStyle = g; ctx.fillRect(-20, -20, W + 40, H + 40);
      /* 窓と月 */
      ctx.fillStyle = "#0a1020"; ctx.fillRect(W * 0.55, H * 0.08, W * 0.34, H * 0.26);
      ctx.fillStyle = "#f5e9b8"; ctx.beginPath(); ctx.arc(W * 0.72, H * 0.17, 16 * unit(), 0, 7); ctx.fill();
      ctx.strokeStyle = "#33405c"; ctx.lineWidth = 4 * unit();
      ctx.strokeRect(W * 0.55, H * 0.08, W * 0.34, H * 0.26);
      ctx.beginPath(); ctx.moveTo(W * 0.72, H * 0.08); ctx.lineTo(W * 0.72, H * 0.34); ctx.stroke();
    }

    /* スロー中の演出 */
    if (slowT > 0) {
      ctx.fillStyle = "rgba(80,170,255,.10)"; ctx.fillRect(-20, -20, W + 40, H + 40);
    }

    /* 潰し跡 */
    for (const s of splats) {
      ctx.save(); ctx.translate(s.x, s.y); ctx.rotate(s.a);
      ctx.globalAlpha = Math.min(1, s.t / 2) * 0.85;
      ctx.fillStyle = "#8e1f1f";
      for (let i = 0; i < 7; i++) {
        const a = i / 7 * Math.PI * 2;
        ctx.beginPath(); ctx.ellipse(Math.cos(a) * s.s * 0.4, Math.sin(a) * s.s * 0.4, s.s * 0.28, s.s * 0.14, a, 0, 7); ctx.fill();
      }
      ctx.beginPath(); ctx.arc(0, 0, s.s * 0.34, 0, 7); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;

    /* 蚊取り線香 */
    if (senko) {
      ctx.save(); ctx.translate(senko.x, senko.y);
      const blink = senko.t < 2 ? (Math.sin(senko.t * 12) > 0 ? 1 : 0.35) : 1;
      ctx.globalAlpha = blink;
      ctx.strokeStyle = "#2f8c4f"; ctx.lineWidth = 5 * unit();
      ctx.beginPath();
      for (let a = 0; a < Math.PI * 5; a += 0.1) {
        const rr = senko.r * (0.15 + a / (Math.PI * 5) * 0.85);
        const px = Math.cos(a) * rr, py = Math.sin(a) * rr;
        a === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.fillStyle = "#ff7a3c"; ctx.beginPath(); ctx.arc(-senko.r, 0, 4 * unit(), 0, 7); ctx.fill();
      ctx.globalAlpha = blink * 0.9;
      ctx.font = "900 " + 10 * unit() + "px 'Zen Kaku Gothic New'";
      ctx.fillStyle = "#bff0cf"; ctx.textAlign = "center";
      ctx.fillText("叩いてスロー!", 0, senko.r + 16 * unit());
      ctx.restore(); ctx.globalAlpha = 1;
    }

    /* 虫 */
    for (const b of bugs) if (!b.dead) drawBug(b);

    /* パーティクル */
    for (const p of particles) {
      ctx.globalAlpha = Math.min(1, p.t * 3);
      ctx.fillStyle = p.c;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3 * unit(), 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    /* フロートテキスト */
    for (const f of floats) {
      ctx.globalAlpha = Math.min(1, f.t * 2);
      ctx.font = "900 " + 15 * unit() + "px 'Zen Kaku Gothic New'";
      ctx.textAlign = "center";
      ctx.lineWidth = 4; ctx.strokeStyle = "rgba(0,0,0,.6)";
      ctx.strokeText(f.txt, f.x, f.y);
      ctx.fillStyle = f.c; ctx.fillText(f.txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;

    /* 被ダメ・シビれフラッシュ */
    if (flash > 0) {
      ctx.fillStyle = stunT > 0 ? "rgba(255,217,94," + flash * 0.25 + ")" : "rgba(255,40,40," + flash * 0.3 + ")";
      ctx.fillRect(-20, -20, W + 40, H + 40);
    }
    if (stunT > 0 && phase === "play") {
      ctx.font = "900 " + 22 * unit() + "px 'Zen Kaku Gothic New'";
      ctx.textAlign = "center"; ctx.fillStyle = "#ffd95e";
      ctx.fillText("シビれて動けない…", W / 2, H * 0.45);
    }

    /* HUD */
    if (phase === "play" || phase === "upgrade") {
      const top = 14 + safeTop;
      ctx.font = "900 " + 16 * unit() + "px 'Zen Kaku Gothic New'";
      ctx.textAlign = "left";
      let hearts = "";
      for (let i = 0; i < hpMax; i++) hearts += i < hp ? "❤️" : "🖤";
      ctx.fillText(hearts, 12, top + 16 * unit());
      ctx.textAlign = "center";
      ctx.font = "700 " + 20 * unit() + "px 'Space Mono'";
      ctx.fillStyle = "#ffd95e";
      ctx.lineWidth = 4; ctx.strokeStyle = "rgba(0,0,0,.55)";
      ctx.strokeText(score.toLocaleString(), W / 2, top + 18 * unit());
      ctx.fillText(score.toLocaleString(), W / 2, top + 18 * unit());
      ctx.textAlign = "right";
      ctx.font = "900 " + 12 * unit() + "px 'Zen Kaku Gothic New'";
      ctx.fillStyle = "#d8f5ad";
      ctx.strokeText("WAVE " + wave + "  " + kills + "/" + killsNeeded, W - 12, top + 14 * unit());
      ctx.fillText("WAVE " + wave + "  " + kills + "/" + killsNeeded, W - 12, top + 14 * unit());
      if (combo >= 2) {
        ctx.textAlign = "center";
        ctx.font = "900 " + 14 * unit() + "px 'Zen Kaku Gothic New'";
        ctx.fillStyle = "#ff8a5c";
        ctx.strokeText(combo + " COMBO!", W / 2, top + 36 * unit());
        ctx.fillText(combo + " COMBO!", W / 2, top + 36 * unit());
      }
      if (slowT > 0) {
        ctx.textAlign = "center";
        ctx.font = "900 " + 12 * unit() + "px 'Zen Kaku Gothic New'";
        ctx.fillStyle = "#7fd8ff";
        ctx.fillText("🌀 スロー " + slowT.toFixed(1), W / 2, H - 18 * unit() - safeBottom);
      }
      if (camActive) {
        ctx.textAlign = "left";
        ctx.font = "700 " + 9 * unit() + "px 'Space Mono'";
        ctx.fillStyle = globalMotion > 0.5 ? "#ff8a5c" : "rgba(190,210,170,.7)";
        ctx.fillText("📷 motion", 12, H - 14 * unit() - safeBottom);
      }
    }
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }
  let safeTop = 0, safeBottom = 0;
  function readSafeArea() {
    try {
      const cs = getComputedStyle(document.getElementById("safeprobe"));
      safeTop = parseFloat(cs.paddingTop) || 0;
      safeBottom = parseFloat(cs.paddingBottom) || 0;
    } catch (e) {}
  }
  readSafeArea();
  window.addEventListener("resize", readSafeArea);

  /* ============ メインループ(スタート画面から回す) ============ */
  function loop(ts) {
    const dt = Math.min(0.05, (ts - lastTs) / 1000 || 0.016);
    lastTs = ts;
    try { update(dt); draw(); } catch (e) { /* 1フレームの例外でループを殺さない */ if (window.__KATAKI__) window.__KATAKI__.lastError = String(e && e.stack || e); }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  /* ============ 入力(Pointer Events / clickには依存しない) ============ */
  cvs.addEventListener("pointerdown", e => {
    e.preventDefault();
    if (phase !== "play") return;
    const r = cvs.getBoundingClientRect();
    const x = e.clientX - r.left, y = e.clientY - r.top;
    const hit = swatAt(x, y, hitRadius());
    if (!hit) {
      sMiss();
      particles.push({ x, y, vx: 0, vy: 0, t: 0.25, c: "rgba(255,255,255,.7)" });
    }
  }, { passive: false });

  window.addEventListener("keydown", e => {
    if (e.code === "Space" || e.code === "Enter") {
      if (phase === "start") beginGame(false);
      else if (phase === "over") retry();
    }
  });

  /* ============ 画面遷移 ============ */
  async function beginGame(withCam) {
    const hint = document.getElementById("camhint");
    if (withCam) {
      hint.style.display = "block";
      const ok = await startCamera();
      hint.style.display = "none";
      if (!ok) {
        hint.textContent = "カメラを使えないため、タッチモードで開始します";
        hint.style.display = "block";
        await new Promise(r => setTimeout(r, 900));
      }
    }
    document.getElementById("start").classList.remove("show");
    resetGame();
    phase = "play";
  }
  function retry() {
    document.getElementById("over").classList.remove("show");
    resetGame();
    phase = "play";
  }
  document.getElementById("btnCam").addEventListener("pointerdown", e => { e.preventDefault(); beginGame(true); });
  document.getElementById("btnTouch").addEventListener("pointerdown", e => { e.preventDefault(); beginGame(false); });
  document.getElementById("btnRetry").addEventListener("pointerdown", e => { e.preventDefault(); retry(); });

  document.getElementById("bestStart").textContent = best.score > 0 ? "BEST " + best.score.toLocaleString() + " / WAVE " + best.wave : "";

  const muteBtn = document.getElementById("mute");
  muteBtn.addEventListener("pointerdown", e => {
    e.preventDefault(); e.stopPropagation();
    muted = !muted;
    muteBtn.textContent = muted ? "🔇" : "🔊";
    if (muted && buzzGain) { try { buzzGain.gain.value = 0; } catch (err) {} }
  });

  /* 非表示中はバズ音停止 */
  document.addEventListener("visibilitychange", () => { if (document.hidden) setBuzz(0); });

  /* ============ テスト用フック(読み取り + テスト入力) ============ */
  window.__KATAKI__ = {
    get phase() { return phase; },
    get score() { return score; },
    get hp() { return hp; },
    get wave() { return wave; },
    get kills() { return kills; },
    get killsNeeded() { return killsNeeded; },
    get combo() { return combo; },
    get camActive() { return camActive; },
    get globalMotion() { return globalMotion; },
    bugs: () => bugs.filter(b => !b.dead).map(b => ({ type: b.type, state: b.state, x: b.x, y: b.y, grace: b.grace })),
    senko: () => senko ? { x: senko.x, y: senko.y } : null,
    swat: (x, y) => swatAt(x, y, hitRadius()),
    injectMotion: (x, y, dur) => injected.push({ x, y, r: hitRadius(), t: dur || 0.1 }),
    forceSpawn: t => spawnBug(t || "ka"),
    forceBitePhase: () => { for (const b of bugs) if (b.type === "ka" && !b.dead) { b.state = "bite"; b.biteT = 0; b.grace = 0; } },
    size: () => ({ W, H }),
    lastError: null
  };
})();
</script>
</body>
</html>
