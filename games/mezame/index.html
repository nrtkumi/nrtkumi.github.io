<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

<meta property="og:title" content="MEZAME -1/8192-">
<meta property="og:description" content="2つの扉から1つを選び続けろ。13回連続で当てれば目覚める。確率は1/8192。外せば夢の最深層へ墜落する。">

<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; touch-action: manipulation; }
  html, body {
    margin: 0; padding: 0;
    background: #020108;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    font-family: "Zen Kaku Gothic New", sans-serif;
    color: #fff;
  }
  /* PCワイド画面対策: 縦長カラムに制限して中央寄せ */
  #stage {
    position: fixed; top: 0; bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: min(100vw, 520px, 64vh);
    background: linear-gradient(180deg, #04030d, #0b0820); /* WebGL不可時のフォールバック背景 */
    box-shadow: 0 0 60px rgba(0,0,0,0.85);
    padding-top: var(--sat);
    padding-bottom: var(--sab);
  }
  #cv {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
    touch-action: none;
  }
  #mute {
    position: absolute;
    top: calc(var(--sat) + 10px); right: 12px;
    z-index: 30;
    width: 42px; height: 42px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    background: rgba(10,7,24,0.75);
    color: #fff; font-size: 19px;
    cursor: pointer;
    touch-action: none;
  }
  /* ---------- DOM HUD(3Dの上に重ねる) ---------- */
  #hud {
    position: absolute; inset: 0;
    z-index: 5;
    pointer-events: none;
    padding-top: var(--sat);
    opacity: 0;
    transition: opacity 0.4s;
  }
  #stage[data-phase="play"] #hud,
  #stage[data-phase="suspense"] #hud,
  #stage[data-phase="ascend"] #hud,
  #stage[data-phase="fall"] #hud { opacity: 1; }
  #hudTop { text-align: center; margin-top: 16px; }
  #layerRow {
    display: flex; align-items: center; justify-content: center; gap: 11px;
    font-weight: 700; font-size: 13px; color: rgba(255,255,255,0.92);
  }
  #layerNum {
    font-family: "Bungee", cursive;
    font-size: 42px; line-height: 1;
    text-shadow: 0 0 18px currentColor;
  }
  #layerName { font-weight: 500; font-size: 14px; color: rgba(255,255,255,0.78); margin-top: 3px; }
  #orbs { display: flex; justify-content: center; gap: 6px; margin-top: 9px; }
  .orb {
    width: 13px; height: 13px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.22);
  }
  .orb.on { border: none; box-shadow: 0 0 9px currentColor; background: currentColor; }
  #prob {
    font-family: "Space Mono", monospace;
    font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 9px;
  }
  #bannerWrap {
    position: absolute; left: 0; right: 0; top: 24%;
    display: flex; flex-direction: column; align-items: center; gap: 7px;
  }
  .banner {
    opacity: 0;
    animation: bnr var(--life, 1.5s) ease forwards;
    animation-delay: var(--delay, 0s);
    text-shadow: 0 0 14px currentColor;
    font-weight: 700;
  }
  @keyframes bnr {
    0% { opacity: 0; transform: translateY(10px); }
    12% { opacity: 1; transform: none; }
    70% { opacity: 1; }
    100% { opacity: 0; transform: translateY(-12px); }
  }
  .b-big { font-family: "Bungee", cursive; font-size: 30px; color: #fff; font-weight: 400; }
  .b-odds { font-size: 14px; }
  .b-mile { font-size: 17px; color: #ffd9a0; }
  .b-diary { font-size: 13px; color: #cdb8ff; }
  #fallBox {
    position: absolute; left: 0; right: 0; top: 36%;
    text-align: center;
    opacity: 0; transition: opacity 0.25s;
  }
  #stage[data-phase="fall"] #fallBox { opacity: 1; }
  #fallBox .f1 {
    font-family: "Bungee", cursive;
    font-size: 27px; color: #ff5a6e;
    text-shadow: 0 0 22px rgba(255,58,78,0.9);
    animation: fallPulse 0.5s infinite alternate;
  }
  @keyframes fallPulse { from { transform: scale(1); } to { transform: scale(1.06); } }
  #fallBox .f2 { font-weight: 700; font-size: 15px; color: rgba(255,255,255,0.88); margin-top: 8px; }
  #hint {
    position: absolute; left: 0; right: 0; bottom: calc(var(--sab) + 40px);
    text-align: center;
    font-weight: 500; font-size: 13px; color: rgba(255,255,255,0.6);
    opacity: 0; transition: opacity 0.4s;
  }
  #stage[data-phase="play"] #hint { opacity: 1; }
  #stats {
    position: absolute; left: 0; right: 0; bottom: calc(var(--sab) + 14px);
    text-align: center;
    font-family: "Space Mono", monospace;
    font-size: 11.5px; color: rgba(255,255,255,0.4);
  }
  #vign {
    position: absolute; inset: 0; z-index: 4;
    pointer-events: none;
    background: radial-gradient(ellipse 75% 60% at 50% 50%, transparent 40%, rgba(0,0,0,0.85) 100%);
    opacity: 0;
  }
  #flash {
    position: absolute; inset: 0; z-index: 6;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.55s ease-out;
  }
  /* ---------- オーバーレイ ---------- */
  .ov {
    position: fixed; inset: 0;
    z-index: 20;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 13px;
    background: rgba(4,3,13,0.94);
    padding: calc(var(--sat) + 16px) 18px calc(var(--sab) + 16px);
    text-align: center;
  }
  .hidden { display: none !important; }
  .kv {
    width: min(58vw, 230px, 26vh);
    border-radius: 18px;
    border: 2px solid rgba(155,127,232,0.45);
    box-shadow: 0 10px 40px rgba(0,0,0,0.7), 0 0 34px rgba(155,127,232,0.2);
    pointer-events: none;
  }
  .kv-light { border-color: rgba(255,224,160,0.55); box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 44px rgba(255,224,160,0.3); }
  .title {
    font-family: "Bungee", cursive;
    font-size: clamp(36px, 12vw, 58px);
    line-height: 1.02;
    margin: 0;
    background: linear-gradient(160deg, #cdb8ff 0%, #7f6fe0 45%, #ffd9a0 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 16px rgba(155,127,232,0.4));
  }
  .sub {
    font-family: "Space Mono", monospace;
    letter-spacing: 0.34em;
    font-size: 13px; color: #8d82c0;
    margin: -6px 0 0;
  }
  .desc { font-size: 13.5px; color: #d6d0ee; line-height: 1.95; margin: 2px 0; max-width: 430px; }
  .desc b { color: #ffd9a0; }
  .desc .bad { color: #ff7a8a; font-weight: 700; }
  .stat {
    font-family: "Space Mono", monospace;
    font-size: 12.5px; color: #8d82c0;
    line-height: 1.8; margin: 0;
  }
  .stat b { color: #fff; font-size: 15px; }
  .kbd { font-size: 11.5px; color: #5f578a; margin-top: 0; }
  .btn {
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-weight: 700; font-size: 18px;
    color: #16102e;
    background: linear-gradient(135deg, #cdb8ff, #8d7ae8);
    border: none; border-radius: 16px;
    padding: 15px 46px;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(141,122,232,0.45);
    touch-action: none;
  }
  .btn:active { transform: scale(0.96); }
  .btn-sub {
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-weight: 500; font-size: 14px;
    color: #cdc4ec;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(205,184,255,0.35);
    border-radius: 13px;
    padding: 10px 28px;
    cursor: pointer;
    touch-action: none;
  }
  .btn-sub:active { transform: scale(0.96); }
  .btn-gold {
    color: #2e1d08;
    background: linear-gradient(135deg, #ffe9b8, #ffb86a);
    box-shadow: 0 6px 24px rgba(255,184,106,0.45);
  }
  #awakenTitle {
    font-family: "Bungee", cursive;
    font-size: clamp(34px, 11vw, 54px);
    margin: 0;
    color: #fff4d8;
    text-shadow: 0 0 30px rgba(255,224,160,0.8), 0 0 70px rgba(255,184,106,0.5);
  }
  .odds {
    font-family: "Space Mono", monospace;
    font-size: 17px; color: #ffd9a0; font-weight: 700;
    margin: 0;
  }
  /* 夢日記 */
  #diaryOv { justify-content: flex-start; overflow-y: auto; gap: 10px; }
  #diaryOv h2 {
    font-family: "Bungee", cursive;
    font-size: 24px; margin: 6px 0 0; color: #cdb8ff;
    text-shadow: 0 0 18px rgba(155,127,232,0.5);
  }
  #diaryOv .lead { font-size: 12px; color: #8d82c0; margin: -4px 0 4px; }
  .entry {
    width: min(88vw, 420px);
    text-align: left;
    background: rgba(255,255,255,0.045);
    border: 1.5px solid rgba(155,127,232,0.28);
    border-radius: 14px;
    padding: 11px 15px;
  }
  .entry .lh {
    display: flex; align-items: baseline; gap: 9px;
    font-family: "Space Mono", monospace;
    font-size: 12px; color: #8d82c0;
  }
  .entry .lh b { font-family: "Zen Kaku Gothic New", sans-serif; font-size: 15px; color: #ffd9a0; }
  .entry p { margin: 5px 0 0; font-size: 12.5px; line-height: 1.8; color: #d6d0ee; }
  .entry.locked { opacity: 0.45; }
  .entry.locked .lh b { color: #6f6694; }
  .entry.gold { border-color: rgba(255,224,160,0.5); background: rgba(255,224,160,0.06); }
</style>
</head>
<body>
<div id="stage" data-phase="title">
  <canvas id="cv"></canvas>
  <div id="vign"></div>
  <div id="hud">
    <div id="hudTop">
      <div id="layerRow"><span>第</span><span id="layerNum">13</span><span>層</span></div>
      <div id="layerName">忘却の底</div>
      <div id="orbs"></div>
      <div id="prob">目覚めまで 1/8192</div>
    </div>
    <div id="bannerWrap"></div>
    <div id="fallBox"><div class="f1">FALL</div><div class="f2" id="fallMsg"></div></div>
    <div id="hint">どちらかの扉が、上の層へつながっている</div>
    <div id="stats"></div>
  </div>
  <div id="flash"></div>
  <button id="mute" aria-label="ミュート">🔊</button>
</div>

<div id="titleOv" class="ov">
  <img class="kv" src="assets/keyvisual.jpg" alt="" onerror="this.style.display='none'">
  <h1 class="title">MEZAME</h1>
  <p class="sub">1 / 8192</p>
  <p class="desc">
    あなたは夢の最深層・<b>第13層</b>で眠っている。<br>
    毎夜あらわれる、二つの扉。当たりはちょうど半分。<br>
    <b>13回連続</b>で正しい扉を選べば——目覚める。<br>
    外せば<span class="bad">最深層へ墜落</span>。その確率、<b>1/8192</b>。
  </p>
  <p class="stat" id="titleStat"></p>
  <button class="btn" id="startBtn">眠りにつく</button>
  <button class="btn-sub" id="diaryBtn">夢日記</button>
  <p class="kbd">PC: ←→ / A・D で扉を選ぶ / Space 開始</p>
</div>

<div id="diaryOv" class="ov hidden">
  <h2>夢日記</h2>
  <p class="lead">初めて辿り着いた層の記憶が、ここに残る</p>
  <div id="diaryList" style="display:flex;flex-direction:column;gap:9px;"></div>
  <button class="btn-sub" id="diaryClose" style="margin:8px 0 14px;">とじる</button>
</div>

<div id="awakenOv" class="ov hidden">
  <img class="kv kv-light" src="assets/awaken.jpg" alt="" onerror="this.style.display='none'">
  <h2 id="awakenTitle">目覚めた。</h2>
  <p class="odds">1 / 8192</p>
  <p class="desc" id="awakenText"></p>
  <p class="stat" id="awakenStat"></p>
  <button class="btn btn-gold" id="againBtn">もう一度、眠る</button>
  <button class="btn-sub" id="awakenDiaryBtn">夢日記</button>
</div>

<script>
(() => {
  "use strict";
  // ロジック層: ゲーム状態・進行・音・永続化・DOM HUD。描画(3D)は別モジュールが
  // window.__MEZ_BRIDGE__ を読むだけのビューとして分離(3Dが読めなくても遊べる)。
  const $ = id => document.getElementById(id);
  const stage = $("stage");

  /* ---------- 定数: 十三層の夢 ---------- */
  const GOAL = 13;
  // index = 現在の連勝数(その時いる層)。layer = 13 - streak
  const LAYERS = [
    { layer: 13, name: "忘却の底",   top: "#04030d", bot: "#0b0820", acc: "#5a4d96" },
    { layer: 12, name: "沈黙の海",   top: "#040618", bot: "#0a1638", acc: "#4468b8" },
    { layer: 11, name: "骨の庭",     top: "#0a0a1a", bot: "#1c1636", acc: "#8a7cb4" },
    { layer: 10, name: "鏡の沼",     top: "#081224", bot: "#143048", acc: "#54aed0" },
    { layer: 9,  name: "月の回廊",   top: "#120e2c", bot: "#2a1e54", acc: "#a98ef2" },
    { layer: 8,  name: "囁きの森",   top: "#0a1c1a", bot: "#163a30", acc: "#62d0a2" },
    { layer: 7,  name: "逆さの街",   top: "#1c1030", bot: "#3a2456", acc: "#cf8ae0" },
    { layer: 6,  name: "硝子の塔",   top: "#0e1a34", bot: "#28426c", acc: "#86c2f0" },
    { layer: 5,  name: "黄昏の駅",   top: "#281434", bot: "#52284a", acc: "#f08ab4" },
    { layer: 4,  name: "暁の海岸",   top: "#2e1a34", bot: "#643652", acc: "#ffa888" },
    { layer: 3,  name: "光の梯子",   top: "#342446", bot: "#75525c", acc: "#ffca74" },
    { layer: 2,  name: "白い部屋",   top: "#403656", bot: "#8a7a80", acc: "#ffe2a8" },
    { layer: 1,  name: "まぶたの裏", top: "#4e4468", bot: "#a8968e", acc: "#fff2cc" },
    { layer: 0,  name: "目覚め",     top: "#9a86a0", bot: "#ffe8c0", acc: "#fffbe8" },
  ];
  const DIARY = [
    "ここがいちばん深い場所。名前も、帰り方も、ぜんぶ置いてきた。ただ、二つの扉だけがいつも待っている。",
    "音のない海を、巨大な魚の影がゆっくり横切っていく。誰かを呼んだ気がしたけれど、声は泡になって消えた。",
    "白い骨でできた花が咲いている。土の代わりに、折れた時計の針が敷きつめられていた。",
    "沼の面に映る自分は、こちらより少しだけ先に瞬きをする。",
    "廊下の窓ぜんぶに、満ち欠けの違う月が掛かっている。13番目の窓だけ、カーテンが閉まっていた。",
    "木々がわたしの昔の名前を囁き交わしている。聞き取れそうで、聞き取れない。",
    "空に根を張った街。住人はみんな、落ちてしまわないように夢の続きを口に咥えて歩いている。",
    "踏むたびに足元が薄く鳴る。下を見ると、いままで墜ちてきた夜が全部積もっていた。",
    "誰も乗らない電車が定刻どおりに来る。行き先表示には「あさ」とだけ書いてある。",
    "波が引くたび、砂浜に知らない記憶が打ち上げられる。拾うと少しだけ胸が痛い。",
    "雲の裂け目から光の梯子が降りている。一段のぼるごとに、体が軽く、薄くなっていく。",
    "なにもない白い部屋。ただ、目覚まし時計がひとつ、鳴る直前のかたちで止まっている。",
    "もう、まぶた一枚の向こうに朝がある。光が透けて、世界がオレンジ色ににじむ。",
    "8192分の1の朝。カーテンの隙間の光がまぶしくて、夢の名前をぜんぶ忘れた。それでいい。",
  ];
  const SIGILS = ["☾", "☀", "✶", "◯", "△", "▽", "✕", "∞", "✦", "❖"];
  const MILESTONES = { 5: "1/32 — 夢が薄れていく", 8: "1/256 — 光が見えてきた", 10: "1/1024 — もうすぐ目覚める", 12: "1/4096 — あと、ひとつ。" };
  const SUS_BASE = 0.85, SUS_PER = 0.11, SUS_MAX = 2.1;
  const ASC_DUR = 0.9, FALL_DUR = 1.7;

  /* ---------- 永続化 ---------- */
  const LS = "mezame_";
  function lsGet(k, d) { try { const v = localStorage.getItem(LS + k); return v === null ? d : +v; } catch (e) { return d; } }
  function lsSet(k, v) { try { localStorage.setItem(LS + k, String(v)); } catch (e) {} }
  let totalPicks = lsGet("picks", 0);
  let totalFalls = lsGet("falls", 0);
  let bestStreak = lsGet("best", 0);
  let awakenCount = lsGet("awaken", 0);
  let diaryBits = lsGet("diary", 1); // bit n = DIARY[n] 解禁。第13層(0)は最初から
  let muted = false;
  try { muted = localStorage.getItem(LS + "muted") === "1"; } catch (e) {}

  /* ---------- ゲーム状態(ループが触るものは全て宣言時に初期化) ---------- */
  let phase = "title";       // title | play | suspense | ascend | fall | awaken
  let streak = 0;            // 現在の連勝 = 13 - 現在の層
  let chosen = -1;           // 0=左 1=右
  let outcome = false;       // この選択が当たりか
  let correctSide = 0;       // 演出用: 当たりだった扉
  let phaseT = 0;            // 現フェーズ経過秒
  let susDur = SUS_BASE;
  let fallFrom = 0;          // 墜落開始時のstreak
  let sigilL = "☾", sigilR = "☀";
  let runPicks = 0;          // 今回の眠り(セッション)内の選択数
  let rigQueue = [];         // テスト用: 次の結果を強制
  let now = 0, lastT = 0;
  let heartbeatNext = 0;
  let ambNext = 0;
  let fx = [];               // 3Dビューが消費する演出イベントキュー

  function pushFx(ev) { fx.push(ev); if (fx.length > 50) fx.shift(); }

  /* ---------- audio (iOS消音スイッチ対策込み / hakai方式) ---------- */
  let AC = null;
  function audio() {
    if (!AC) {
      try {
        AC = new (window.AudioContext || window.webkitAudioContext)();
        AC.onstatechange = () => { if (AC.state !== "running" && !document.hidden) { try { AC.resume(); } catch (e) {} } };
      } catch (e) {}
    }
    if (AC && AC.state !== "running") { try { AC.resume(); } catch (e) {} }
    return AC;
  }
  let silentEl = null;
  function silentWavUrl() {
    const sr = 8000, n = 800, buf = new ArrayBuffer(44 + n), v = new DataView(buf);
    const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    str(0, "RIFF"); v.setUint32(4, 36 + n, true); str(8, "WAVE");
    str(12, "fmt "); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr, true); v.setUint16(32, 1, true); v.setUint16(34, 8, true);
    str(36, "data"); v.setUint32(40, n, true);
    for (let i = 0; i < n; i++) v.setUint8(44 + i, 0x80);
    return URL.createObjectURL(new Blob([buf], { type: "audio/wav" }));
  }
  function unlockAudio() {
    if (!silentEl) {
      silentEl = document.createElement("audio");
      silentEl.setAttribute("playsinline", "");
      silentEl.loop = true;
      silentEl.volume = 0.01;
      silentEl.src = silentWavUrl();
    }
    const p = silentEl.play();
    if (p && p.catch) p.catch(() => {});
    audio();
    if (!AC) return;
    const done = () => {
      if (AC.state === "running") {
        ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.removeEventListener(ev, unlockAudio, true));
      }
    };
    try { AC.resume().then(done); } catch (e) { done(); }
  }
  ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.addEventListener(ev, unlockAudio, true));
  document.addEventListener("visibilitychange", () => { if (!document.hidden) audio(); });

  function tone(f, d, type, vol, slideTo, at) {
    if (muted || !audio()) return;
    try {
      const t0 = AC.currentTime + (at || 0);
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type || "sine"; o.frequency.setValueAtTime(f, t0);
      if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + d);
      g.gain.setValueAtTime(vol || 0.06, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + d);
      o.connect(g); g.connect(AC.destination);
      o.start(t0); o.stop(t0 + d);
    } catch (e) {}
  }
  function noise(d, vol, at) {
    if (muted || !audio()) return;
    try {
      const n = Math.floor(AC.sampleRate * d);
      const buf = AC.createBuffer(1, n, AC.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / n);
      const src = AC.createBufferSource(); src.buffer = buf;
      const g = AC.createGain(); g.gain.value = vol || 0.08;
      src.connect(g); g.connect(AC.destination); src.start(AC.currentTime + (at || 0));
    } catch (e) {}
  }
  const sBtn = () => tone(420, 0.07, "square", 0.03);
  const sChoose = () => { tone(180, 0.18, "sine", 0.07, 90); noise(0.06, 0.03); };
  const sHeart = () => { tone(58, 0.12, "sine", 0.12); tone(52, 0.1, "sine", 0.1, null, 0.1); };
  // 連勝が伸びるほど高く・豪華に鳴る上昇アルペジオ
  function sWin(stk) {
    const base = 330 * Math.pow(2, (stk - 1) / 12);
    tone(base, 0.32, "triangle", 0.08);
    tone(base * 1.25, 0.32, "triangle", 0.07, null, 0.07);
    tone(base * 1.5, 0.38, "triangle", 0.07, null, 0.14);
    tone(base * 2, 0.5, "sine", 0.06, null, 0.21);
    if (stk >= 8) tone(base * 3, 0.55, "sine", 0.045, null, 0.28);
    noise(0.1, 0.02, 0.05);
  }
  function sLose() {
    tone(220, 0.7, "sawtooth", 0.09, 38);
    tone(110, 0.9, "sawtooth", 0.08, 30, 0.05);
    tone(48, 1.1, "sine", 0.14, 26, 0.1);
    noise(0.5, 0.07);
  }
  function sMilestone() {
    [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.4, "triangle", 0.06, null, i * 0.08));
  }
  function sAwaken() {
    [523, 659, 784, 1047, 1319, 1568].forEach((f, i) => tone(f, 0.9, "triangle", 0.07, null, i * 0.12));
    [2093, 2637, 3136].forEach((f, i) => tone(f, 1.4, "sine", 0.03, null, 0.7 + i * 0.15));
    noise(0.25, 0.03, 0.6);
  }
  const sAmb = () => tone(160 + streak * 22 + Math.random() * 40, 1.6, "sine", 0.012);

  /* ---------- ドローン(層が上がるほど音程が上がる緊張の通奏低音) ---------- */
  let droneOsc = null, droneOsc2 = null, droneGain = null;
  function droneFreq() { return 46 * Math.pow(2, streak / 14); }
  function startDrone() {
    if (!audio() || droneOsc) return;
    try {
      droneGain = AC.createGain();
      droneGain.gain.value = muted ? 0 : 0.028;
      droneOsc = AC.createOscillator(); droneOsc.type = "sine"; droneOsc.frequency.value = droneFreq();
      droneOsc2 = AC.createOscillator(); droneOsc2.type = "sine"; droneOsc2.frequency.value = droneFreq() * 1.007;
      droneOsc.connect(droneGain); droneOsc2.connect(droneGain); droneGain.connect(AC.destination);
      droneOsc.start(); droneOsc2.start();
    } catch (e) { droneOsc = droneOsc2 = droneGain = null; }
  }
  function updateDrone() {
    if (!droneOsc || !AC) return;
    try {
      const f = droneFreq(), t = AC.currentTime;
      droneOsc.frequency.exponentialRampToValueAtTime(f, t + 0.5);
      droneOsc2.frequency.exponentialRampToValueAtTime(f * 1.007, t + 0.5);
      droneGain.gain.setTargetAtTime(muted ? 0 : 0.028 + streak * 0.0012, t, 0.3);
    } catch (e) {}
  }
  function stopDrone() {
    try { if (droneOsc) droneOsc.stop(); if (droneOsc2) droneOsc2.stop(); } catch (e) {}
    droneOsc = droneOsc2 = droneGain = null;
  }

  /* ---------- ユーティリティ ---------- */
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const lerp = (a, b, t) => a + (b - a) * t;
  const easeOut = t => 1 - Math.pow(1 - t, 3);
  function hex2rgb(h) { return [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)]; }
  function mixHex(a, b, t) {
    const A = hex2rgb(a), B = hex2rgb(b);
    return `rgb(${Math.round(lerp(A[0], B[0], t))},${Math.round(lerp(A[1], B[1], t))},${Math.round(lerp(A[2], B[2], t))})`;
  }
  const fmtOdds = n => "1/" + Math.pow(2, n);
  const fmtNum = n => n.toLocaleString("ja-JP");

  // 現在描画すべきパレット(遷移中は補間)。3Dビューもこれを毎フレーム読む
  function pal() {
    let a = LAYERS[clamp(streak, 0, 13)], b = a, t = 0;
    if (phase === "ascend") {
      a = LAYERS[streak - 1] || LAYERS[0];
      b = LAYERS[clamp(streak, 0, 13)];
      t = easeOut(clamp(phaseT / ASC_DUR, 0, 1));
    } else if (phase === "fall") {
      a = LAYERS[fallFrom]; b = LAYERS[0];
      t = easeOut(clamp(phaseT / FALL_DUR, 0, 1));
    }
    return {
      top: mixHex(a.top, b.top, t), bot: mixHex(a.bot, b.bot, t),
      acc: mixHex(a.acc, b.acc, t),
    };
  }

  /* ---------- DOM HUD ---------- */
  const orbEls = [];
  (function buildOrbs() {
    for (let i = 0; i < GOAL; i++) {
      const s = document.createElement("span");
      s.className = "orb";
      $("orbs").appendChild(s);
      orbEls.push(s);
    }
  })();
  function setPhase(p) {
    phase = p;
    phaseT = 0;
    stage.dataset.phase = p;
  }
  function syncHUD() {
    const L = LAYERS[clamp(streak, 0, 13)];
    $("layerNum").textContent = String(GOAL - streak);
    $("layerNum").style.color = L.acc;
    $("layerName").textContent = L.name;
    for (let i = 0; i < GOAL; i++) {
      const on = i < streak;
      orbEls[i].className = "orb" + (on ? " on" : "");
      orbEls[i].style.color = on ? LAYERS[i + 1].acc : "";
    }
    $("prob").textContent = streak > 0
      ? "ここまで " + fmtOdds(streak) + " ／ 目覚めまで " + fmtOdds(GOAL - streak)
      : "目覚めまで 1/8192";
    $("stats").textContent = "通算 " + fmtNum(totalPicks) + " 枚目の扉 ／ ベスト 連続" + bestStreak;
    // 3D不可時のフォールバック背景もここで層の色に
    stage.style.background = "linear-gradient(180deg, " + L.top + ", " + L.bot + ")";
  }
  function banner(text, cls, life, delay) {
    const d = document.createElement("div");
    d.className = "banner " + cls;
    d.textContent = text;
    d.style.setProperty("--life", life + "s");
    d.style.setProperty("--delay", (delay || 0) + "s");
    $("bannerWrap").appendChild(d);
    d.addEventListener("animationend", () => d.remove());
    setTimeout(() => { if (d.parentNode) d.remove(); }, (life + (delay || 0)) * 1000 + 400);
  }
  function flash(col, peak) {
    const f = $("flash");
    f.style.transition = "none";
    f.style.background = col;
    f.style.opacity = String(peak);
    void f.offsetWidth; // reflow
    f.style.transition = "opacity 0.55s ease-out";
    f.style.opacity = "0";
  }
  function setVign(on) {
    const v = $("vign");
    if (on) {
      v.style.transition = "opacity " + susDur + "s ease-in";
      v.style.opacity = String(clamp(0.35 + streak * 0.06, 0, 0.95));
    } else {
      v.style.transition = "opacity 0.3s";
      v.style.opacity = "0";
    }
  }

  /* ---------- ラウンド進行 ---------- */
  function newDoors() {
    let i = Math.floor(Math.random() * SIGILS.length);
    let j = Math.floor(Math.random() * (SIGILS.length - 1));
    if (j >= i) j++;
    sigilL = SIGILS[i]; sigilR = SIGILS[j];
    chosen = -1;
    setPhase("play");
    pushFx({ type: "doors" });
    syncHUD();
  }

  function startGame() {
    $("titleOv").classList.add("hidden");
    $("awakenOv").classList.add("hidden");
    $("diaryOv").classList.add("hidden");
    streak = 0; runPicks = 0;
    startDrone(); updateDrone();
    pushFx({ type: "start" });
    newDoors();
  }

  function pick(i) {
    if (phase !== "play" || i < 0 || i > 1) return;
    chosen = i;
    outcome = rigQueue.length ? !!rigQueue.shift() : (Math.random() < 0.5);
    correctSide = outcome ? i : 1 - i;
    totalPicks++; runPicks++;
    lsSet("picks", totalPicks);
    susDur = Math.min(SUS_BASE + streak * SUS_PER, SUS_MAX);
    setPhase("suspense");
    heartbeatNext = 0.25;
    setVign(true);
    pushFx({ type: "pick", side: i });
    sChoose();
    syncHUD();
  }

  function resolve() {
    setVign(false);
    if (outcome) {
      streak++;
      if (streak > bestStreak) { bestStreak = streak; lsSet("best", bestStreak); }
      let diaryNew = false;
      if (streak <= 13 && !(diaryBits & (1 << streak))) {
        diaryBits |= 1 << streak; lsSet("diary", diaryBits);
        diaryNew = true;
      }
      flash(LAYERS[streak].acc, 0.5);
      sWin(streak);
      banner("正解", "b-big", 0.9, 0);
      banner(fmtOdds(streak) + " を生き残った", "b-odds", 1.5, 0.18);
      const last = $("bannerWrap").lastChild;
      if (last) last.style.color = LAYERS[streak].acc;
      if (diaryNew) banner("夢日記に記録された", "b-diary", 1.6, 0.4);
      if (MILESTONES[streak]) {
        banner(MILESTONES[streak], "b-mile", 2.2, 0.55);
        sMilestone();
      }
      setPhase("ascend");
      pushFx({ type: "win", streak });
      updateDrone();
      syncHUD();
    } else {
      fallFrom = streak;
      totalFalls++; lsSet("falls", totalFalls);
      flash("#ff3a4e", 0.38);
      sLose();
      $("fallMsg").textContent = fallFrom > 0 ? "第" + (GOAL - fallFrom) + "層から、最深層へ" : "扉のむこうは、底だった";
      if (fallFrom >= 12) banner("目覚めの直前で、夢に呑まれた。", "b-mile", 2.6, 0.5);
      else if (fallFrom >= 8) banner("あと " + (GOAL - fallFrom) + " 回だった——", "b-mile", 2.2, 0.5);
      streak = 0;
      setPhase("fall");
      pushFx({ type: "fall", from: fallFrom });
      updateDrone();
      syncHUD();
    }
  }

  function awaken() {
    setPhase("awaken");
    stopDrone();
    awakenCount++; lsSet("awaken", awakenCount);
    if (!(diaryBits & (1 << 13))) { diaryBits |= 1 << 13; lsSet("diary", diaryBits); }
    sAwaken();
    flash("#fff6e0", 0.85);
    pushFx({ type: "awaken" });
    $("awakenText").innerHTML = "13の扉をすべて当てた。<br>通算 <b>" + fmtNum(totalPicks) + "</b> 回目の扉で、あなたは目を開けた。";
    $("awakenStat").innerHTML = "この眠りでの選択 " + fmtNum(runPicks) + " 回 / 通算の墜落 " + fmtNum(totalFalls) + " 回<br>目覚めた回数 <b>" + awakenCount + "</b>";
    $("awakenOv").classList.remove("hidden");
    refreshTitleStat();
  }

  /* ---------- メインループ(タイトル時点から回す。フェーズ進行のみ。描画は3D側) ---------- */
  function frame(t) {
    requestAnimationFrame(frame);
    const dt = Math.min((t - lastT) / 1000, 0.05) || 0;
    lastT = t;
    now += dt;
    phaseT += dt;
    if (phase === "suspense") {
      if (phaseT >= heartbeatNext && phaseT < susDur) {
        sHeart();
        heartbeatNext += Math.max(0.62 - (phaseT / susDur) * 0.34 - streak * 0.012, 0.2);
      }
      if (phaseT >= susDur) resolve();
    }
    if (phase === "ascend" && phaseT >= ASC_DUR) {
      if (streak >= GOAL) awaken();
      else newDoors();
    }
    if (phase === "fall" && phaseT >= FALL_DUR) newDoors();
    if (phase === "play" && now >= ambNext) { sAmb(); ambNext = now + 2.2 + Math.random() * 2.5; }
  }
  requestAnimationFrame(frame);

  /* ---------- 入力(Pointer Events、clickは使わない)。左半分=左の扉、右半分=右の扉 ---------- */
  const cv = $("cv");
  cv.addEventListener("pointerdown", e => {
    e.preventDefault();
    if (phase === "fall" && phaseT > 0.45) { phaseT = FALL_DUR; return; } // タップで墜落スキップ
    if (phase !== "play") return;
    const rect = cv.getBoundingClientRect();
    pick(e.clientX - rect.left < rect.width / 2 ? 0 : 1);
  });

  window.addEventListener("keydown", e => {
    if (e.repeat) return;
    if (phase === "title" && (e.code === "Enter" || e.code === "Space")) { e.preventDefault(); sBtn(); startGame(); return; }
    if (phase === "awaken" && (e.code === "Enter" || e.code === "Space")) { e.preventDefault(); sBtn(); startGame(); return; }
    if (phase === "fall" && (e.code === "Enter" || e.code === "Space")) { e.preventDefault(); phaseT = FALL_DUR; return; }
    if (phase !== "play") return;
    if (e.code === "ArrowLeft" || e.code === "KeyA") { e.preventDefault(); pick(0); }
    if (e.code === "ArrowRight" || e.code === "KeyD") { e.preventDefault(); pick(1); }
  });

  /* ---------- オーバーレイ ---------- */
  function refreshTitleStat() {
    $("titleStat").innerHTML =
      "通算の扉 <b>" + fmtNum(totalPicks) + "</b> ／ 墜落 <b>" + fmtNum(totalFalls) + "</b> 回<br>" +
      "最高到達 <b>" + (bestStreak >= GOAL ? "目覚め (連続13)" : bestStreak > 0 ? "第" + (GOAL - bestStreak) + "層 (連続" + bestStreak + ")" : "—") + "</b>" +
      (awakenCount > 0 ? " ／ 目覚め <b>" + awakenCount + "</b> 回" : "");
  }
  function openDiary() {
    const list = $("diaryList");
    list.innerHTML = "";
    for (let i = 0; i <= 13; i++) {
      const got = !!(diaryBits & (1 << i));
      const L = LAYERS[i];
      const div = document.createElement("div");
      div.className = "entry" + (got ? (i === 13 ? " gold" : "") : " locked");
      const label = i === 13 ? "目覚め" : "第" + L.layer + "層";
      div.innerHTML =
        '<div class="lh"><span>' + (i === 13 ? "1/8192" : fmtOdds(i)) + "</span><b>" +
        (got ? label + "　" + L.name : label + "　???") + "</b></div>" +
        "<p>" + (got ? DIARY[i] : "まだ辿り着いていない。") + "</p>";
      list.appendChild(div);
    }
    $("diaryOv").classList.remove("hidden");
  }
  $("startBtn").addEventListener("pointerup", e => { e.preventDefault(); sBtn(); startGame(); });
  $("againBtn").addEventListener("pointerup", e => { e.preventDefault(); sBtn(); startGame(); });
  $("diaryBtn").addEventListener("pointerup", e => { e.preventDefault(); sBtn(); openDiary(); });
  $("awakenDiaryBtn").addEventListener("pointerup", e => { e.preventDefault(); sBtn(); openDiary(); });
  $("diaryClose").addEventListener("pointerup", e => {
    e.preventDefault(); sBtn();
    $("diaryOv").classList.add("hidden");
  });
  $("mute").addEventListener("pointerup", e => {
    e.preventDefault();
    muted = !muted;
    $("mute").textContent = muted ? "🔇" : "🔊";
    try { localStorage.setItem(LS + "muted", muted ? "1" : "0"); } catch (er) {}
    updateDrone();
  });
  $("mute").textContent = muted ? "🔇" : "🔊";
  refreshTitleStat();
  syncHUD();

  /* ---------- ダブルタップズーム無効化(3点セット) ---------- */
  document.addEventListener("dblclick", e => e.preventDefault(), { passive: false });
  document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
  let lastTouchEnd = 0;
  document.addEventListener("touchend", e => {
    const t = Date.now();
    if (t - lastTouchEnd < 350) e.preventDefault();
    lastTouchEnd = t;
  }, { passive: false });

  /* ---------- 3Dビューへのブリッジ ---------- */
  window.__MEZ_BRIDGE__ = {
    GOAL, LAYERS,
    ASC_DUR, FALL_DUR,
    state: () => ({ phase, streak, chosen, outcome, correctSide, fallFrom, phaseT, susDur, sigilL, sigilR }),
    pal,
    fx, // 3D側がshiftして消費する
  };

  /* ---------- テストフック ---------- */
  window.__MEZ__ = {
    state: () => ({
      phase, streak, chosen, outcome, correctSide, fallFrom,
      totalPicks, totalFalls, bestStreak, awakenCount, diaryBits, runPicks,
      susDur, phaseT,
    }),
    doorRect: i => {
      const b = cv.getBoundingClientRect();
      return { x: b.left + (i === 0 ? 0 : b.width / 2), y: b.top, w: b.width / 2, h: b.height };
    },
    start: () => startGame(),
    pick: i => pick(i),
    rig: v => rigQueue.push(!!v),
    skipSuspense: () => { if (phase === "suspense") { phaseT = susDur; } },
    skipAnim: () => { if (phase === "ascend") phaseT = ASC_DUR; if (phase === "fall") phaseT = FALL_DUR; },
  };
})();
</script>

{

ringGroup.add(topGlow);

/* ---------- テクスチャ生成ヘルパ ---------- */
function makeRadialTex(inner, outer) {
  const c = document.createElement("canvas");
  c.width = c.height = 128;
  const x = c.getContext("2d");
  const g = x.createRadialGradient(64, 64, 2, 64, 64, 64);
  g.addColorStop(0, inner); g.addColorStop(1, outer);
  x.fillStyle = g; x.fillRect(0, 0, 128, 128);
  const t = new THREE.CanvasTexture(c);
  return t;
}
function makeSigilTex(glyph) {
  const c = document.createElement("canvas");
  c.width = c.height = 192;
  const x = c.getContext("2d");
  x.clearRect(0, 0, 192, 192);
  x.font = "120px serif";
  x.textAlign = "center"; x.textBaseline = "middle";
  x.shadowColor = "rgba(255,255,255,0.9)"; x.shadowBlur = 22;
  x.fillStyle = "rgba(255,255,255,0.95)";
  x.fillText(glyph, 96, 104);
  return new THREE.CanvasTexture(c);
}

/* ---------- 扉 ---------- */
const DOOR_W = 2.1, DOOR_H = 3.3, DOOR_X = 1.62;
function archShape(w, h) {
  const r = w / 2;
  const s = new THREE.Shape();
  s.moveTo(-w / 2, 0);
  s.lineTo(-w / 2, h - r);
  s.absarc(0, h - r, r, Math.PI, 0, true);
  s.lineTo(w / 2, 0);
  s.closePath();
  return s;
}
function archCurvePoints(w, h, n) {
  const r = w / 2, pts = [];
  pts.push(new THREE.Vector3(-w / 2, 0, 0));
  pts.push(new THREE.Vector3(-w / 2, h - r, 0));
  for (let i = 0; i <= n; i++) {
    const a = Math.PI - (Math.PI * i) / n;
    pts.push(new THREE.Vector3(Math.cos(a) * r, h - r + Math.sin(a) * r, 0));
  }
  pts.push(new THREE.Vector3(w / 2, 0, 0));
  return pts;
}
const haloTex = makeRadialTex("rgba(255,255,255,0.85)", "rgba(255,255,255,0)");
const doors = [];
for (let i = 0; i < 2; i++) {
  const g = new THREE.Group();
  g.position.set(i === 0 ? -DOOR_X : DOOR_X, -0.4, 0);
  // 本体
  const body = new THREE.Mesh(
    new THREE.ExtrudeGeometry(archShape(DOOR_W, DOOR_H), { depth: 0.22, bevelEnabled: false }),
    new THREE.MeshStandardMaterial({ color: 0x0d0a1e, roughness: 0.75, metalness: 0.25, transparent: true })
  );
  body.position.z = -0.22;
  g.add(body);
  // 内側の淡い光
  const glow = new THREE.Mesh(
    new THREE.ShapeGeometry(archShape(DOOR_W * 0.88, DOOR_H * 0.94)),
    new THREE.MeshBasicMaterial({ color: 0x5a4d96, transparent: true, opacity: 0.16, blending: THREE.AdditiveBlending, depthWrite: false })
  );
  glow.position.z = 0.012;
  g.add(glow);
  // 正解発表の白い光
  const reveal = new THREE.Mesh(
    new THREE.ShapeGeometry(archShape(DOOR_W * 0.92, DOOR_H * 0.96)),
    new THREE.MeshBasicMaterial({ color: 0xfff6e0, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false })
  );
  reveal.position.z = 0.02;
  g.add(reveal);
  // 発光フレーム(チューブ)
  const curve = new THREE.CatmullRomCurve3(archCurvePoints(DOOR_W, DOOR_H, 24), false, "catmullrom", 0.0);
  const frame = new THREE.Mesh(
    new THREE.TubeGeometry(curve, 64, 0.05, 8, false),
    new THREE.MeshBasicMaterial({ color: 0x5a4d96 })
  );
  g.add(frame);
  // 背後のハロー
  const halo = new THREE.Sprite(new THREE.SpriteMaterial({ map: haloTex, color: 0x5a4d96, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending, depthWrite: false }));
  halo.scale.set(4.6, 4.6, 1);
  halo.position.set(0, DOOR_H * 0.45, -0.55);
  g.add(halo);
  // 紋章
  const sigilMat = new THREE.MeshBasicMaterial({ map: makeSigilTex("☾"), transparent: true, opacity: 0.92, blending: THREE.AdditiveBlending, depthWrite: false });
  const sigil = new THREE.Mesh(new THREE.PlaneGeometry(1.05, 1.05), sigilMat);
  sigil.position.set(0, DOOR_H * 0.45, 0.03);
  g.add(sigil);
  scene.add(g);
  doors.push({ g, body, glow, reveal, frame, halo, sigil, sigilMat, baseX: g.position.x });
}
let curSigils = "";

/* ---------- 勝利バースト(パーティクルプール) ---------- */
const BURST_N = 140;
const burstGeo = new THREE.BufferGeometry();
const burstPos = new Float32Array(BURST_N * 3);
const burstCol = new Float32Array(BURST_N * 3);
burstGeo.setAttribute("position", new THREE.BufferAttribute(burstPos, 3));
burstGeo.setAttribute("color", new THREE.BufferAttribute(burstCol, 3));
const burstVel = new Float32Array(BURST_N * 3);
const burstLife = new Float32Array(BURST_N); // 残り秒。0以下=死
const burstMat = new THREE.PointsMaterial({ size: 0.11, vertexColors: true, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
scene.add(new THREE.Points(burstGeo, burstMat));
function fireBurst(x, y, z, color, n) {
  const c = new THREE.Color(color);
  let fired = 0;
  for (let i = 0; i < BURST_N && fired < n; i++) {
    if (burstLife[i] > 0) continue;
    burstLife[i] = 0.6 + Math.random() * 0.7;
    burstPos[i * 3] = x; burstPos[i * 3 + 1] = y; burstPos[i * 3 + 2] = z;
    const a = Math.random() * Math.PI * 2, b = (Math.random() - 0.5) * Math.PI;
    const sp = 2 + Math.random() * 6;
    burstVel[i * 3] = Math.cos(a) * Math.cos(b) * sp;
    burstVel[i * 3 + 1] = Math.sin(b) * sp + 1.5;
    burstVel[i * 3 + 2] = Math.sin(a) * Math.cos(b) * sp;
    burstCol[i * 3] = c.r; burstCol[i * 3 + 1] = c.g; burstCol[i * 3 + 2] = c.b;
    fired++;
  }
}

/* ---------- 墜落のスピードライン ---------- */
const STREAK_N = 42;
const streakGeo = new THREE.BufferGeometry();
const streakPos = new Float32Array(STREAK_N * 2 * 3);
for (let i = 0; i < STREAK_N; i++) {
  const x = (Math.random() - 0.5) * 18;
  const z = -Math.random() * 16 + 2;
  const y = Math.random() * 30 - 10;
  streakPos[i * 6] = x; streakPos[i * 6 + 1] = y; streakPos[i * 6 + 2] = z;
  streakPos[i * 6 + 3] = x; streakPos[i * 6 + 4] = y + 1.6 + Math.random() * 2; streakPos[i * 6 + 5] = z;
}
streakGeo.setAttribute("position", new THREE.BufferAttribute(streakPos, 3));
const streakMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false });
scene.add(new THREE.LineSegments(streakGeo, streakMat));

/* ---------- 毎フレーム ---------- */
const cTop = new THREE.Color(), cBot = new THREE.Color(), cAcc = new THREE.Color();
let shakeAmp = 0;
let prevT = 0;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const easeOut = t => 1 - Math.pow(1 - t, 3);

function tick(tms) {
  requestAnimationFrame(tick);
  const t = tms / 1000;
  const dt = Math.min(t - prevT, 0.05) || 0;
  prevT = t;

  // リサイズ
  const w = cv.clientWidth, h = cv.clientHeight;
  if (cv.width !== Math.round(w * renderer.getPixelRatio()) || cv.height !== Math.round(h * renderer.getPixelRatio())) {
    renderer.setSize(w, h, false);
  }
  camera.aspect = w / h;
  camera.updateProjectionMatrix();

  const S = B.state();
  const P = B.pal();
  cTop.setStyle(P.top); cBot.setStyle(P.bot); cAcc.setStyle(P.acc);

  // fxイベント消費
  while (B.fx.length) {
    const ev = B.fx.shift();
    if (ev.type === "win") {
      const d = doors[S.chosen];
      fireBurst(d.baseX, 1.2, 0.3, P.acc, 60 + ev.streak * 5);
      shakeAmp = Math.min(0.1 + ev.streak * 0.02, 0.38);
    } else if (ev.type === "fall") {
      shakeAmp = 0.5;
      fireBurst(doors[S.chosen] ? doors[S.chosen].baseX : 0, 1.2, 0.3, "#3a2c50", 50);
    } else if (ev.type === "awaken") {
      fireBurst(0, 2, -1, "#fff0c0", 120);
    }
  }

  // パレット反映
  skyUni.ctop.value.lerp(cTop, 0.12); skyUni.cbot.value.lerp(cBot, 0.12);
  scene.fog.color.lerp(cBot, 0.12);
  dustMat.color.lerp(cAcc, 0.1);
  doorLight.forEach(l => l.color.lerp(cAcc, 0.12));

  // 光輪: 通過済みはアクセント色で点灯
  const passed = S.phase === "fall"
    ? Math.round((1 - easeOut(clamp(S.phaseT / FALL_DUR, 0, 1))) * S.fallFrom)
    : S.streak;
  for (let i = 0; i < GOAL; i++) {
    const r = rings[i];
    const on = i < passed;
    r.material.color.lerp(on ? cAcc : new THREE.Color(0xffffff), 0.2);
    r.material.opacity += (((on ? 0.85 : 0.14)) - r.material.opacity) * 0.15;
    r.rotation.z += dt * (0.05 + i * 0.012);
  }
  topGlow.material.opacity = 0.55 + Math.sin(t * 1.1) * 0.2 + S.streak * 0.03;

  // 世界の縦オフセット(上昇=光輪が下へ流れる / 墜落=逆流)
  let offset = S.streak * GAP;
  if (S.phase === "ascend") offset = (S.streak - 1 + easeOut(clamp(S.phaseT / ASC_DUR, 0, 1))) * GAP;
  if (S.phase === "fall") offset = S.fallFrom * GAP * (1 - easeOut(clamp(S.phaseT / FALL_DUR, 0, 1)));
  if (S.phase === "awaken") offset = (GOAL + easeOut(clamp(S.phaseT / 2, 0, 1)) * 1.2) * GAP;
  ringGroup.position.y = -offset;

  // 夢の粒: ふわふわ上昇 + 上昇/墜落時は流れが激しく
  {
    const pos = dustGeo.attributes.position.array;
    let flow = 0;
    if (S.phase === "ascend") flow = -14 * (1 - clamp(S.phaseT / ASC_DUR, 0, 1));
    if (S.phase === "fall") flow = 20 * (1 - clamp(S.phaseT / FALL_DUR, 0, 1));
    for (let i = 0; i < DUST_N; i++) {
      pos[i * 3 + 1] += (dustSpeed[i] + flow) * dt;
      if (pos[i * 3 + 1] > 17) pos[i * 3 + 1] -= 21;
      if (pos[i * 3 + 1] < -4) pos[i * 3 + 1] += 21;
    }
    dustGeo.attributes.position.needsUpdate = true;
  }

  // 扉
  const sig = S.sigilL + S.sigilR;
  if (sig !== curSigils) {
    curSigils = sig;
    [S.sigilL, S.sigilR].forEach((gl, i) => {
      if (doors[i].sigilMat.map) doors[i].sigilMat.map.dispose();
      doors[i].sigilMat.map = makeSigilTex(gl);
    });
  }
  for (let i = 0; i < 2; i++) {
    const d = doors[i];
    const float = Math.sin(t * 1.4 + i * 2.4) * 0.09;
    let sc = 1, vis = 1, glowK = 0.4;
    if (S.phase === "suspense") {
      if (S.chosen === i) {
        sc = 1 + Math.sin(S.phaseT * 9) * 0.012 + S.phaseT * 0.03;
        glowK = 0.6 + Math.sin(S.phaseT * 9) * 0.2 + (S.phaseT / S.susDur) * 0.6;
      } else vis = clamp(1 - S.phaseT * 2.2, 0.15, 1);
    } else if (S.phase === "ascend" || S.phase === "fall") {
      if (i === S.correctSide) {
        glowK = 1.4;
        d.reveal.material.opacity = clamp(1 - S.phaseT * 1.3, 0, 1) * 0.95;
        vis = clamp(1 - S.phaseT * 1.2, 0, 1);
        if (S.phase === "ascend") sc = 1 + easeOut(clamp(S.phaseT / ASC_DUR, 0, 1)) * 0.7;
      } else {
        vis = clamp(0.5 - S.phaseT * 1.6, 0, 0.5);
        d.reveal.material.opacity = 0;
      }
    } else {
      d.reveal.material.opacity = 0;
    }
    if (S.phase === "play" && S.streak >= 8) {
      d.g.position.x = d.baseX + (Math.random() - 0.5) * (S.streak - 7) * 0.012;
    } else d.g.position.x = d.baseX;
    d.g.position.y = -0.4 + float;
    d.g.scale.setScalar(sc);
    d.g.visible = vis > 0.01 && S.phase !== "title" && S.phase !== "awaken";
    d.frame.material.color.copy(cAcc).multiplyScalar(0.65 + glowK * 0.6);
    d.halo.material.color.copy(cAcc);
    d.halo.material.opacity = (0.3 + glowK * 0.35) * vis;
    d.glow.material.color.copy(cAcc);
    d.glow.material.opacity = 0.16 * vis;
    d.body.material.opacity = vis;
    d.body.material.transparent = vis < 1;
    d.sigil.material.opacity = 0.92 * vis;
    d.frame.material.transparent = true;
    d.frame.material.opacity = vis;
  }

  // バースト更新
  {
    let any = false;
    for (let i = 0; i < BURST_N; i++) {
      if (burstLife[i] <= 0) continue;
      any = true;
      burstLife[i] -= dt;
      burstPos[i * 3] += burstVel[i * 3] * dt;
      burstPos[i * 3 + 1] += burstVel[i * 3 + 1] * dt;
      burstPos[i * 3 + 2] += burstVel[i * 3 + 2] * dt;
      burstVel[i * 3 + 1] -= 4 * dt;
      burstCol[i * 3] *= 0.985; burstCol[i * 3 + 1] *= 0.985; burstCol[i * 3 + 2] *= 0.985;
      if (burstLife[i] <= 0) { burstCol[i * 3] = burstCol[i * 3 + 1] = burstCol[i * 3 + 2] = 0; }
    }
    if (any) {
      burstGeo.attributes.position.needsUpdate = true;
      burstGeo.attributes.color.needsUpdate = true;
    }
  }

  // 墜落スピードライン
  if (S.phase === "fall") {
    const k = 1 - clamp(S.phaseT / FALL_DUR, 0, 1);
    streakMat.opacity = 0.35 * k;
    const pos = streakGeo.attributes.position.array;
    for (let i = 0; i < STREAK_N; i++) {
      const up = (24 + (i % 5) * 8) * dt;
      pos[i * 6 + 1] += up; pos[i * 6 + 4] += up;
      if (pos[i * 6 + 1] > 18) { pos[i * 6 + 1] -= 34; pos[i * 6 + 4] -= 34; }
    }
    streakGeo.attributes.position.needsUpdate = true;
  } else streakMat.opacity = Math.max(0, streakMat.opacity - dt * 3);

  // カメラ
  let cx = Math.sin(t * 0.5) * 0.22, cy = 1.25, cz = 11.5, ly = 2.1;
  if (S.phase === "suspense" && S.chosen >= 0) {
    const k = clamp(S.phaseT / S.susDur, 0, 1);
    cx += doors[S.chosen].baseX * 0.55 * k;
    cz -= 1.8 * k;
  }
  if (S.phase === "ascend") {
    const k = easeOut(clamp(S.phaseT / ASC_DUR, 0, 1));
    cz -= 2.6 * k;
    ly += 1.6 * k;
  }
  if (S.phase === "fall") {
    const k = 1 - clamp(S.phaseT / FALL_DUR, 0, 1);
    ly -= 2.2 * k;
  }
  if (S.phase === "awaken") { ly += 5; cz += 1.5; }
  shakeAmp = Math.max(0, shakeAmp - dt * 1.4);
  camera.position.set(
    cx + (Math.random() - 0.5) * shakeAmp,
    cy + (Math.random() - 0.5) * shakeAmp,
    cz
  );
  camera.lookAt(0, ly, -2);

  renderer.render(scene, camera);
  if (!window.__MEZ3D__) window.__MEZ3D__ = () => renderer.info.render.calls;
}
requestAnimationFrame(tick);
</script>
</body>
</html>
