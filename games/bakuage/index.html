var AC=null, muted=false;
function audio(){
  if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();

  var sr=8000,n=800,buf=new ArrayBuffer(44+n),v=new DataView(buf);
  function str(o,s){for(var i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));}
  str(0,"RIFF");v.setUint32(4,36+n,true);str(8,"WAVE");str(12,"fmt ");v.setUint32(16,16,true);

  for(var i=0;i<n;i++)v.setUint8(44+i,0x80);

  audio(); if(!AC)return;

  try{AC.resume().then(done);}catch(e){done();}
}

}

function drawCards(){

  }
}

/* ===== render ===== */
function stars(n,ch){var s="";for(var i=0;i<3;i++)s+= i<n?ch:"·";return s;}
function renderHUD(){
  $("subs").innerHTML=fmtN(subs)+'<small>人</small>';
  $("rankName").textContent=RANKS[rankIdx].name;
  $("moti").textContent="❤️".repeat(moti)+"🖤".repeat(clamp(3-moti,0,3));
  $("day").textContent="DAY "+Math.min(day,DAYS)+" / "+DAYS;
  $("postsT").textContent="投稿 "+postsToday+"本";
  $("potN").innerHTML=fmtN(pot)+'<small>人ぶん</small>';
  var g=gap();
  $("bar").style.width=clamp(pot/g*100,0,100)+"%";
  if(subs>best){best=subs;try{localStorage.setItem("bakuage.best",String(best));}catch(e){}}
}
function renderCards(){
  var st=$("stage");
  var html='<div class="prompt">どの神動画をネタにする？<small>パワー＝稼ぎ ／ 🔥＝炎上リスク ／ ✨＝バズ期待</small></div>';
  html+='<div class="cards">';
  for(var i=0;i<curCards.length;i++){
    var c=curCards[i], v=DECK[c.vi];
    html+='<div class="card" data-i="'+i+'">'+
      '<div class="th"><span class="kut">'+c.kut+'</span>'+
        '<img crossorigin="anonymous" src="https://i.ytimg.com/vi/'+v.id+'/hqdefault.jpg" alt=""></div>'+
      '<div class="meta"><div class="ttl">'+esc(v.t)+'</div>'+
        '<div class="src">元ネタ '+v.o+'億回</div>'+
        '<div class="stat">'+
          '<b>⚡'+stars(c.pT+1,"●")+'</b>'+
          '<b>✨'+stars(c.bT+1,"●")+'</b>'+
          '<b>🔥'+stars(c.fT,"●")+'</b>'+
        '</div></div></div>';
  }
  html+='</div>';
  st.innerHTML=html;
  var cards=st.querySelectorAll(".card");
  for(var k=0;k<cards.length;k++){(function(el){
    el.addEventListener("pointerup",function(){ postCard(parseInt(el.getAttribute("data-i"),10)); });
  })(cards[k]);}
}
function renderResult(ev,gain,v){
  var st=$("stage");
  var col= (ev.indexOf("バズ")>=0)?"#16b85a":"#1166ff";
  var html='<div class="result"><div class="rth">'+
    '<img crossorigin="anonymous" src="https://i.ytimg.com/vi/'+v.id+'/hqdefault.jpg" alt="">'+
    '<div class="splash"><div class="ev" style="color:'+col+'">'+ev+'</div>'+
    '<div class="gain">+'+fmtN(gain)+' 再生</div></div></div>'+
    '<div class="info"><div class="pl">今日の合計（未確定）</div><div class="pv">'+fmtN(pot)+' 人ぶん</div></div></div>';
  var risk=Math.round(bustRiskNext()*100);
  html+='<div class="choices">'+
    '<div class="choice more" id="cMore"><span class="big">🎬 もう一本</span><span class="sm">炎上で爆死 '+risk+'%</span></div>'+
    '<div class="choice bank" id="cBank"><span class="big">😴 寝て確定</span><span class="sm">+'+fmtN(bankValue())+' 登録者</span></div>'+
    '</div>';
  st.innerHTML=html;
  $("cMore").addEventListener("pointerup",function(){ sfxBtn(); nextPost(); });
  $("cBank").addEventListener("pointerup",function(){ sfxBtn(); bank(); });
}
function bankValue(){ return Math.round(pot); }

/* ===== flow ===== */
function startDay(){
  postsToday=0; pot=0; drawCards(); renderHUD(); renderCards();
}
function nextPost(){ drawCards(); renderCards(); renderHUD(); } // continuation: bust rolled on post

function postCard(i){
  if(GS!=="play")return;
  var c=curCards[i], v=DECK[c.vi]; lastVid=c.vi;
  // bust check on continuation posts
  if(postsToday>=1){
    var br=clamp(bustRiskNext()+c.flame,0,0.9);
    if(rf()<br){ doBust(v); return; }
  }
  // outcome (multiplicative press-your-luck)
  var ev, gainShown, before=pot;
  var buzzHit=rf()<clamp(c.buzz+0.04*postsToday,0,0.6);
  if(postsToday===0){
    pot=gap()*(SEED0+rf()*SEED1)*c.powMul;
    if(buzzHit){ pot*=2; ev="初手バズ!"; sfxBuzz(); } else { ev="投稿"; sfxPost(); }
    gainShown=pot;
  } else {
    var g=GBASE+c.powMul*GPOW+(buzzHit?GBUZZ:0);
    pot*=g;
    gainShown=pot-before;
    if(buzzHit){ ev="バズ!"; sfxBuzz(); } else { ev="伸びた"; sfxPost(); }
  }
  pot=Math.max(1,Math.round(pot)); postsToday++;
  renderHUD();
  if(buzzHit) toast("✨バズった！再生 ×"+(postsToday===1?2:(GBASE+c.powMul*GPOW+GBUZZ).toFixed(1)));
  renderResult(ev,Math.round(gainShown),v);
}
function doBust(v){
  moti--; var dead=moti<=0;
  sfxBust();
  var lost=pot;
  var st=$("stage");
  st.innerHTML='<div class="result"><div class="rth">'+
    '<img crossorigin="anonymous" src="https://i.ytimg.com/vi/'+v.id+'/hqdefault.jpg" alt="" style="filter:grayscale(1) brightness(.5)">'+
    '<div class="splash"><div class="ev" style="color:#ff2b2b;font-size:40px">爆死</div>'+
    '<div class="gain" style="color:#fff">炎上で今日の '+fmtN(lost)+' 再生が消滅…</div></div></div>'+
    '<div class="info"><div class="pl">モチベ</div><div class="pv">'+("❤️".repeat(Math.max(0,moti))||"なし")+'</div></div></div>'+
    '<div class="choices"><div class="choice bank" id="cNext" style="background:#1a1410"><span class="big">'+(dead?"💀 引退する":"次の日へ →")+'</span></div></div>';
  pot=0; renderHUD();
  $("cNext").addEventListener("pointerup",function(){ sfxBtn(); if(dead){showEnd("引退");} else { advanceDay(); } });
}
function bank(){
  var val=bankValue();
  subs+=val; sfxBank();
  toast("😴 +"+fmtN(val)+" 登録者");
  var rankedUp=false;
  while(rankIdx<RANKS.length-1 && subs>=RANKS[rankIdx+1].sub){
    rankIdx++; unlocked[rankIdx]=true; rankedUp=true;
    moti=clamp(moti+1,0,3);
    if(rankIdx>=RANKS.length-1){ wonOnce=true; }
  }
  pot=0; renderHUD();
  if(wonOnce){ sfxRank(); setTimeout(function(){ showEnd("制覇"); },500); return; }
  if(rankedUp){
    sfxRank();
    var R=RANKS[rankIdx];
    setTimeout(function(){ toast("🎉 "+R.name+"に昇格！神動画解放"); },650);
  }
  setTimeout(advanceDay, rankedUp?900:350);
}
function advanceDay(){
  day++;
  if(day>DAYS){ showEnd("時間切れ"); return; }
  startDay();
}
function showEnd(reason){
  GS="over";
  var won=reason==="制覇"||wonOnce;
  var tag = reason==="制覇"?"▶ 伝説達成": (reason==="引退"?"▶ 引退（モチベ消滅）":"▶ 30日終了");
  var h = reason==="制覇"?'伝<span class="r">説</span>': (reason==="引退"?'引<span class="r">退</span>':'結<span class="r">果</span>');
  $("ov").querySelector(".tag").textContent=tag;
  $("ov").querySelector("h1").innerHTML=h;
  var ps=$("ov").querySelectorAll(".modal p");
  ps[0].innerHTML=
    (won?"👑 <b>登録者1億・伝説の配信者に到達！</b><br>":"")+
    "最終ランク：<b>"+RANKS[rankIdx].name+"</b><br>"+
    "登録者：<b>"+fmtN(subs)+"人</b>（"+Math.min(day,DAYS)+"日経過）<br>"+
    "ベスト：<b>"+fmtN(best)+"人</b>";
  if(ps[1])ps[1].style.display="none";
  $("rankList").innerHTML="";
  $("goBtn").textContent="もう一回";
  $("ov").classList.remove("hide");
}

/* ===== hall ===== */
function openHall(){
  sfxBtn(); var g=$("hofgrid"); g.innerHTML="";
  for(var i=RANKS.length-1;i>=0;i--){
    var R=RANKS[i], got=!!unlocked[i];
    var d=document.createElement("div");
    d.className="hof"+(got?"":" locked");
    d.innerHTML='<img src="https://i.ytimg.com/vi/'+R.vid+'/hqdefault.jpg" alt="">'+
      '<div class="pl">'+(got?"▶":"🔒")+'</div>'+
      '<div class="lb">'+R.name+'：'+esc(R.vt)+'</div>';
    if(got){(function(R){d.addEventListener("pointerup",function(){playVideo(R.vid,R.vt+" ／ "+R.name+"の神動画");});})(R);}
    g.appendChild(d);
  }
  $("hall").classList.remove("hide");
}
$("bHall").addEventListener("pointerup",openHall);
$("hallClose").addEventListener("pointerup",function(){$("hall").classList.add("hide");sfxBtn();});
$("bMute").addEventListener("pointerup",function(){muted=!muted;$("bMute").textContent=muted?"🔇":"🔊";});

/* ===== toast ===== */
var toastTmr=0;
function toast(m){var el=$("toast");el.textContent=m;el.classList.add("show");
  clearTimeout(toastTmr);toastTmr=setTimeout(function(){el.classList.remove("show");},1800);}
function esc(s){return s.replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

/* ===== start ===== */
function buildRankList(){
  var el=$("rankList");el.innerHTML="";
  for(var i=0;i<RANKS.length;i++){var s=document.createElement("span");
    s.textContent=RANKS[i].name+(RANKS[i].sub?(" "+fmtN(RANKS[i].sub)):"");el.appendChild(s);}
}
function startGame(){
  subs=0;rankIdx=0;moti=3;day=1;pot=0;postsToday=0;unlocked={0:true};wonOnce=false;lastVid=-1;
  GS="play";
  $("ov").classList.add("hide");$("hall").classList.add("hide");
  sfxBtn(); startDay();
}
$("goBtn").addEventListener("pointerup",startGame);

/* prevent double-tap zoom */
var lastTap=0;
document.addEventListener("touchend",function(e){var n=Date.now();if(n-lastTap<350)e.preventDefault();lastTap=n;},{passive:false});
document.addEventListener("gesturestart",function(e){e.preventDefault();});
document.addEventListener("dblclick",function(e){e.preventDefault();});

buildRankList();
renderHUD();
</script>
</body>
</html>
