<style>
* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  height: 100%; overflow: hidden;
  background: #2c1a0e;

#wrap {
  position: fixed;
  top: 0; bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(100vw, calc(100dvh * 0.56), 480px);

<body>
<div id="wrap">

<script>
// ============================================================
//  AUDIO — iOS unlock
// ============================================================
let AC = null, muted = false;
function audio() {
  if (!AC) {
    try {
      AC = new (window.AudioContext || window.webkitAudioContext)();
      AC.onstatechange = () => {
        if (AC.state !== "running" && !document.hidden) { try { AC.resume(); } catch(e) {} }
      };
    } catch(e) {}
  }
  if (AC && AC.state !== "running") { try { AC.resume(); } catch(e) {} }
  return AC;
}
let silentEl = null;
function silentWavUrl() {
  const sr = 8000, n = 800, buf = new ArrayBuffer(44 + n), v = new DataView(buf);
  const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  str(0, "RIFF"); v.setUint32(4, 36 + n, true); str(8, "WAVE"); str(12, "fmt ");
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, sr, true); v.setUint32(28, sr, true); v.setUint16(32, 1, true);
  v.setUint16(34, 8, true); str(36, "data"); v.setUint32(40, n, true);
  for (let i = 0; i < n; i++) v.setUint8(44 + i, 0x80);
  return URL.createObjectURL(new Blob([buf], { type: "audio/wav" }));
}
function unlockAudio() {
  if (!silentEl) {
    silentEl = document.createElement("audio");
    silentEl.setAttribute("playsinline", "");
    silentEl.loop = true; silentEl.volume = 0.01;
    silentEl.src = silentWavUrl();
  }
  const p = silentEl.play();
  if (p && p.catch) p.catch(() => {});
  audio();
  if (!AC) return;
  const done = () => {
    if (AC.state === "running")
      ["pointerdown","pointerup","touchend"].forEach(ev => document.removeEventListener(ev, unlockAudio, true));
  };
  try { AC.resume().then(done); } catch(e) { done(); }
}
["pointerdown","pointerup","touchend"].forEach(ev => document.addEventListener(ev, unlockAudio, true));
document.addEventListener("visibilitychange", () => { if (!document.hidden) audio(); });

// double-tap zoom prevention
let lastTouch = 0;
document.addEventListener("touchend", e => {
  const n = Date.now();
  if (n - lastTouch <= 350 && e.cancelable) { e.preventDefault(); }
  lastTouch = n;
}, { passive: false });
document.addEventListener("dblclick", e => e.preventDefault());
document.addEventListener("gesturestart", e => e.preventDefault());

// SFX
function sfxPop(count) {
  const ac = audio(); if (!ac || muted) return;
  for (let i = 0; i < Math.min(count, 8); i++) {
    const t = ac.currentTime + i * 0.06;
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    const base = 400 + count * 60;
    o.frequency.setValueAtTime(base + i * 80, t);
    o.frequency.exponentialRampToValueAtTime(base * 0.4 + i * 20, t + 0.15);
    o.type = "sine";
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    o.start(t); o.stop(t + 0.22);
  }
}
function sfxDrop(count) {
  const ac = audio(); if (!ac || muted) return;
  const t = ac.currentTime;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = "triangle";
  o.frequency.setValueAtTime(250, t);
  o.frequency.exponentialRampToValueAtTime(60, t + 0.3);
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
  o.start(t); o.stop(t + 0.4);
}
function sfxShoot() {
  const ac = audio(); if (!ac || muted) return;
  const t = ac.currentTime;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = "sine";
  o.frequency.setValueAtTime(600, t);
  o.frequency.exponentialRampToValueAtTime(200, t + 0.1);
  g.gain.setValueAtTime(0.1, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
  o.start(t); o.stop(t + 0.14);
}
function sfxLand() {
  const ac = audio(); if (!ac || muted) return;
  const t = ac.currentTime;
  const o = ac.createOscillator(), g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = "sine";
  o.frequency.setValueAtTime(300, t);
  o.frequency.exponentialRampToValueAtTime(200, t + 0.08);
  g.gain.setValueAtTime(0.08, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  o.start(t); o.stop(t + 0.12);
}
function sfxGameOver() {
  const ac = audio(); if (!ac || muted) return;
  const t = ac.currentTime;
  [300, 260, 220, 180].forEach((f, i) => {
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = "sawtooth"; o.frequency.value = f;
    g.gain.setValueAtTime(0.15, t + i * 0.18);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.18 + 0.25);
    o.start(t + i * 0.18); o.stop(t + i * 0.18 + 0.28);
  });
}

// ============================================================
//  GAME CONSTANTS & STATE
// ============================================================
const COLS = 9;
const ROW_H_RATIO = 0.87;  // hex offset rows
const COLORS = [
  "#e8a0b4",  // momo-pink
  "#7ab8d9",  // ramune-blue
  "#a8c97a",  // matcha-green
  "#f2d06b",  // tamago-yellow
  "#c9a0dc",  // murasaki
];
const COLOR_NAMES = ["桃","ラムネ","抹茶","たまご","紫"];

// Grid geometry computed from canvas size
let CW = 0, CH = 0;
let RADIUS = 0;    // candy radius
let ROW_H = 0;     // row height
let COL_W = 0;     // column width
let GRID_TOP = 0;  // grid start Y
let DANGER_Y = 0;  // game over line Y

// Grid: grid[row][col] = colorIndex or -1
const MAX_ROWS = 16;
const MAX_GRID_ROWS = 22; // total possible rows in grid array
let grid = [];
let startRows = 6; // initial rows filled

// Projectile
let ballX = 0, ballY = 0;
let ballVX = 0, ballVY = 0;
let ballColor = 0;
let ballActive = false;
let ballRadius = 0;

// Next ball
let nextColor = 0;

// Aim
let aimAngle = -Math.PI / 2; // radians, -PI/2 = straight up
let aiming = false;
let aimStartX = 0, aimStartY = 0;

// State
let phase = "title"; // title | playing | over
let score = 0;
let bestScore = 0;
let bestChain = 0;
let currentChain = 0;
let shotCount = 0;
let descentTimer = 0;
let descentInterval = 18; // shots between new row additions
let numColors = 3; // starts with 3 colors, ramps up

// Particles
let particles = [];

// Animation for popping
let popAnim = null; // {cells, phase, t}

// Drop animation
let dropItems = []; // {x,y,color,vy,alpha}

// Descent animation
let descentAnim = 0; // pixels to scroll down visually

// ============================================================
//  PERSISTENCE
// ============================================================
function loadBest() {
  try {
    bestScore = parseInt(localStorage.getItem("konpei_best") || "0") || 0;
    bestChain = parseInt(localStorage.getItem("konpei_bestchain") || "0") || 0;
  } catch(e) {}
  document.getElementById("hBest").textContent = bestScore;
}
function saveBest() {
  try {
    localStorage.setItem("konpei_best", bestScore);
    localStorage.setItem("konpei_bestchain", bestChain);
  } catch(e) {}
}

// ============================================================
//  CANVAS SETUP
// ============================================================
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const nextCv = document.getElementById("nextCv");
const nextCtx = nextCv.getContext("2d");
let DPR = 1;

function resizeCanvas() {
  const stage = document.getElementById("stage");
  const rect = stage.getBoundingClientRect();
  CW = rect.width;
  CH = rect.height;
  DPR = window.devicePixelRatio || 1;

  cv.width = CW * DPR;
  cv.height = CH * DPR;
  cv.style.width = CW + "px";
  cv.style.height = CH + "px";

  // Geometry
  COL_W = CW / COLS;
  RADIUS = COL_W * 0.44;
  ROW_H = COL_W * ROW_H_RATIO;
  GRID_TOP = RADIUS;
  DANGER_Y = CH - COL_W * 2.5;  // bottom safe zone

  // Launcher position
  ballRadius = RADIUS;
}

// ============================================================
//  GRID HELPERS
// ============================================================
function gridX(col, row) {
  const offset = (row % 2 === 0) ? 0 : COL_W / 2;
  return col * COL_W + COL_W / 2 + offset;
}
function gridY(row) {
  return GRID_TOP + row * ROW_H;
}
function nearestCell(px, py) {
  let best = null, bestDist = Infinity;
  const rowMin = Math.max(0, Math.floor((py - GRID_TOP - ROW_H) / ROW_H));
  const rowMax = Math.min(MAX_GRID_ROWS - 1, Math.ceil((py - GRID_TOP + ROW_H) / ROW_H));
  for (let r = rowMin; r <= rowMax; r++) {
    const maxC = (r % 2 === 0) ? COLS : COLS - 1;
    for (let c = 0; c < maxC; c++) {
      const cx2 = gridX(c, r), cy2 = gridY(r);
      const d = Math.hypot(px - cx2, py - cy2);
      if (d < bestDist) { bestDist = d; best = { r, c }; }
    }
  }
  return best;
}
function neighbors(r, c) {
  const even = r % 2 === 0;
  return [
    [r-1, even ? c-1 : c],  [r-1, even ? c : c+1],
    [r,   c-1],              [r,   c+1],
    [r+1, even ? c-1 : c],  [r+1, even ? c : c+1],
  ].filter(([nr, nc]) => nr >= 0 && nr < MAX_GRID_ROWS && nc >= 0 && nc < COLS);
}
function getCell(r, c) {
  if (!grid[r]) return -1;
  return grid[r][c] === undefined ? -1 : grid[r][c];
}
function setCell(r, c, val) {
  if (!grid[r]) grid[r] = new Array(COLS).fill(-1);
  grid[r][c] = val;
}

// ============================================================
//  CONNECTED COMPONENT — BFS
// ============================================================
function floodFill(r, c, color) {
  const visited = new Set();
  const queue = [[r, c]];
  visited.add(r * COLS + c);
  while (queue.length) {
    const [cr, cc] = queue.shift();
    for (const [nr, nc] of neighbors(cr, cc)) {
      const key = nr * COLS + nc;
      if (!visited.has(key) && getCell(nr, nc) === color) {
        visited.add(key);
        queue.push([nr, nc]);
      }
    }
  }
  return [...visited].map(k => [Math.floor(k / COLS), k % COLS]);
}

function findDisconnected() {
  // cells not reachable from row 0
  const connected = new Set();
  const queue = [];
  for (let c = 0; c < COLS; c++) {
    if (getCell(0, c) !== -1) {
      const key = c; // row 0
      if (!connected.has(key)) {
        connected.add(key);
        queue.push([0, c]);
      }
    }
  }
  while (queue.length) {
    const [r, c] = queue.shift();
    for (const [nr, nc] of neighbors(r, c)) {
      const key = nr * COLS + nc;
      if (!connected.has(key) && getCell(nr, nc) !== -1) {
        connected.add(key);
        queue.push([nr, nc]);
      }
    }
  }
  // collect all non-empty cells not in connected
  const disconnected = [];
  for (let r = 0; r < MAX_GRID_ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const key = r * COLS + c;
      if (getCell(r, c) !== -1 && !connected.has(key)) {
        disconnected.push([r, c]);
      }
    }
  }
  return disconnected;
}

// ============================================================
//  INITIAL GRID
// ============================================================
function initGrid() {
  grid = [];
  for (let r = 0; r < MAX_GRID_ROWS; r++) {
    grid[r] = new Array(COLS).fill(-1);
  }
  fillTopRows(startRows);
}

function fillTopRows(count) {
  for (let r = 0; r < count; r++) {
    const maxC = (r % 2 === 0) ? COLS : COLS - 1;
    for (let c = 0; c < maxC; c++) {
      grid[r][c] = Math.floor(Math.random() * numColors);
    }
  }
}

function addNewRow() {
  // shift all rows down by 1
  for (let r = MAX_GRID_ROWS - 1; r > 0; r--) {
    grid[r] = grid[r-1] ? [...grid[r-1]] : new Array(COLS).fill(-1);
  }
  // fill row 0
  grid[0] = new Array(COLS).fill(-1);
  const maxC = 1 % 2 === 0 ? COLS : COLS - 1; // after shift, new row 0 is always even style
  for (let c = 0; c < COLS; c++) {
    grid[0][c] = Math.floor(Math.random() * numColors);
  }
  // trigger descent visual
  descentAnim = ROW_H;
}

// ============================================================
//  GAME INIT
// ============================================================
function initGame() {
  score = 0;
  currentChain = 0;
  shotCount = 0;
  descentTimer = 0;
  numColors = 3;
  startRows = 5;
  particles = [];
  dropItems = [];
  popAnim = null;
  descentAnim = 0;
  ballActive = false;
  aimAngle = -Math.PI / 2;
  aiming = false;

  resizeCanvas();
  initGrid();
  ballColor = randomColor();
  nextColor = randomColor();
  resetLauncher();

  document.getElementById("hScore").textContent = "0";
  drawNextBall();
}

function randomColor() {
  return Math.floor(Math.random() * numColors);
}

function resetLauncher() {
  ballX = CW / 2;
  ballY = DANGER_Y + COL_W * 0.6;
}

// ============================================================
//  AIM GUIDE — dotted line with wall bounces
// ============================================================
function getAimPoints(angle, maxBounces) {
  const pts = [[ballX, ballY]];
  let x = ballX, y = ballY;
  let dx = Math.cos(angle), dy = Math.sin(angle);
  const step = RADIUS * 0.5;
  let dist = 0;
  const maxDist = CH * 2.5;

  while (dist < maxDist) {
    x += dx * step; y += dy * step; dist += step;
    // wall bounce
    if (x - RADIUS < 0) { x = RADIUS; dx = Math.abs(dx); pts.push([x, y]); }
    if (x + RADIUS > CW) { x = CW - RADIUS; dx = -Math.abs(dx); pts.push([x, y]); }
    // ceiling
    if (y - RADIUS < GRID_TOP - RADIUS) { pts.push([x, y]); break; }
    // check if we'd hit a grid cell
    const cell = nearestCell(x, y);
    if (cell && getCell(cell.r, cell.c) !== -1) {
      const cx2 = gridX(cell.c, cell.r), cy2 = gridY(cell.r);
      if (Math.hypot(x - cx2, y - cy2) < RADIUS * 1.8) {
        pts.push([x, y]); break;
      }
    }
    pts.push([x, y]);
  }
  return pts;
}

// ============================================================
//  SHOOTING
// ============================================================
function shoot() {
  if (ballActive || phase !== "playing") return;
  sfxShoot();
  const speed = CW * 0.018;
  ballVX = Math.cos(aimAngle) * speed;
  ballVY = Math.sin(aimAngle) * speed;
  ballActive = true;
}

// ============================================================
//  KONPEITO DRAWING
// ============================================================
function drawKonpeito(ctx2, x, y, r, color, alpha) {
  ctx2.save();
  ctx2.globalAlpha = alpha !== undefined ? alpha : 1;
  ctx2.translate(x, y);

  // sugar spikes (konpeito shape)
  const spikes = 10;
  const innerR = r * 0.68;
  const outerR = r;

  // base color fill with sugar texture
  ctx2.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const ang = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
    const rr = i % 2 === 0 ? outerR : innerR;
    const px2 = Math.cos(ang) * rr, py2 = Math.sin(ang) * rr;
    i === 0 ? ctx2.moveTo(px2, py2) : ctx2.lineTo(px2, py2);
  }
  ctx2.closePath();

  // gradient fill
  const grad = ctx2.createRadialGradient(-r*0.2, -r*0.2, 0, 0, 0, r);
  grad.addColorStop(0, lighten(color, 0.4));
  grad.addColorStop(0.6, color);
  grad.addColorStop(1, darken(color, 0.3));
  ctx2.fillStyle = grad;
  ctx2.fill();

  // sugar sheen
  ctx2.beginPath();
  ctx2.arc(-r*0.2, -r*0.2, r*0.25, 0, Math.PI * 2);
  ctx2.fillStyle = "rgba(255,255,255,0.35)";
  ctx2.fill();

  // outline
  ctx2.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const ang = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
    const rr = i % 2 === 0 ? outerR : innerR;
    const px2 = Math.cos(ang) * rr, py2 = Math.sin(ang) * rr;
    i === 0 ? ctx2.moveTo(px2, py2) : ctx2.lineTo(px2, py2);
  }
  ctx2.closePath();
  ctx2.strokeStyle = darken(color, 0.45);
  ctx2.lineWidth = r * 0.08;
  ctx2.stroke();

  ctx2.restore();
}

function lighten(hex, amount) {
  const r2 = parseInt(hex.slice(1,3),16), g2 = parseInt(hex.slice(3,5),16), b2 = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r2+Math.round(255*amount))},${Math.min(255,g2+Math.round(255*amount))},${Math.min(255,b2+Math.round(255*amount))})`;
}
function darken(hex, amount) {
  const r2 = parseInt(hex.slice(1,3),16), g2 = parseInt(hex.slice(3,5),16), b2 = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r2-Math.round(255*amount))},${Math.max(0,g2-Math.round(255*amount))},${Math.max(0,b2-Math.round(255*amount))})`;
}

// ============================================================
//  PARTICLES
// ============================================================
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      color,
      r: RADIUS * (0.15 + Math.random() * 0.2),
      life: 1,
      decay: 0.04 + Math.random() * 0.04,
    });
  }
}

// ============================================================
//  NEXT BALL DISPLAY
// ============================================================
function drawNextBall() {
  const nc = nextCv;
  const nx = nextCtx;
  const ndpr = window.devicePixelRatio || 1;
  nc.width = 60 * ndpr; nc.height = 60 * ndpr;
  nc.style.width = "60px"; nc.style.height = "60px";
  nx.setTransform(ndpr, 0, 0, ndpr, 0, 0);
  nx.clearRect(0, 0, 60, 60);
  drawKonpeito(nx, 30, 30, 22, COLORS[nextColor]);
}

// ============================================================
//  GRID LOWEST ROW CHECK
// ============================================================
function getMaxOccupiedRow() {
  let maxRow = -1;
  for (let r = 0; r < MAX_GRID_ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (getCell(r, c) !== -1) maxRow = r;
    }
  }
  return maxRow;
}

// ============================================================
//  HIT & STICK
// ============================================================
function stickBall(px, py) {
  sfxLand();
  // Find empty neighbor cell closest to landing point
  let bestCell = null, bestDist = Infinity;
  for (let r = 0; r < MAX_GRID_ROWS; r++) {
    const maxC = (r % 2 === 0) ? COLS : COLS - 1;
    for (let c = 0; c < maxC; c++) {
      if (getCell(r, c) !== -1) continue;
      const cx2 = gridX(c, r), cy2 = gridY(r);
      const d = Math.hypot(px - cx2, py - cy2);
      if (d < bestDist) { bestDist = d; bestCell = { r, c }; }
    }
  }
  // Also check ceiling snap
  if (!bestCell || bestDist > COL_W * 1.5) {
    // snap to nearest grid position above
    const r = 0;
    let bc = null, bd = Infinity;
    const maxC = COLS;
    for (let c = 0; c < maxC; c++) {
      const cx2 = gridX(c, r), cy2 = gridY(r);
      const d = Math.hypot(px - cx2, py - cy2);
      if (d < bd) { bd = d; bc = { r, c }; }
    }
    bestCell = bc;
  }

  if (!bestCell) return;
  const { r, c } = bestCell;
  setCell(r, c, ballColor);
  ballActive = false;

  // Check for match
  const group = floodFill(r, c, ballColor);
  if (group.length >= 3) {
    // pop!
    const popColor = ballColor;
    const popPts = group.map(([gr, gc]) => ({ r: gr, c: gc, x: gridX(gc, gr), y: gridY(gr) }));
    for (const [gr, gc] of group) setCell(gr, gc, -1);

    const pts = popPts;
    pts.forEach(p => spawnParticles(p.x, p.y, COLORS[popColor], 8));
    sfxPop(group.length);
    score += group.length * 10;

    // find disconnected
    const disc = findDisconnected();
    let chainBonus = 0;
    if (disc.length > 0) {
      chainBonus = disc.length * 20;
      score += chainBonus;
      currentChain = Math.max(currentChain, disc.length);
      if (currentChain > bestChain) bestChain = currentChain;
      disc.forEach(([dr, dc]) => {
        dropItems.push({
          x: gridX(dc, dr), y: gridY(dr),
          color: getCell(dr, dc),
          vy: 1 + Math.random() * 2,
          alpha: 1,
        });
        // remove from grid
        setCell(dr, dc, -1);
      });
      sfxDrop(disc.length);
    } else {
      currentChain = 0;
    }

    document.getElementById("hScore").textContent = score;
  } else {
    currentChain = 0;
  }

  // advance next ball
  ballColor = nextColor;
  nextColor = randomColor();
  drawNextBall();

  shotCount++;
  descentTimer++;

  // difficulty ramp
  if (shotCount % 20 === 0 && numColors < 5) numColors++;
  if (descentTimer >= descentInterval) {
    descentTimer = 0;
    descentInterval = Math.max(10, descentInterval - 1);
    addNewRow();
  }

  // check game over — lowest candy past danger line
  const maxRow = getMaxOccupiedRow();
  if (maxRow !== -1 && gridY(maxRow) + RADIUS > DANGER_Y) {
    endGame();
    return;
  }

  resetLauncher();
}

// ============================================================
//  GAME OVER
// ============================================================
function endGame() {
  phase = "over";
  sfxGameOver();
  let isNew = false;
  if (score > bestScore) { bestScore = score; isNew = true; }
  saveBest();
  document.getElementById("hBest").textContent = bestScore;
  document.getElementById("overScore").textContent = score;
  document.getElementById("overBest").textContent = bestScore;
  document.getElementById("overChain").textContent = bestChain;
  document.getElementById("newRecordBadge").style.display = isNew ? "block" : "none";
  document.getElementById("overOv").classList.add("show");
}

// ============================================================
//  BALL PHYSICS UPDATE
// ============================================================
function updateBall() {
  if (!ballActive) return;
  const steps = 4;
  for (let s = 0; s < steps; s++) {
    ballX += ballVX / steps;
    ballY += ballVY / steps;

    // wall bounce
    if (ballX - ballRadius < 0) { ballX = ballRadius; ballVX = Math.abs(ballVX); }
    if (ballX + ballRadius > CW) { ballX = CW - ballRadius; ballVX = -Math.abs(ballVX); }

    // ceiling
    if (ballY - ballRadius < GRID_TOP) {
      stickBall(ballX, GRID_TOP + ballRadius);
      return;
    }

    // collision with grid
    let hit = false;
    const checkR = Math.max(0, Math.floor((ballY - GRID_TOP - ROW_H * 1.5) / ROW_H));
    const checkRMax = Math.min(MAX_GRID_ROWS - 1, Math.ceil((ballY - GRID_TOP + ROW_H * 1.5) / ROW_H));
    for (let r = checkR; r <= checkRMax && !hit; r++) {
      const maxC = (r % 2 === 0) ? COLS : COLS - 1;
      for (let c = 0; c < maxC && !hit; c++) {
        if (getCell(r, c) === -1) continue;
        const cx2 = gridX(c, r), cy2 = gridY(r);
        const dist = Math.hypot(ballX - cx2, ballY - cy2);
        if (dist < RADIUS * 1.85) {
          stickBall(ballX, ballY);
          hit = true;
        }
      }
    }
    if (hit) return;

    // missed (fell below) — shouldn't happen but safety
    if (ballY > CH + RADIUS * 2) {
      ballActive = false;
      ballColor = nextColor;
      nextColor = randomColor();
      drawNextBall();
      resetLauncher();
    }
  }
}

// ============================================================
//  DESCENT ANIMATION
// ============================================================
function updateDescent() {
  if (descentAnim > 0) {
    descentAnim = Math.max(0, descentAnim - 3);
  }
}

// ============================================================
//  RENDER
// ============================================================
function draw() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, CW, CH);

  // Background — kraft paper texture feel
  ctx.fillStyle = "#fdf3e3";
  ctx.fillRect(0, 0, CW, CH);

  // subtle grid lines on paper
  ctx.strokeStyle = "rgba(139,69,19,0.08)";
  ctx.lineWidth = 0.5;
  for (let y2 = 0; y2 < CH; y2 += 20) {
    ctx.beginPath(); ctx.moveTo(0, y2); ctx.lineTo(CW, y2); ctx.stroke();
  }

  // Danger line
  ctx.setLineDash([4, 6]);
  ctx.strokeStyle = "rgba(192,57,43,0.5)";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(0, DANGER_Y);
  ctx.lineTo(CW, DANGER_Y);
  ctx.stroke();
  ctx.setLineDash([]);

  // Small "ここまで" label
  ctx.font = `${RADIUS * 0.55}px Reggae One, cursive`;
  ctx.fillStyle = "rgba(192,57,43,0.6)";
  ctx.textAlign = "right";
  ctx.fillText("ここまで", CW - 4, DANGER_Y - 3);
  ctx.textAlign = "left";

  // Grid cells (offset by descentAnim)
  const yOff = descentAnim;
  for (let r = 0; r < MAX_GRID_ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const col = getCell(r, c);
      if (col === -1) continue;
      const x2 = gridX(c, r), y2 = gridY(r) + yOff;
      if (y2 > CH + RADIUS || y2 < -RADIUS) continue;
      drawKonpeito(ctx, x2, y2, RADIUS, COLORS[col]);
    }
  }

  // Aim guide (only when playing and not shooting)
  if (phase === "playing" && !ballActive) {
    const pts = getAimPoints(aimAngle, 3);
    ctx.save();
    ctx.setLineDash([4, 8]);
    ctx.strokeStyle = "rgba(139,69,19,0.5)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Ghost ball at tip
    if (pts.length > 1) {
      const last = pts[pts.length - 1];
      drawKonpeito(ctx, last[0], last[1], RADIUS * 0.5, COLORS[ballColor], 0.35);
    }
  }

  // Flying ball
  if (ballActive) {
    drawKonpeito(ctx, ballX, ballY, RADIUS, COLORS[ballColor]);
  }

  // Launcher base (when not shooting)
  if (!ballActive && phase === "playing") {
    // Draw current ball at launcher
    drawKonpeito(ctx, ballX, ballY, RADIUS, COLORS[ballColor]);

    // Launcher tray
    ctx.fillStyle = "#8b4513";
    ctx.beginPath();
    ctx.ellipse(CW / 2, ballY + RADIUS * 0.8, RADIUS * 1.4, RADIUS * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Drop items
  for (let i = dropItems.length - 1; i >= 0; i--) {
    const d = dropItems[i];
    d.y += d.vy; d.vy += 0.5; d.alpha -= 0.025;
    if (d.alpha <= 0 || d.y > CH + RADIUS * 2) { dropItems.splice(i, 1); continue; }
    if (d.color >= 0 && d.color < COLORS.length) {
      drawKonpeito(ctx, d.x, d.y, RADIUS, COLORS[d.color], d.alpha);
    }
  }
}

// ============================================================
//  MAIN LOOP
// ============================================================
function loop() {
  if (phase === "playing") {
    updateBall();
    updateDescent();
  }
  draw();
  requestAnimationFrame(loop);
}

// ============================================================
//  INPUT
// ============================================================
function setAimFromPointer(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  const px = clientX - rect.left;
  const py = clientY - rect.top;
  const dx = px - ballX;
  const dy = py - ballY;
  // only allow upward angles
  if (dy >= 0) return; // pointing downward — ignore
  const angle = Math.atan2(dy, dx);
  // clamp to avoid extreme horizontal
  const minAngle = -Math.PI + 0.15;
  const maxAngle = -0.15;
  aimAngle = Math.max(minAngle, Math.min(maxAngle, angle));
}

cv.addEventListener("pointerdown", e => {
  if (phase !== "playing") return;
  e.preventDefault();
  aiming = true;
  aimStartX = e.clientX; aimStartY = e.clientY;
  setAimFromPointer(e.clientX, e.clientY);
}, { passive: false });

cv.addEventListener("pointermove", e => {
  if (!aiming || phase !== "playing") return;
  e.preventDefault();
  setAimFromPointer(e.clientX, e.clientY);
}, { passive: false });

cv.addEventListener("pointerup", e => {
  if (!aiming || phase !== "playing") return;
  e.preventDefault();
  aiming = false;
  if (!ballActive) shoot();
}, { passive: false });

cv.addEventListener("pointercancel", e => {
  aiming = false;
});

// Keyboard
document.addEventListener("keydown", e => {
  if (phase !== "playing") return;
  if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
    aimAngle = Math.max(-Math.PI + 0.15, aimAngle - 0.05);
  } else if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
    aimAngle = Math.min(-0.15, aimAngle + 0.05);
  } else if (e.key === " ") {
    e.preventDefault();
    if (!ballActive) shoot();
  }
});

// Mute
document.getElementById("muteBtn").addEventListener("pointerup", e => {
  e.stopPropagation();
  muted = !muted;
  document.getElementById("muteBtn").textContent = muted ? "🔇" : "🔊";
});

// Start
document.getElementById("startBtn").addEventListener("pointerup", e => {
  e.stopPropagation();
  document.getElementById("startOv").classList.remove("show");
  phase = "playing";
});

// Retry
document.getElementById("retryBtn").addEventListener("pointerup", e => {
  e.stopPropagation();
  document.getElementById("overOv").classList.remove("show");
  initGame();
  phase = "playing";
});

// ============================================================
//  BOOT
// ============================================================
loadBest();
resizeCanvas();
// initialize all loop state at declaration time
initGrid();
ballColor = 0;
nextColor = 1;
resetLauncher();
drawNextBall();
phase = "title";
loop();

window.addEventListener("resize", () => {
  resizeCanvas();
  if (phase === "playing") resetLauncher();
});
</script>
</body>
