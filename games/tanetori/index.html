<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>タネトリ — TANETORI</title>
<meta name="description" content="落ちてくるマメをタネで撃ち落とせ!まとめて撃つほど高得点のレトロ風アクション。">
<meta property="og:title" content="タネトリ — TANETORI">
<meta property="og:description" content="落ちてくるマメをタネで撃ち落とせ!まとめて撃つほど高得点のレトロ風アクション。">
<meta property="og:image" content="https://nrtkumi.github.io/games/tanetori/assets/ogp.jpg">
<meta property="og:type" content="website">
<meta property="og:url" content="https://nrtkumi.github.io/games/tanetori/">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    background: #10142a; color: #fff; overflow: hidden;
    font-family: "Zen Kaku Gothic New", sans-serif;
    height: 100dvh;
  }
  #wrap {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top);
  }
  #hud {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 14px; font-family: "Space Mono", monospace; font-size: 14px;
    background: rgba(0,0,0,0.25); z-index: 3;
  }
  #hud b { font-size: 18px; margin-left: 6px; color: #ffe66d; }
  #muteBtn { background: none; border: 1px solid rgba(255,255,255,0.35); color: #fff; border-radius: 8px; padding: 3px 10px; font-size: 14px; }
  #cvBox { flex: 1; position: relative; min-height: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; touch-action: none; display: block; }
  #ctrl {
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
    background: #1a1f3d; z-index: 3;
  }
  .pad { display: flex; gap: 10px; }
  .cbtn {
    touch-action: none; border: none; border-radius: 16px;
    font-family: "Bungee", "Zen Kaku Gothic New", sans-serif;
    color: #fff; background: #2e3766; box-shadow: 0 4px 0 #151a38;
    width: 72px; height: 72px; font-size: 26px;
  }
  .cbtn:active, .cbtn.on { transform: translateY(3px); box-shadow: 0 1px 0 #151a38; background: #3d4a8c; }
  #btnFire {
    width: 96px; height: 72px; border-radius: 50px; font-size: 18px;
    background: #e84545; box-shadow: 0 4px 0 #7d1f1f;
    font-family: "Zen Kaku Gothic New", sans-serif; font-weight: 700;
  }
  #btnFire:active, #btnFire.on { box-shadow: 0 1px 0 #7d1f1f; background: #ff5d5d; }
  #overlay {
    position: absolute; inset: 0; z-index: 5; display: flex; align-items: center; justify-content: center;
    background: rgba(8, 10, 26, 0.62); backdrop-filter: blur(2px); text-align: center; padding: 20px;
  }
  #overlay.hidden { display: none; }
  .panel { max-width: 340px; }
  .panel h1 { font-family: "Bungee", sans-serif; font-size: 44px; color: #ffe66d; letter-spacing: 2px; text-shadow: 0 4px 0 #b8860b; }
  .panel h2 { font-size: 18px; font-weight: 700; margin: 2px 0 16px; color: #9fd8ff; }
  .panel .rules { font-size: 13px; line-height: 1.9; text-align: left; background: rgba(0,0,0,0.35); border-radius: 12px; padding: 12px 16px; margin-bottom: 18px; }
  .panel .rules em { color: #ffe66d; font-style: normal; font-weight: 700; }
  .panel .tap { font-family: "Space Mono", monospace; font-size: 15px; color: #fff; animation: blink 1.1s infinite; }
  .panel .result { font-family: "Space Mono", monospace; font-size: 16px; line-height: 2; margin-bottom: 14px; }
  .panel .result b { font-size: 30px; color: #ffe66d; }
  @keyframes blink { 50% { opacity: 0.25; } }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div>SCORE<b id="hScore">0</b></div>
    <div>BEST<b id="hBest">0</b></div>
    <button id="muteBtn">🔊</button>
  </div>
  <div id="cvBox">
    <canvas id="cv"></canvas>
    <div id="overlay">
      <div class="panel" id="panel">
        <img src="assets/logo.png" alt="タネトリ TANETORI" style="width:220px;max-width:62vw;display:block;margin:0 auto 4px;filter:drop-shadow(0 6px 10px rgba(0,0,0,0.45))">
        <h2>〜トリのタネ撃ちアクション〜</h2>
        <div class="rules">
          ◀▶ で移動、<em>発射ボタン</em>でナナメ上にタネを撃つ!<br>
          マメを<em>まとめて撃つ</em>ほど高得点<br>
          &nbsp;&nbsp;1個=50 / 2個=各100 / 3個=各300 / 4個+=<em>各1000</em><br>
          マメが落ちると<em>床がこわれる</em><br>
          <em>白マメ</em>を撃つと天使が床を修復<br>
          <em>七色マメ</em>で画面のマメ全消し+天使ラッシュ<br>
          トリにマメが当たるとゲームオーバー
        </div>
        <div class="tap">タップでスタート</div>
      </div>
    </div>
  </div>
  <div id="ctrl">
    <div class="pad">
      <button class="cbtn" id="btnL">◀</button>
      <button class="cbtn" id="btnR">▶</button>
    </div>
    <button class="cbtn" id="btnFire">タネ発射</button>
  </div>
</div>
<script>
(() => {
  "use strict";
  const $ = id => document.getElementById(id);

  /* ---------- audio (iOS消音スイッチ対策込み・hakai準拠) ---------- */
  let AC = null, muted = false;
  function audio() {
    if (!AC) {
      try {
        AC = new (window.AudioContext || window.webkitAudioContext)();
        AC.onstatechange = () => { if (AC.state !== "running" && !document.hidden) { try { AC.resume(); } catch (e) {} } };
      } catch (e) {}
    }
    if (AC && AC.state !== "running") { try { AC.resume(); } catch (e) {} }
    return AC;
  }
  let silentEl = null;
  function silentWavUrl() {
    const sr = 8000, n = 800, buf = new ArrayBuffer(44 + n), v = new DataView(buf);
    const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    str(0, "RIFF"); v.setUint32(4, 36 + n, true); str(8, "WAVE");
    str(12, "fmt "); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr, true); v.setUint16(32, 1, true); v.setUint16(34, 8, true);
    str(36, "data"); v.setUint32(40, n, true);
    for (let i = 0; i < n; i++) v.setUint8(44 + i, 0x80);
    return URL.createObjectURL(new Blob([buf], { type: "audio/wav" }));
  }
  function unlockAudio() {
    if (!silentEl) {
      silentEl = document.createElement("audio");
      silentEl.setAttribute("playsinline", "");
      silentEl.loop = true;
      silentEl.volume = 0.01;
      silentEl.src = silentWavUrl();
    }
    const p = silentEl.play();
    if (p && p.catch) p.catch(() => {});
    audio();
    if (!AC) return;
    const done = () => {
      if (AC.state === "running") {
        ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.removeEventListener(ev, unlockAudio, true));
      }
    };
    try { AC.resume().then(done); } catch (e) { done(); }
  }
  ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.addEventListener(ev, unlockAudio, true));
  document.addEventListener("visibilitychange", () => { if (!document.hidden) audio(); });

  function tone(f, d, type, vol, slideTo) {
    if (muted || !audio()) return;
    try {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type || "sine"; o.frequency.value = f;
      if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, AC.currentTime + d);
      g.gain.value = vol || 0.06;
      g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
      o.connect(g); g.connect(AC.destination);
      o.start(); o.stop(AC.currentTime + d);
    } catch (e) {}
  }
  function noise(d, vol) {
    if (muted || !audio()) return;
    try {
      const n = Math.floor(AC.sampleRate * d);
      const buf = AC.createBuffer(1, n, AC.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / n);
      const src = AC.createBufferSource(); src.buffer = buf;
      const g = AC.createGain(); g.gain.value = vol || 0.08;
      src.connect(g); g.connect(AC.destination); src.start();
    } catch (e) {}
  }
  const sShoot = () => tone(950, 0.06, "square", 0.035, 1500);
  const sHit = n => {
    const base = [0, 660, 784, 988, 1319][Math.min(n, 4)];
    for (let i = 0; i < Math.min(n, 4); i++) setTimeout(() => tone(base + i * 130, 0.1, "square", 0.05), i * 55);
    if (n >= 4) setTimeout(() => tone(1976, 0.25, "square", 0.06), 240);
  };
  const sBreak = () => { noise(0.08, 0.08); tone(90, 0.14, "sawtooth", 0.055); };
  const sAngel = () => { tone(1047, 0.1, "sine", 0.05); setTimeout(() => tone(1568, 0.16, "sine", 0.05), 90); };
  const sFlash = () => { noise(0.25, 0.1); [523, 659, 784, 1047, 1319].forEach((f, i) => setTimeout(() => tone(f, 0.18, "square", 0.05), i * 60)); };
  const sOver = () => [392, 311, 233, 156].forEach((f, i) => setTimeout(() => tone(f, 0.3, "sawtooth", 0.05), i * 160));
  const vibe = ms => { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} };

  /* ---------- 永続化 ---------- */
  const store = {
    load(k, fb) { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch { return fb; } },
    save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
  };
  let best = store.load("tanetori_best", 0);

  /* ---------- canvas ---------- */
  const cv = $("cv"), ctx = cv.getContext("2d");
  const COLS = 20;
  let W = 360, H = 560, dpr = 1, tileW = 18, tileH = 14, floorY = 540;
  function resize() {
    const box = $("cvBox");
    const w = box.clientWidth || 360, h = box.clientHeight || 560;
    const ratioW = w / W;
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width = Math.round(w * dpr); cv.height = Math.round(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    // 既存座標を新サイズへスケール
    bird.x *= ratioW;
    for (const b of beans) { b.x *= ratioW; b.y *= h / H; }
    W = w; H = h;
    tileW = W / COLS; tileH = Math.max(12, Math.round(tileW * 0.78));
    floorY = H - tileH - 8;
    bird.w = tileW * 1.8; bird.h = tileW * 1.55;
    if (!bird.x) bird.x = W / 2;
  }

  /* ---------- 状態(全て宣言時に初期化 — ループはタイトル時点から回る) ---------- */
  let mode = "title";                 // title | play | over
  let score = 0, playT = 0;
  let tiles = new Array(COLS).fill(true);
  let beans = [], angels = [], leaves = [], pops = [], fx = [], debris = [];
  const bird = { x: 0, face: 1, w: 34, h: 30, step: 0, beakT: 0 };
  let shotCd = 0, shotFlash = 0, shotRay = null;
  let spawnT = 1, nextFlash = 5000, shake = 0, overAt = 0;
  let fwT = 0;
  const input = { l: false, r: false, fire: false };
  // 背景画像(読み込めなければグラデーションにフォールバック)
  const bgImg = typeof Image !== "undefined" ? new Image() : null;
  let bgReady = false;
  if (bgImg) {
    bgImg.onload = () => { bgReady = true; };
    bgImg.onerror = () => { bgReady = false; };
    bgImg.src = "assets/bg.jpg";
  }
  // 背景フェーズ(top/botはフォールバック用、tt/tbは画像への乗算ティント)
  const PHASES = [
    { at: 0,     top: [126, 200, 255], bot: [191, 233, 255], sun: true,  tt: [255, 255, 255], tb: [255, 255, 255] },
    { at: 5000,  top: [244, 130, 80],  bot: [255, 214, 140], sun: true,  tt: [255, 150, 95],  tb: [255, 215, 160] },
    { at: 10000, top: [11, 20, 56],    bot: [40, 56, 110],   stars: true, tt: [62, 78, 160],  tb: [105, 118, 180] },
    { at: 20000, top: [92, 70, 40],    bot: [180, 150, 100], tt: [235, 185, 120], tb: [220, 195, 150] },
    { at: 30000, top: [30, 30, 34],    bot: [120, 120, 126], stars: true, mono: true, tt: [165, 165, 172], tb: [205, 205, 210] },
    { at: 40000, top: [10, 8, 30],     bot: [60, 20, 80],    stars: true, fw: true, tt: [70, 58, 135], tb: [115, 85, 155] },
  ];
  let curTop = PHASES[0].top.slice(), curBot = PHASES[0].bot.slice();
  let curTT = PHASES[0].tt.slice(), curTB = PHASES[0].tb.slice();

  function phaseIdx() {
    let p = 0;
    for (let i = 0; i < PHASES.length; i++) if (score >= PHASES[i].at) p = i;
    return p;
  }

  const BEAN_COLORS = ["#e84545", "#3fa34d", "#8e5bd9", "#f2842a"];

  function reset() {
    score = 0; playT = 0;
    tiles = new Array(COLS).fill(true);
    beans = []; angels = []; leaves = []; pops = []; fx = []; debris = [];
    bird.x = W / 2; bird.face = 1; bird.step = 0; bird.beakT = 0;
    shotCd = 0; shotFlash = 0; shotRay = null;
    spawnT = 1.2; nextFlash = 5000; shake = 0; fwT = 0;
    curTop = PHASES[0].top.slice(); curBot = PHASES[0].bot.slice();
    curTT = PHASES[0].tt.slice(); curTB = PHASES[0].tb.slice();
    updateHud();
  }

  function updateHud() {
    $("hScore").textContent = score;
    $("hBest").textContent = best;
  }

  /* ---------- マメ ---------- */
  function beanR() { return tileW * 0.42; }
  function fallSpeed() {
    const k = Math.min(1, score / 35000 + playT / 420);
    return H * (0.09 + 0.36 * k);
  }
  function maxBeans() { return Math.min(16, 3 + Math.floor(score / 700)); }
  function spawnBean(type) {
    const r = beanR();
    const x = r + Math.random() * (W - r * 2);
    beans.push({
      x, y: -r, r,
      vy: fallSpeed() * (type === 2 ? 0.55 : 0.85 + Math.random() * 0.3),
      type: type || 0,
      color: BEAN_COLORS[(Math.random() * BEAN_COLORS.length) | 0],
      rot: (Math.random() - 0.5) * 0.6, t: 0
    });
  }

  /* ---------- 天使 ---------- */
  function reserveCols() {
    const s = new Set();
    for (const a of angels) s.add(a.col);
    return s;
  }
  function sendAngel(nearX) {
    const used = reserveCols();
    let bestCol = -1, bestD = 1e9;
    for (let c = 0; c < COLS; c++) {
      if (tiles[c] || used.has(c)) continue;
      const d = Math.abs((c + 0.5) * tileW - nearX);
      if (d < bestD) { bestD = d; bestCol = c; }
    }
    if (bestCol < 0) { addPop(nearX, floorY - 60, "+200"); score += 200; return; }
    angels.push({ col: bestCol, x: (bestCol + 0.5) * tileW, y: -30, vy: H * 0.4, up: false, wing: 0 });
  }

  /* ---------- エフェクト ---------- */
  function addPop(x, y, txt) {
    pops.push({ x: Math.max(20, Math.min(W - 20, x)), y, txt, t: 0 });
  }
  function addLeaves(x, y, color) {
    const n = 2 + (Math.random() * 2 | 0);
    for (let i = 0; i < n; i++) {
      leaves.push({ x, y, vx: (Math.random() - 0.5) * 40, vy: 25 + Math.random() * 30, ph: Math.random() * 6.28, t: 0, color });
    }
  }
  function addDebris(col) {
    const cx = (col + 0.5) * tileW;
    for (let i = 0; i < 6; i++) {
      debris.push({ x: cx + (Math.random() - 0.5) * tileW, y: floorY + tileH / 2, vx: (Math.random() - 0.5) * 140, vy: -60 - Math.random() * 120, t: 0 });
    }
  }
  function addBurst(x, y, color) {
    for (let i = 0; i < 14; i++) {
      const a = (i / 14) * Math.PI * 2, sp = 60 + Math.random() * 90;
      fx.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, t: 0, life: 0.7 + Math.random() * 0.4, color });
    }
  }

  /* ---------- 発射 ---------- */
  function beakPos() {
    return { x: bird.x + bird.face * bird.w * 0.42, y: floorY - bird.h * 0.72 };
  }
  function shoot() {
    if (shotCd > 0 || mode !== "play") return;
    shotCd = 0.2; bird.beakT = 0.12;
    sShoot();
    const p = beakPos();
    const c = Math.SQRT1_2, dx = bird.face * c, dy = -c;
    shotRay = { x: p.x, y: p.y, dx, dy }; shotFlash = 0.1;
    const margin = tileW * 0.3;
    const hit = [];
    for (const b of beans) {
      const rx = b.x - p.x, ry = b.y - p.y;
      const t = rx * dx + ry * dy;
      if (t < 0) continue;
      const dist = Math.abs(rx * dy - ry * dx);
      if (dist <= b.r + margin) hit.push(b);
    }
    if (!hit.length) return;
    const val = [0, 50, 100, 300, 1000][Math.min(hit.length, 4)];
    let flashHit = false;
    for (const b of hit) {
      beans.splice(beans.indexOf(b), 1);
      score += val;
      addPop(b.x, b.y, "+" + val);
      addLeaves(b.x, b.y, b.type === 1 ? "#fff" : b.color);
      addBurst(b.x, b.y, b.type === 2 ? "#ffe66d" : b.color);
      if (b.type === 1) sendAngel(b.x);
      if (b.type === 2) flashHit = true;
    }
    sHit(hit.length);
    if (hit.length >= 3) { shake = Math.max(shake, 0.18); vibe(30); }
    if (flashHit) {
      sFlash(); shake = 0.35; vibe([40, 40, 40]);
      let sent = 0;
      const rest = beans.slice();
      beans = [];
      for (const b of rest) {
        score += 50;
        addPop(b.x, b.y, "+50");
        addLeaves(b.x, b.y, b.color);
        addBurst(b.x, b.y, "#fff");
      }
      for (let c2 = 0; c2 < COLS && sent < 10; c2++) if (!tiles[c2]) { sendAngel((c2 + 0.5) * tileW); sent++; }
      fx.push({ x: W / 2, y: H / 2, vx: 0, vy: 0, t: 0, life: 0.3, color: "#fff", full: true });
    }
    updateHud();
  }

  /* ---------- 移動 ---------- */
  function moveBird(dx) {
    const half = bird.w * 0.4;
    let x = Math.max(half, Math.min(W - half, bird.x + dx));
    const from = Math.floor(bird.x / tileW), to = Math.max(0, Math.min(COLS - 1, Math.floor(x / tileW)));
    if (from !== to) {
      const step = to > from ? 1 : -1;
      for (let cur = from; cur !== to; cur += step) {
        const nxt = cur + step;
        if (!tiles[nxt]) {           // 穴の列へは胴体半分まで(=中心は境界まで)
          x = step > 0 ? nxt * tileW - 0.01 : (nxt + 1) * tileW + 0.01;
          break;
        }
      }
    }
    bird.x = x;
  }

  /* ---------- 進行 ---------- */
  function gameOver() {
    mode = "over"; overAt = performance.now();
    sOver(); vibe(200); shake = 0.4;
    addBurst(bird.x, floorY - bird.h / 2, "#ffe66d");
    if (score > best) { best = score; store.save("tanetori_best", best); }
    updateHud();
    $("panel").innerHTML =
      '<h1>GAME OVER</h1>' +
      '<div class="result">SCORE <b>' + score + '</b><br>BEST ' + best + '</div>' +
      '<div class="tap">タップでリトライ</div>';
    setTimeout(() => $("overlay").classList.remove("hidden"), 700);
  }

  function update(dt) {
    playT += dt;
    // 入力
    const dir = (input.l ? -1 : 0) + (input.r ? 1 : 0);
    if (dir) {
      bird.face = dir;
      bird.step += dt * 10;
      moveBird(dir * tileW * (8.5 + Math.min(3, score / 8000)) * dt);
    }
    if (shotCd > 0) shotCd -= dt;
    if (input.fire) shoot();

    // 点滅マメ出現
    if (score >= nextFlash) {
      spawnBean(2);
      nextFlash += nextFlash >= 9000 ? 1000 : 2000;
    }
    // 通常スポーン
    spawnT -= dt;
    if (spawnT <= 0 && beans.length < maxBeans()) {
      spawnBean(Math.random() < 1 / 9 ? 1 : 0);
      spawnT = Math.max(0.38, 1.4 - score / 18000 - playT * 0.0012) * (0.7 + Math.random() * 0.6);
    }

    // マメ更新
    for (let i = beans.length - 1; i >= 0; i--) {
      const b = beans[i];
      b.t += dt; b.y += b.vy * dt;
      // トリに当たったら終了
      if (b.y + b.r > floorY - bird.h && b.y - b.r < floorY &&
          Math.abs(b.x - bird.x) < bird.w * 0.38 + b.r * 0.8) {
        beans.splice(i, 1);
        gameOver();
        return;
      }
      if (b.y + b.r >= floorY) {
        const col = Math.max(0, Math.min(COLS - 1, Math.floor(b.x / tileW)));
        if (tiles[col]) {
          tiles[col] = false;
          beans.splice(i, 1);
          sBreak(); addDebris(col); shake = Math.max(shake, 0.15);
        } else if (b.y - b.r > H) {
          beans.splice(i, 1);   // 穴を抜けて落下
        }
      }
    }

    // 天使
    for (let i = angels.length - 1; i >= 0; i--) {
      const a = angels[i];
      a.wing += dt * 14;
      if (!a.up) {
        a.y += a.vy * dt;
        if (a.y >= floorY - tileH * 1.6) {
          tiles[a.col] = true; a.up = true;
          sAngel(); addBurst(a.x, floorY, "#fff7c4");
        }
      } else {
        a.y -= a.vy * 1.3 * dt;
        if (a.y < -40) angels.splice(i, 1);
      }
    }

    // 演出更新
    for (let i = leaves.length - 1; i >= 0; i--) {
      const l = leaves[i];
      l.t += dt; l.y += l.vy * dt; l.x += (l.vx + Math.sin(l.t * 4 + l.ph) * 30) * dt;
      if (l.y > floorY + tileH || l.t > 4) leaves.splice(i, 1);
    }
    for (let i = debris.length - 1; i >= 0; i--) {
      const d = debris[i];
      d.t += dt; d.vy += 500 * dt; d.x += d.vx * dt; d.y += d.vy * dt;
      if (d.y > H + 20) debris.splice(i, 1);
    }
    for (let i = pops.length - 1; i >= 0; i--) {
      const p = pops[i];
      p.t += dt; p.y -= 30 * dt;
      if (p.t > 0.9) pops.splice(i, 1);
    }
    for (let i = fx.length - 1; i >= 0; i--) {
      const f = fx[i];
      f.t += dt; f.x += f.vx * dt; f.y += f.vy * dt; f.vy += 120 * dt;
      if (f.t > f.life) fx.splice(i, 1);
    }
    // 花火フェーズ
    if (PHASES[phaseIdx()].fw) {
      fwT -= dt;
      if (fwT <= 0) {
        addBurst(W * (0.15 + Math.random() * 0.7), H * (0.1 + Math.random() * 0.35),
          ["#ff6b6b", "#ffe66d", "#6bcBff", "#9dff6b"][(Math.random() * 4) | 0]);
        fwT = 0.9 + Math.random() * 0.8;
      }
    }
    if (shotFlash > 0) shotFlash -= dt;
    if (bird.beakT > 0) bird.beakT -= dt;
    if (shake > 0) shake -= dt;
    updateHud();
  }

  /* ---------- 描画 ---------- */
  function lerpC(cur, target, k) {
    for (let i = 0; i < 3; i++) cur[i] += (target[i] - cur[i]) * k;
  }
  function rgb(c) { return "rgb(" + (c[0] | 0) + "," + (c[1] | 0) + "," + (c[2] | 0) + ")"; }

  function drawBean(b) {
    ctx.save();
    ctx.translate(b.x, b.y); ctx.rotate(b.rot);
    let fill = b.color;
    if (b.type === 1) fill = "#fff";
    if (b.type === 2) fill = "hsl(" + ((b.t * 360) % 360 | 0) + ",90%,65%)";
    if (b.type === 2) { ctx.shadowColor = fill; ctx.shadowBlur = 14; }
    ctx.fillStyle = fill;
    ctx.beginPath(); ctx.ellipse(0, 0, b.r * 0.82, b.r, 0, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = "rgba(255,255,255,0.45)";
    ctx.beginPath(); ctx.ellipse(-b.r * 0.25, -b.r * 0.35, b.r * 0.22, b.r * 0.32, -0.4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#2c7a3d";
    ctx.beginPath(); ctx.ellipse(b.r * 0.1, -b.r * 1.05, b.r * 0.3, b.r * 0.16, 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawBird() {
    const x = bird.x, y = floorY, f = bird.face;
    const w = bird.w, h = bird.h;
    const hop = mode === "play" && (input.l || input.r) ? Math.abs(Math.sin(bird.step * 2)) * 3 : 0;
    ctx.save();
    ctx.translate(x, y - hop);
    // 足
    ctx.strokeStyle = "#e8862a"; ctx.lineWidth = 3; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-w * 0.16, -2); ctx.lineTo(-w * 0.16, 0); ctx.moveTo(w * 0.16, -2); ctx.lineTo(w * 0.16, 0); ctx.stroke();
    // 体
    ctx.fillStyle = "#ffd23f";
    ctx.beginPath(); ctx.ellipse(0, -h * 0.5, w * 0.42, h * 0.5, 0, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#c9931a"; ctx.lineWidth = 2; ctx.stroke();
    // おなか
    ctx.fillStyle = "#fff3c9";
    ctx.beginPath(); ctx.ellipse(f * w * 0.06, -h * 0.36, w * 0.24, h * 0.3, 0, 0, Math.PI * 2); ctx.fill();
    // おだんご頭
    ctx.fillStyle = "#f4a93c";
    ctx.beginPath(); ctx.arc(-f * w * 0.04, -h * 1.02, w * 0.15, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#c9931a"; ctx.stroke();
    // 目
    ctx.fillStyle = "#222";
    ctx.beginPath(); ctx.arc(f * w * 0.2, -h * 0.72, w * 0.05, 0, Math.PI * 2); ctx.fill();
    // くちばし(発射時は開く)
    const open = bird.beakT > 0 ? 0.22 : 0.08;
    ctx.fillStyle = "#e8862a";
    ctx.beginPath();
    ctx.moveTo(f * w * 0.34, -h * 0.66);
    ctx.lineTo(f * w * 0.62, -h * (0.62 + open));
    ctx.lineTo(f * w * 0.34, -h * 0.54);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(f * w * 0.34, -h * 0.54);
    ctx.lineTo(f * w * 0.6, -h * (0.52 - open));
    ctx.lineTo(f * w * 0.34, -h * 0.46);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function drawAngel(a) {
    ctx.save();
    ctx.translate(a.x, a.y);
    const flap = Math.sin(a.wing) * 0.5;
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.beginPath(); ctx.ellipse(-9, 0, 8, 4, -0.5 - flap, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(9, 0, 8, 4, 0.5 + flap, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#ffe66d"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(0, -10, 6, 2.4, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }

  function draw(now) {
    const pi = phaseIdx(), ph = PHASES[pi];
    lerpC(curTop, ph.top, 0.04); lerpC(curBot, ph.bot, 0.04);
    lerpC(curTT, ph.tt, 0.04); lerpC(curTB, ph.tb, 0.04);
    if (bgReady) {
      const iw = bgImg.width, ih = bgImg.height;
      const s = Math.max(W / iw, H / ih);
      ctx.drawImage(bgImg, (W - iw * s) / 2, (H - ih * s) / 2, iw * s, ih * s);
      if (ph.mono) {
        ctx.globalCompositeOperation = "saturation";
        ctx.fillStyle = "#888"; ctx.fillRect(0, 0, W, H);
      }
      ctx.globalCompositeOperation = "multiply";
      const tg = ctx.createLinearGradient(0, 0, 0, H);
      tg.addColorStop(0, rgb(curTT)); tg.addColorStop(1, rgb(curTB));
      ctx.fillStyle = tg; ctx.fillRect(0, 0, W, H);
      ctx.globalCompositeOperation = "source-over";
    } else {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, rgb(curTop)); g.addColorStop(1, rgb(curBot));
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    }

    ctx.save();
    if (shake > 0) ctx.translate((Math.random() - 0.5) * shake * 22, (Math.random() - 0.5) * shake * 22);

    // 太陽 / 月 / 星
    if (ph.sun) {
      ctx.fillStyle = pi === 0 ? "rgba(255,240,150,0.9)" : "rgba(255,120,60,0.9)";
      ctx.beginPath(); ctx.arc(W * 0.8, H * 0.16, 26, 0, Math.PI * 2); ctx.fill();
    }
    if (ph.stars) {
      ctx.fillStyle = "rgba(255,255,255,0.8)";
      for (let i = 0; i < 26; i++) {
        const sx = ((i * 137 + 31) % 100) / 100 * W;
        const sy = ((i * 89 + 17) % 60) / 100 * H;
        const tw = (Math.sin(now / 400 + i) + 1) * 0.5;
        ctx.globalAlpha = 0.3 + tw * 0.6;
        ctx.fillRect(sx, sy, 2, 2);
      }
      ctx.globalAlpha = 1;
      ctx.fillStyle = "rgba(255,250,210,0.92)";
      ctx.beginPath(); ctx.arc(W * 0.18, H * 0.14, 18, 0, Math.PI * 2); ctx.fill();
    }

    // 床下の暗がり
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fillRect(0, floorY + tileH, W, H - floorY - tileH);
    // 床タイル
    for (let c = 0; c < COLS; c++) {
      if (!tiles[c]) continue;
      const x = c * tileW;
      ctx.fillStyle = "#5d4030";
      ctx.fillRect(x + 1, floorY + 4, tileW - 2, tileH - 4);
      ctx.fillStyle = "#46b04a";
      ctx.fillRect(x + 1, floorY, tileW - 2, 6);
    }

    // 発射の軌跡
    if (shotFlash > 0 && shotRay) {
      const a = shotFlash / 0.1;
      ctx.strokeStyle = "rgba(255,255,210," + (0.85 * a) + ")";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(shotRay.x, shotRay.y);
      ctx.lineTo(shotRay.x + shotRay.dx * H * 2, shotRay.y + shotRay.dy * H * 2);
      ctx.stroke();
      ctx.fillStyle = "rgba(255,255,255," + a + ")";
      for (let i = 1; i <= 4; i++) {
        ctx.beginPath();
        ctx.arc(shotRay.x + shotRay.dx * i * 36, shotRay.y + shotRay.dy * i * 36, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (const a of angels) drawAngel(a);
    for (const b of beans) drawBean(b);
    if (mode !== "over") drawBird();

    // 葉っぱ
    for (const l of leaves) {
      ctx.save();
      ctx.translate(l.x, l.y); ctx.rotate(Math.sin(l.t * 4 + l.ph) * 0.8);
      ctx.fillStyle = l.color;
      ctx.globalAlpha = Math.max(0, 1 - l.t / 4);
      ctx.beginPath(); ctx.ellipse(0, 0, 6, 3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
    // 破片
    ctx.fillStyle = "#5d4030";
    for (const d of debris) ctx.fillRect(d.x - 3, d.y - 3, 6, 6);
    // パーティクル
    for (const f of fx) {
      if (f.full) {
        ctx.fillStyle = "rgba(255,255,255," + (0.5 * (1 - f.t / f.life)) + ")";
        ctx.fillRect(-30, -30, W + 60, H + 60);
        continue;
      }
      ctx.globalAlpha = Math.max(0, 1 - f.t / f.life);
      ctx.fillStyle = f.color;
      ctx.fillRect(f.x - 2.5, f.y - 2.5, 5, 5);
    }
    ctx.globalAlpha = 1;
    // スコアポップ
    ctx.font = "bold 16px 'Space Mono', monospace";
    ctx.textAlign = "center";
    for (const p of pops) {
      ctx.globalAlpha = Math.max(0, 1 - p.t / 0.9);
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 3;
      ctx.strokeText(p.txt, p.x, p.y);
      ctx.fillText(p.txt, p.x, p.y);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  /* ---------- メインループ(タイトル時点から回る) ---------- */
  let last = 0;
  function frame(now) {
    const dt = Math.min((now - last) / 1000 || 0, 0.05);
    last = now;
    if (mode === "play") update(dt);
    else {
      // タイトル/オーバー中も演出だけ進める
      for (let i = fx.length - 1; i >= 0; i--) {
        const f = fx[i];
        f.t += dt; f.x += f.vx * dt; f.y += f.vy * dt; f.vy += 120 * dt;
        if (f.t > f.life) fx.splice(i, 1);
      }
      if (shake > 0) shake -= dt;
    }
    draw(now);
    requestAnimationFrame(frame);
  }

  /* ---------- 入力 ---------- */
  function bindHold(el, key) {
    const on = e => { e.preventDefault(); input[key] = true; el.classList.add("on"); };
    const off = e => { e.preventDefault(); input[key] = false; el.classList.remove("on"); };
    el.addEventListener("pointerdown", on);
    el.addEventListener("pointerup", off);
    el.addEventListener("pointercancel", off);
    el.addEventListener("pointerleave", off);
    el.addEventListener("contextmenu", e => e.preventDefault());
  }
  bindHold($("btnL"), "l");
  bindHold($("btnR"), "r");
  bindHold($("btnFire"), "fire");

  window.addEventListener("keydown", e => {
    if (e.repeat) return;
    if (e.key === "ArrowLeft" || e.key === "a") input.l = true;
    if (e.key === "ArrowRight" || e.key === "d") input.r = true;
    if (e.key === " " || e.key === "z" || e.key === "ArrowUp") { input.fire = true; e.preventDefault(); }
    if ((e.key === "Enter" || e.key === " ") && mode !== "play") tryStart();
  });
  window.addEventListener("keyup", e => {
    if (e.key === "ArrowLeft" || e.key === "a") input.l = false;
    if (e.key === "ArrowRight" || e.key === "d") input.r = false;
    if (e.key === " " || e.key === "z" || e.key === "ArrowUp") input.fire = false;
  });

  function tryStart() {
    if (mode === "over" && performance.now() - overAt < 900) return; // 誤タップ防止
    reset();
    mode = "play";
    $("overlay").classList.add("hidden");
  }
  $("overlay").addEventListener("pointerup", tryStart);

  $("muteBtn").addEventListener("click", () => {
    muted = !muted;
    $("muteBtn").textContent = muted ? "🔇" : "🔊";
  });

  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", () => setTimeout(resize, 250));

  /* ---------- デバッグフック(自動テスト用) ---------- */
  window.__tanetori = {
    start: tryStart,
    shoot,
    get bgReady() { return bgReady; },
    get mode() { return mode; },
    get score() { return score; },
    set score(v) { score = v; },
    get tiles() { return tiles; },
    get beans() { return beans; },
    get bird() { return bird; },
    addBean(x, y, type) { beans.push({ x, y, r: beanR(), vy: 10, type: type || 0, color: "#e84545", rot: 0, t: 0 }); },
    breakTile(c) { tiles[c] = false; }
  };

  resize();
  bird.x = W / 2;
  updateHud();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
