<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>うんだめし — おみくじチキンレース</title>
<meta name="description" content="凶を引く前に納めろ!おみくじ札をめくって運勢を貯めるチキンレース。お守りで強化するローグライト風ミニゲーム。">
<meta property="og:title" content="うんだめし — おみくじチキンレース">
<meta property="og:description" content="凶を引く前に納めろ!おみくじ札をめくって運勢を貯めるチキンレース。お守りで強化するローグライト風ミニゲーム。">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; touch-action: manipulation; }
  html, body {
    margin: 0; padding: 0;
    background: #060410;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    font-family: "Zen Kaku Gothic New", sans-serif;
    color: #fff;
  }
  body {
    background-image:
      radial-gradient(ellipse 70% 45% at 50% -5%, rgba(124, 77, 255, 0.10), transparent),
      radial-gradient(ellipse 55% 35% at 85% 105%, rgba(232, 74, 63, 0.08), transparent);
  }
  /* PCワイド画面対策: 縦長カラムに制限して中央寄せ */
  #stage {
    position: fixed; top: 0; bottom: 0;
    left: 50%; transform: translateX(-50%);
    width: min(100vw, 520px, 64vh);
    background: linear-gradient(180deg, #171028 0%, #0d0a1a 55%, #120a18 100%);
    box-shadow: 0 0 60px rgba(0,0,0,0.8);
    padding-top: var(--sat);
    padding-bottom: var(--sab);
  }
  #cv {
    width: 100%; height: 100%;
    display: block;
    touch-action: none;
  }
  #mute {
    position: absolute;
    top: calc(var(--sat) + 10px); right: 12px;
    z-index: 30;
    width: 42px; height: 42px;
    border: 2px solid rgba(255,255,255,0.22);
    border-radius: 12px;
    background: rgba(23,16,40,0.75);
    color: #fff; font-size: 19px;
    cursor: pointer;
    touch-action: none;
  }
  .ov {
    position: fixed; inset: 0;
    z-index: 20;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px;
    background: rgba(8,5,18,0.93);
    padding: calc(var(--sat) + 16px) 18px calc(var(--sab) + 16px);
    text-align: center;
  }
  .hidden { display: none !important; }
  .kv {
    width: min(56vw, 220px, 26vh);
    border-radius: 18px;
    border: 2px solid rgba(255,213,79,0.4);
    box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 30px rgba(255,213,79,0.15);
    pointer-events: none;
  }
  .kv-dim { width: min(40vw, 150px, 18vh); filter: grayscale(0.5) brightness(0.7); }
  .title {
    font-family: "Bungee", cursive;
    font-size: clamp(34px, 11vw, 56px);
    line-height: 1.05;
    margin: 0;
    background: linear-gradient(135deg, #ffd54f 0%, #ff7043 50%, #e84a8a 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 14px rgba(255,112,67,0.35));
  }
  .sub {
    font-family: "Space Mono", monospace;
    letter-spacing: 0.3em;
    font-size: 13px; color: #9a8fc4;
    margin: -6px 0 0;
  }
  .desc { font-size: 14px; color: #d8d2ef; line-height: 1.9; margin: 4px 0; max-width: 430px; }
  .desc b { color: #ffd54f; }
  .desc .bad { color: #ff6e6e; font-weight: 700; }
  .stat {
    font-family: "Space Mono", monospace;
    font-size: 13px; color: #9a8fc4;
  }
  .stat b { color: #fff; font-size: 16px; }
  .kbd { font-size: 11.5px; color: #6f6694; margin-top: 2px; }
  .btn {
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-weight: 700; font-size: 18px;
    color: #2a1408;
    background: linear-gradient(135deg, #ffd54f, #ff8a5e);
    border: none; border-radius: 16px;
    padding: 15px 46px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,138,94,0.4);
    touch-action: none;
  }
  .btn:active { transform: scale(0.96); }
  .bigscore {
    font-family: "Bungee", cursive;
    font-size: clamp(40px, 13vw, 62px);
    margin: 0; color: #ffd54f;
    text-shadow: 0 0 24px rgba(255,213,79,0.45);
  }
  .newrec {
    font-weight: 700; color: #ff5e8a; font-size: 15px;
    animation: blink 0.8s infinite alternate;
  }
  @keyframes blink { from { opacity: 1; } to { opacity: 0.35; } }
  #overTitle { font-family: "Bungee", cursive; font-size: 28px; margin: 0; color: #b388ff; }
  /* お守り選択 */
  #charmOv h2 {
    font-family: "Bungee", cursive;
    font-size: 24px; margin: 0; color: #ffd54f;
    text-shadow: 0 0 18px rgba(255,213,79,0.4);
  }
  #charmOv .lead { font-size: 13px; color: #9a8fc4; margin: -6px 0 4px; }
  .charm {
    width: min(86vw, 360px);
    display: flex; align-items: center; gap: 14px;
    text-align: left;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,213,79,0.35);
    border-radius: 16px;
    padding: 13px 16px;
    color: #fff;
    cursor: pointer;
    font-family: "Zen Kaku Gothic New", sans-serif;
    touch-action: none;
  }
  .charm:active { transform: scale(0.97); background: rgba(255,213,79,0.12); }
  .charm .ic { font-size: 34px; line-height: 1; }
  .charm .nm { font-weight: 700; font-size: 16px; color: #ffd54f; }
  .charm .nm small { color: #9a8fc4; font-weight: 400; margin-left: 6px; }
  .charm .ds { font-size: 12.5px; color: #d8d2ef; line-height: 1.5; }
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas><button id="mute" aria-label="ミュート">🔊</button></div>

<div id="titleOv" class="ov">
  <img class="kv" src="assets/keyvisual.jpg" alt="" onerror="this.style.display='none'">
  <h1 class="title">UNDAMESHI</h1>
  <p class="sub">うんだめし</p>
  <p class="desc">
    おみくじ札をめくって運勢を貯めろ。<br>
    <b>「納める」前に</b><span class="bad">凶</span>を引くと<b>全部没収</b>。<br>
    <span class="bad">大凶</span>はハートまで持っていく。<br>
    連続でめくるほど倍率アップ。<br>
    3回の参拝ごとに<b>お守り</b>を授かって強くなれ。
  </p>
  <p class="stat">ベスト運勢 <b id="titleBest">0</b></p>
  <button class="btn" id="startBtn">参拝する</button>
  <p class="kbd">PC: ←→↑↓ 選択 / Space めくる / B 納める</p>
</div>

<div id="charmOv" class="ov hidden">
  <h2>お守りを授かる</h2>
  <p class="lead">1つ選んでください(1/2/3キーでも可)</p>
  <div id="charmList" style="display:flex;flex-direction:column;gap:12px;"></div>
</div>

<div id="overOv" class="ov hidden">
  <img class="kv kv-dim" src="assets/keyvisual.jpg" alt="" onerror="this.style.display='none'">
  <p id="overTitle">運が尽きた…</p>
  <p class="bigscore" id="overScore">0</p>
  <p class="stat"><span id="overRound"></span><br>ベスト運勢 <b id="overBest">0</b></p>
  <p class="newrec hidden" id="newRec">★ 新記録! ★</p>
  <button class="btn" id="retryBtn">もう一度参拝</button>
</div>

<script>
(() => {
  "use strict";
  const cv = document.getElementById("cv");
  const ctx = cv.getContext("2d");
  const $ = id => document.getElementById(id);

  /* ---------- 定数 ---------- */
  const COLS = 4, ROWS = 3, NCARDS = COLS * ROWS;
  const KINDS = {
    daikichi: { label: "大吉", pts: 100, tier: 4 },
    chukichi: { label: "中吉", pts: 50, tier: 3 },
    shokichi: { label: "小吉", pts: 30, tier: 2 },
    suekichi: { label: "末吉", pts: 10, tier: 1 },
    kyo:      { label: "凶", bad: true },
    daikyo:   { label: "大凶", bad: true, dai: true },
  };
  const CHARMS = {
    neko:    { icon: "🐱", name: "招き猫", desc: "吉札の運勢 +25%", stack: true },
    hamaya:  { icon: "🏹", name: "破魔矢", desc: "参拝ごとに1回、凶札・大凶札を無効化する", stack: true },
    kagami:  { icon: "🪞", name: "御神鏡", desc: "参拝開始時に札が1枚透けて見える", stack: true },
    suisho:  { icon: "🔮", name: "水晶玉", desc: "残りの凶札・大凶札の枚数が常に見える", stack: false },
    yaku:    { icon: "🧿", name: "厄除け", desc: "大凶を引いてもハートを失わなくなる", stack: false },
    miki:    { icon: "🍶", name: "御神酒", desc: "いますぐハート+1(最大5)", stack: true, instant: true },
    saisen:  { icon: "💰", name: "賽銭箱", desc: "納めるとき、めくった札1枚につき+15ボーナス", stack: true },
    kitsune: { icon: "🦊", name: "狐の面", desc: "コンボ倍率の伸びが大きくなる(+0.2→さらに+0.12)", stack: true },
  };
  const MAX_HEARTS = 5;
  const FLIP_DUR = 0.3;

  /* ---------- audio (iOS消音スイッチ対策込み / hakai方式) ---------- */
  let AC = null, muted = false;
  try { muted = localStorage.getItem("undameshi_muted") === "1"; } catch (e) {}
  function audio() {
    if (!AC) {
      try {
        AC = new (window.AudioContext || window.webkitAudioContext)();
        AC.onstatechange = () => { if (AC.state !== "running" && !document.hidden) { try { AC.resume(); } catch (e) {} } };
      } catch (e) {}
    }
    if (AC && AC.state !== "running") { try { AC.resume(); } catch (e) {} }
    return AC;
  }
  let silentEl = null;
  function silentWavUrl() {
    const sr = 8000, n = 800, buf = new ArrayBuffer(44 + n), v = new DataView(buf);
    const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    str(0, "RIFF"); v.setUint32(4, 36 + n, true); str(8, "WAVE");
    str(12, "fmt "); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr, true); v.setUint16(32, 1, true); v.setUint16(34, 8, true);
    str(36, "data"); v.setUint32(40, n, true);
    for (let i = 0; i < n; i++) v.setUint8(44 + i, 0x80);
    return URL.createObjectURL(new Blob([buf], { type: "audio/wav" }));
  }
  function unlockAudio() {
    if (!silentEl) {
      silentEl = document.createElement("audio");
      silentEl.setAttribute("playsinline", "");
      silentEl.loop = true;
      silentEl.volume = 0.01;
      silentEl.src = silentWavUrl();
    }
    const p = silentEl.play();
    if (p && p.catch) p.catch(() => {});
    audio();
    if (!AC) return;
    const done = () => {
      if (AC.state === "running") {
        ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.removeEventListener(ev, unlockAudio, true));
      }
    };
    try { AC.resume().then(done); } catch (e) { done(); }
  }
  ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.addEventListener(ev, unlockAudio, true));
  document.addEventListener("visibilitychange", () => { if (!document.hidden) audio(); });

  function tone(f, d, type, vol, slideTo, at) {
    if (muted || !audio()) return;
    try {
      const t0 = AC.currentTime + (at || 0);
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type || "sine"; o.frequency.setValueAtTime(f, t0);
      if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + d);
      g.gain.setValueAtTime(vol || 0.06, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + d);
      o.connect(g); g.connect(AC.destination);
      o.start(t0); o.stop(t0 + d);
    } catch (e) {}
  }
  function noise(d, vol, at) {
    if (muted || !audio()) return;
    try {
      const n = Math.floor(AC.sampleRate * d);
      const buf = AC.createBuffer(1, n, AC.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / n);
      const src = AC.createBufferSource(); src.buffer = buf;
      const g = AC.createGain(); g.gain.value = vol || 0.08;
      src.connect(g); g.connect(AC.destination); src.start(AC.currentTime + (at || 0));
    } catch (e) {}
  }
  const sBtn = () => tone(440, 0.07, "square", 0.035);
  const sFlip = () => { noise(0.05, 0.04); tone(520, 0.05, "triangle", 0.03); };
  function sGood(tier) {
    const scale = [0, 523, 659, 784, 1047];
    for (let i = 0; i < tier + 1; i++) tone(scale[Math.min(i + 1, 4)] * (1 + i * 0.001), 0.12, "triangle", 0.045, null, i * 0.06);
    if (tier >= 4) { noise(0.25, 0.03, 0.1); tone(2093, 0.4, "sine", 0.03, null, 0.25); }
  }
  const sKyo = () => { tone(150, 0.4, "sawtooth", 0.07, 55); noise(0.15, 0.06); };
  const sDaikyo = () => { tone(100, 0.7, "sawtooth", 0.09, 38); tone(66, 0.8, "square", 0.05, 30, 0.05); noise(0.3, 0.08); };
  const sNegate = () => { tone(880, 0.12, "triangle", 0.05); tone(1320, 0.2, "triangle", 0.04, null, 0.08); };
  function sBank(n) {
    for (let i = 0; i < Math.min(n, 7); i++) tone(900 + i * 130, 0.09, "square", 0.03, null, i * 0.055);
    tone(1568, 0.3, "sine", 0.04, null, Math.min(n, 7) * 0.055);
  }
  const sCharm = () => { tone(660, 0.35, "sine", 0.05, 1320); tone(990, 0.4, "sine", 0.035, 1980, 0.08); };

  /* ---------- 状態(ループが触るものは全てここで初期化) ---------- */
  let phase = "title";       // title | play | flip | bust | bank | charm | over
  let round = 1;
  let score = 0;
  let best = 0;
  try { best = parseInt(localStorage.getItem("undameshi_best") || "0", 10) || 0; } catch (e) {}
  let hearts = 3;
  let unbanked = 0;
  let chain = 0;
  let cards = [];            // {kind, flipped, fp, resolved, seen, negated, dim}
  let charms = {};           // key -> count
  let hamayaLeft = 0;
  let comp = { kyo: 0, daikyo: 0 };       // この参拝の構成
  let liveBad = { kyo: 0, daikyo: 0 };    // 残り(水晶玉用)
  let floats = [];           // {x,y,text,col,t,size}
  let banners = [];          // {text,col,t,life,size}
  let pend = [];             // {t,fn} ゲーム内タイマー
  let shake = 0;
  let now = 0;
  let kbIdx = -1;
  let lastT = 0;
  let lay = null;            // layoutキャッシュ(毎フレーム再計算)

  /* ---------- ラウンド構築 ---------- */
  function roundScale(r) { return 1 + 0.15 * (r - 1); }
  function comboStep() { return 0.2 + 0.12 * (charms.kitsune || 0); }
  function curMult() { return 1 + comboStep() * chain; }

  function buildDeck(r) {
    const kyo = Math.min(2 + ((r - 1) >> 1), 5);
    const daikyo = r >= 7 ? 2 : (r >= 3 ? 1 : 0);
    const goods = NCARDS - kyo - daikyo;
    const tmpl = ["daikichi", "chukichi", "chukichi", "shokichi", "shokichi", "shokichi"];
    while (tmpl.length < NCARDS) tmpl.push("suekichi");
    const deck = tmpl.slice(0, goods);
    for (let i = 0; i < kyo; i++) deck.push("kyo");
    for (let i = 0; i < daikyo; i++) deck.push("daikyo");
    for (let i = deck.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    return { deck, kyo, daikyo };
  }

  function startRound() {
    const b = buildDeck(round);
    cards = b.deck.map(kind => ({ kind, flipped: false, fp: 0, resolved: false, seen: false, negated: false, dim: false }));
    comp = { kyo: b.kyo, daikyo: b.daikyo };
    liveBad = { kyo: b.kyo, daikyo: b.daikyo };
    unbanked = 0;
    chain = 0;
    hamayaLeft = charms.hamaya || 0;
    const nSee = Math.min(charms.kagami || 0, NCARDS);
    const idxs = cards.map((_, i) => i);
    for (let i = 0; i < nSee; i++) {
      const j = i + Math.floor(Math.random() * (idxs.length - i));
      [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
      cards[idxs[i]].seen = true;
    }
    phase = "play";
    banner(`${round}回目の参拝`, "#b388ff", 1.1, 26);
    banner(`凶${b.kyo}枚${b.daikyo ? `・大凶${b.daikyo}枚` : ""}が潜む…`, "#ff6e6e", 1.1, 17);
  }

  function startGame() {
    round = 1; score = 0; hearts = 3; charms = {};
    floats = []; banners = []; pend = []; shake = 0; kbIdx = -1;
    $("titleOv").classList.add("hidden");
    $("overOv").classList.add("hidden");
    startRound();
  }

  /* ---------- 進行 ---------- */
  function schedule(d, fn) { pend.push({ t: now + d, fn }); }
  function banner(text, col, life, size) { banners.push({ text, col, t: 0, life: life || 1.2, size: size || 22 }); }
  function float(x, y, text, col, size) { floats.push({ x, y, text, col, t: 0, size: size || 18 }); }

  function flipCard(i) {
    if (phase !== "play") return;
    const c = cards[i];
    if (!c || c.flipped) return;
    c.flipped = true;
    phase = "flip";
    sFlip();
  }

  function resolveCard(c, i) {
    const r = cardRectL(i);
    const k = KINDS[c.kind];
    if (k.bad) {
      liveBad[c.kind === "daikyo" ? "daikyo" : "kyo"]--;
      if (hamayaLeft > 0) {
        hamayaLeft--;
        c.negated = true;
        sNegate();
        float(r.x + r.w / 2, r.y, "破魔矢が守った!", "#7ce8ff", 16);
        phase = "play";
        checkAllFlipped();
        return;
      }
      bust(c.kind === "daikyo", r);
      return;
    }
    const pts = Math.round(k.pts * roundScale(round) * curMult() * (1 + 0.25 * (charms.neko || 0)));
    c.gained = pts;
    unbanked += pts;
    chain++;
    sGood(k.tier);
    float(r.x + r.w / 2, r.y, `+${pts}`, k.tier >= 4 ? "#ffd54f" : "#a5ffb0", k.tier >= 4 ? 26 : 18);
    if (k.tier >= 4) banner("大吉!", "#ffd54f", 0.9, 34);
    phase = "play";
    checkAllFlipped();
  }

  function checkAllFlipped() {
    if (cards.every(c => c.flipped)) {
      const bonus = Math.round(150 * roundScale(round));
      unbanked += bonus;
      banner(`全めくり! +${bonus}`, "#ffd54f", 1.2, 24);
      schedule(0.7, () => bank(true));
    }
  }

  function bust(isDaikyo, r) {
    phase = "bust";
    shake = isDaikyo ? 14 : 9;
    if (isDaikyo) sDaikyo(); else sKyo();
    const lost = unbanked;
    unbanked = 0;
    chain = 0;
    cards.forEach(c => { if (!c.flipped) { c.flipped = true; c.dim = true; } });
    banner(isDaikyo ? "大凶ッ!!" : "凶…", isDaikyo ? "#ff3b3b" : "#ff6e6e", 1.5, isDaikyo ? 40 : 32);
    if (lost > 0) float(r.x + r.w / 2, r.y, `-${lost} 没収`, "#ff6e6e", 20);
    let lostHeart = false;
    if (isDaikyo && !charms.yaku) { hearts--; lostHeart = true; }
    else if (isDaikyo && charms.yaku) banner("厄除けが効いた", "#7ce8ff", 1.3, 16);
    if (lostHeart) banner("ハートを失った…", "#ff6e6e", 1.4, 16);
    if (hearts <= 0) {
      schedule(1.7, gameOver);
    } else {
      schedule(1.7, endRound);
    }
  }

  function bank(auto) {
    if (phase !== "play" || (!auto && unbanked <= 0)) return;
    const flippedN = cards.filter(c => c.flipped && !c.dim).length;
    const bonus = (charms.saisen || 0) * 15 * flippedN;
    const total = unbanked + bonus;
    score += total;
    sBank(flippedN);
    banner(`納めた! +${total}`, "#ffd54f", 1.3, 26);
    if (bonus > 0) banner(`賽銭ボーナス +${bonus}`, "#a5ffb0", 1.3, 15);
    unbanked = 0;
    chain = 0;
    phase = "bank";
    cards.forEach(c => { if (!c.flipped) { c.flipped = true; c.dim = true; } });
    schedule(1.4, endRound);
  }

  function endRound() {
    const done = round;
    round++;
    if (done % 3 === 0) openCharms();
    else startRound();
  }

  /* ---------- お守り ---------- */
  let offer = [];
  function openCharms() {
    phase = "charm";
    const pool = Object.keys(CHARMS).filter(k => {
      const c = CHARMS[k];
      if (!c.stack && charms[k]) return false;
      if (k === "miki" && hearts >= MAX_HEARTS) return false;
      return true;
    });
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    offer = pool.slice(0, 3);
    const list = $("charmList");
    list.innerHTML = "";
    offer.forEach((k, idx) => {
      const c = CHARMS[k];
      const owned = charms[k] ? `所持×${charms[k]}` : "";
      const el = document.createElement("button");
      el.className = "charm";
      el.innerHTML = `<span class="ic">${c.icon}</span><span><span class="nm">${c.name}<small>${owned}</small></span><br><span class="ds">${c.desc}</span></span>`;
      el.addEventListener("pointerup", e => { e.preventDefault(); pickCharm(idx); });
      list.appendChild(el);
    });
    $("charmOv").classList.remove("hidden");
  }
  function pickCharm(idx) {
    if (phase !== "charm") return;
    const k = offer[idx];
    if (!k) return;
    sCharm();
    if (CHARMS[k].instant) hearts = Math.min(MAX_HEARTS, hearts + 1);
    else charms[k] = (charms[k] || 0) + 1;
    $("charmOv").classList.add("hidden");
    banner(`${CHARMS[k].icon} ${CHARMS[k].name} を授かった`, "#ffd54f", 1.4, 18);
    startRound();
  }

  /* ---------- ゲームオーバー ---------- */
  function gameOver() {
    phase = "over";
    const isRec = score > best;
    if (isRec) {
      best = score;
      try { localStorage.setItem("undameshi_best", String(best)); } catch (e) {}
    }
    $("overScore").textContent = score;
    $("overRound").textContent = `${round}回目の参拝で力尽きた`;
    $("overBest").textContent = best;
    $("newRec").classList.toggle("hidden", !isRec);
    $("overOv").classList.remove("hidden");
  }

  /* ---------- レイアウト ---------- */
  function layout() {
    const w = cv.clientWidth, h = cv.clientHeight;
    const M = 14, gap = 10;
    const hudH = 96;
    const botH = 142;
    const cardW = (w - M * 2 - gap * (COLS - 1)) / COLS;
    const availH = h - hudH - botH - gap * (ROWS - 1) - 12;
    const cardH = Math.min(cardW * 1.5, availH / ROWS);
    const gridH = cardH * ROWS + gap * (ROWS - 1);
    const gridTop = hudH + Math.max(0, (availH - cardH * ROWS) / 2);
    const bw = Math.min(w - M * 2, 320);
    return {
      w, h, M, gap, hudH, cardW, cardH, gridTop,
      bank: { x: (w - bw) / 2, y: h - botH + 64, w: bw, h: 58 },
    };
  }
  function cardRectL(i) {
    if (!lay) lay = layout();
    const c = i % COLS, r = Math.floor(i / COLS);
    return {
      x: lay.M + c * (lay.cardW + lay.gap),
      y: lay.gridTop + r * (lay.cardH + lay.gap),
      w: lay.cardW, h: lay.cardH,
    };
  }

  /* ---------- 描画 ---------- */
  function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  function vtext(s, x, y, size, col, weight) {
    ctx.fillStyle = col;
    ctx.font = `${weight || 700} ${size}px "Zen Kaku Gothic New", sans-serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    const lh = size * 1.02;
    const y0 = y - (s.length - 1) * lh / 2;
    for (let i = 0; i < s.length; i++) ctx.fillText(s[i], x, y0 + i * lh);
  }

  function drawCardBack(r, seen, c) {
    rr(r.x, r.y, r.w, r.h, 10);
    const g = ctx.createLinearGradient(r.x, r.y, r.x, r.y + r.h);
    g.addColorStop(0, "#332457"); g.addColorStop(1, "#241a40");
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = "rgba(255,213,79,0.55)"; ctx.lineWidth = 1.5; ctx.stroke();
    rr(r.x + 4, r.y + 4, r.w - 8, r.h - 8, 7);
    ctx.strokeStyle = "rgba(255,213,79,0.25)"; ctx.lineWidth = 1; ctx.stroke();
    const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
    ctx.fillStyle = "rgba(255,213,79,0.7)";
    ctx.font = `700 ${Math.min(r.w * 0.42, 30)}px "Zen Kaku Gothic New", sans-serif`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("運", cx, cy);
    ctx.fillStyle = "rgba(255,213,79,0.35)";
    ctx.beginPath(); ctx.arc(cx, cy, Math.min(r.w, r.h) * 0.36, 0, Math.PI * 2); ctx.stroke();
    if (seen) {
      ctx.globalAlpha = 0.65;
      ctx.fillStyle = "rgba(124,232,255,0.18)";
      rr(r.x, r.y, r.w, r.h, 10); ctx.fill();
      const k = KINDS[c.kind];
      vtext(k.label, cx, cy, Math.min(r.w * 0.3, 19), k.bad ? "#ff9d9d" : "#bdfdd0", 500);
      ctx.globalAlpha = 1;
    }
  }

  function drawCardFace(r, c) {
    const k = KINDS[c.kind];
    const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
    rr(r.x, r.y, r.w, r.h, 10);
    if (k.bad && !c.negated) {
      const g = ctx.createLinearGradient(r.x, r.y, r.x, r.y + r.h);
      if (k.dai) { g.addColorStop(0, "#3d0a14"); g.addColorStop(1, "#1c050c"); }
      else { g.addColorStop(0, "#3a2030"); g.addColorStop(1, "#241018"); }
      ctx.fillStyle = g; ctx.fill();
      ctx.strokeStyle = k.dai ? "#ff3b3b" : "#c25068"; ctx.lineWidth = 2; ctx.stroke();
      vtext(k.label, cx, cy, Math.min(r.w * (k.dai ? 0.34 : 0.4), k.dai ? 24 : 28), k.dai ? "#ff4d4d" : "#ff8a9d");
    } else {
      const g = ctx.createLinearGradient(r.x, r.y, r.x, r.y + r.h);
      g.addColorStop(0, "#f9f1dc"); g.addColorStop(1, "#eadfc2");
      ctx.fillStyle = g; ctx.fill();
      ctx.strokeStyle = "#c0392b"; ctx.lineWidth = 2; ctx.stroke();
      rr(r.x + 4, r.y + 4, r.w - 8, r.h - 8, 7);
      ctx.strokeStyle = "rgba(192,57,43,0.4)"; ctx.lineWidth = 1; ctx.stroke();
      if (c.negated) {
        vtext(k.label, cx, cy - 6, Math.min(r.w * 0.32, 22), "#9b8f7d");
        ctx.strokeStyle = "rgba(60,160,220,0.9)"; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(r.x + 10, r.y + 12); ctx.lineTo(r.x + r.w - 10, r.y + r.h - 12);
        ctx.moveTo(r.x + r.w - 10, r.y + 12); ctx.lineTo(r.x + 10, r.y + r.h - 12);
        ctx.stroke();
        ctx.fillStyle = "#3ca0dc";
        ctx.font = `700 10px "Zen Kaku Gothic New", sans-serif`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("無効", cx, r.y + r.h - 12);
      } else {
        const big = k.tier >= 4;
        if (big) {
          ctx.save();
          ctx.shadowColor = "rgba(255,180,40,0.8)"; ctx.shadowBlur = 14;
          vtext(k.label, cx, cy - 6, Math.min(r.w * 0.36, 26), "#c8201a");
          ctx.restore();
        } else {
          vtext(k.label, cx, cy - 6, Math.min(r.w * 0.32, 22), k.tier >= 3 ? "#b3401f" : "#4a3a2a");
        }
        ctx.fillStyle = big ? "#b8860b" : "#8a7a5e";
        ctx.font = `700 ${Math.min(r.w * 0.18, 12)}px "Space Mono", monospace`;
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(c.gained ? `+${c.gained}` : `+${k.pts}`, cx, r.y + r.h - 13);
      }
    }
  }

  function drawCard(i) {
    const c = cards[i];
    const r = cardRectL(i);
    const cx = r.x + r.w / 2;
    let sx = 1, showFace = c.flipped && c.fp >= 0.5;
    if (c.flipped && c.fp < 1) sx = Math.abs(1 - 2 * c.fp);
    ctx.save();
    if (c.dim) ctx.globalAlpha = 0.45;
    ctx.translate(cx, 0); ctx.scale(Math.max(sx, 0.02), 1); ctx.translate(-cx, 0);
    if (showFace) drawCardFace(r, c);
    else drawCardBack(r, c.seen && !c.flipped, c);
    ctx.restore();
    if (i === kbIdx && phase === "play" && !c.flipped) {
      rr(r.x - 3, r.y - 3, r.w + 6, r.h + 6, 12);
      ctx.strokeStyle = "#7ce8ff"; ctx.lineWidth = 2.5; ctx.stroke();
    }
  }

  function drawHUD() {
    const { w, M } = lay;
    ctx.textBaseline = "middle";
    // 総運勢
    ctx.textAlign = "left";
    ctx.fillStyle = "#9a8fc4";
    ctx.font = `500 11px "Zen Kaku Gothic New", sans-serif`;
    ctx.fillText("総運勢", M, 16);
    ctx.fillStyle = "#ffd54f";
    ctx.font = `700 26px "Space Mono", monospace`;
    ctx.fillText(String(score), M, 40);
    ctx.fillStyle = "#6f6694";
    ctx.font = `400 11px "Space Mono", monospace`;
    ctx.fillText(`BEST ${best}`, M, 62);
    // 参拝・ハート(右上ミュートボタンを避けて左へ)
    ctx.textAlign = "right";
    ctx.fillStyle = "#b388ff";
    ctx.font = `700 14px "Zen Kaku Gothic New", sans-serif`;
    ctx.fillText(`参拝 ${round}回目`, w - 62, 16);
    let hs = "";
    for (let i = 0; i < Math.max(hearts, 0); i++) hs += "♥";
    ctx.fillStyle = "#ff5e7a";
    ctx.font = `700 19px sans-serif`;
    ctx.fillText(hs || "", w - 62, 40);
    ctx.fillStyle = "rgba(255,94,122,0.25)";
    let ds = "";
    for (let i = Math.max(hearts, 0); i < MAX_HEARTS; i++) ds += "♥";
    if (ds) {
      const hw = ctx.measureText(hs).width;
      ctx.save(); ctx.textAlign = "left";
      ctx.fillText(ds, w - 62 - hw - ctx.measureText(ds).width, 40);
      ctx.restore();
    }
    // 凶情報
    ctx.textAlign = "center";
    ctx.font = `500 12.5px "Zen Kaku Gothic New", sans-serif`;
    if (charms.suisho) {
      ctx.fillStyle = "#7ce8ff";
      ctx.fillText(`🔮 残り: 凶${liveBad.kyo}枚${comp.daikyo ? `・大凶${liveBad.daikyo}枚` : ""}`, w / 2, 80);
    } else {
      ctx.fillStyle = "#c98a9a";
      ctx.fillText(`この箱: 凶${comp.kyo}枚${comp.daikyo ? `・大凶${comp.daikyo}枚` : ""}入り`, w / 2, 80);
    }
  }

  function drawBottom() {
    const { w, h, bank } = lay;
    // お供え中
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillStyle = "#9a8fc4";
    ctx.font = `500 12px "Zen Kaku Gothic New", sans-serif`;
    ctx.fillText("お供え中", w / 2, h - 128);
    ctx.fillStyle = unbanked > 0 ? "#a5ffb0" : "#574f78";
    ctx.font = `700 24px "Space Mono", monospace`;
    const multStr = chain > 0 ? `  ×${curMult().toFixed(1)}` : "";
    ctx.fillText(`+${unbanked}${multStr}`, w / 2, h - 104);
    // お守り一覧
    const owned = Object.keys(charms).filter(k => charms[k] > 0);
    if (owned.length) {
      ctx.font = `400 15px sans-serif`;
      ctx.fillStyle = "#fff";
      const str = owned.map(k => CHARMS[k].icon + (charms[k] > 1 ? `×${charms[k]}` : "")).join(" ");
      ctx.fillText(str, w / 2, h - 12);
    }
    // 納めるボタン
    const enabled = phase === "play" && unbanked > 0;
    rr(bank.x, bank.y, bank.w, bank.h, 16);
    if (enabled) {
      const g = ctx.createLinearGradient(bank.x, bank.y, bank.x, bank.y + bank.h);
      g.addColorStop(0, "#ffd54f"); g.addColorStop(1, "#ff8a5e");
      ctx.fillStyle = g;
      ctx.shadowColor = "rgba(255,138,94,0.45)"; ctx.shadowBlur = 16;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#2a1408";
      ctx.font = `700 19px "Zen Kaku Gothic New", sans-serif`;
      ctx.fillText(`納める +${unbanked}`, bank.x + bank.w / 2, bank.y + bank.h / 2);
    } else {
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      ctx.fill();
      ctx.strokeStyle = "rgba(255,255,255,0.15)"; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = "#574f78";
      ctx.font = `700 16px "Zen Kaku Gothic New", sans-serif`;
      ctx.fillText(phase === "play" ? "札をめくろう" : "納める", bank.x + bank.w / 2, bank.y + bank.h / 2);
    }
  }

  function drawFx(dt) {
    for (const f of floats) {
      f.t += dt;
      const a = Math.max(0, 1 - f.t / 1.1);
      if (a <= 0) continue;
      ctx.globalAlpha = a;
      ctx.fillStyle = f.col;
      ctx.font = `700 ${f.size}px "Space Mono", monospace`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(f.text, f.x, f.y - f.t * 46);
      ctx.globalAlpha = 1;
    }
    floats = floats.filter(f => f.t < 1.1);
    let by = lay.h * 0.34;
    for (const b of banners) {
      b.t += dt;
      if (b.t > b.life) continue;
      const a = Math.min(1, b.t * 6) * Math.min(1, (b.life - b.t) * 3);
      ctx.globalAlpha = Math.max(0, a);
      ctx.font = `700 ${b.size}px "Zen Kaku Gothic New", sans-serif`;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      const tw = ctx.measureText(b.text).width;
      rr(lay.w / 2 - tw / 2 - 16, by - b.size * 0.85, tw + 32, b.size * 1.7, 12);
      ctx.fillStyle = "rgba(8,5,18,0.82)"; ctx.fill();
      ctx.fillStyle = b.col;
      ctx.fillText(b.text, lay.w / 2, by);
      ctx.globalAlpha = 1;
      by += b.size * 1.9;
    }
    banners = banners.filter(b => b.t < b.life);
  }

  /* ---------- メインループ(タイトル時点から回す) ---------- */
  function frame(t) {
    requestAnimationFrame(frame);
    const dt = Math.min((t - lastT) / 1000, 0.05) || 0;
    lastT = t;
    now += dt;
    // dpr変換は毎フレーム再設定(コンテキスト喪失対策)
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    const cw = cv.clientWidth, ch = cv.clientHeight;
    if (cv.width !== Math.round(cw * dpr) || cv.height !== Math.round(ch * dpr)) {
      cv.width = Math.round(cw * dpr); cv.height = Math.round(ch * dpr);
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    lay = layout();
    // タイマー
    const due = pend.filter(p => p.t <= now);
    pend = pend.filter(p => p.t > now);
    due.forEach(p => p.fn());
    // フリップ進行
    let i = 0;
    for (const c of cards) {
      if (c.flipped && c.fp < 1) {
        c.fp = Math.min(1, c.fp + dt / FLIP_DUR);
        if (c.fp >= 1 && !c.resolved && !c.dim) {
          c.resolved = true;
          resolveCard(c, i);
        }
      }
      i++;
    }
    // 背景
    ctx.clearRect(0, 0, cw, ch);
    ctx.save();
    if (shake > 0) {
      shake = Math.max(0, shake - dt * 34);
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }
    if (phase !== "title" && phase !== "over") {
      drawHUD();
      for (let j = 0; j < cards.length; j++) drawCard(j);
      drawBottom();
      drawFx(dt);
    }
    ctx.restore();
  }
  requestAnimationFrame(frame);

  /* ---------- 入力(Pointer Events、clickは使わない) ---------- */
  cv.addEventListener("pointerdown", e => {
    e.preventDefault();
    if (phase !== "play" || !lay) return;
    const rect = cv.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const b = lay.bank;
    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { bank(); return; }
    for (let i = 0; i < cards.length; i++) {
      const r = cardRectL(i);
      if (x >= r.x - 4 && x <= r.x + r.w + 4 && y >= r.y - 4 && y <= r.y + r.h + 4) {
        flipCard(i);
        return;
      }
    }
  });

  window.addEventListener("keydown", e => {
    if (e.repeat) return;
    if (phase === "title" && (e.code === "Enter" || e.code === "Space")) { e.preventDefault(); sBtn(); startGame(); return; }
    if (phase === "over" && (e.code === "Enter" || e.code === "Space")) { e.preventDefault(); sBtn(); startGame(); return; }
    if (phase === "charm") {
      const n = { Digit1: 0, Digit2: 1, Digit3: 2, Numpad1: 0, Numpad2: 1, Numpad3: 2 }[e.code];
      if (n !== undefined) { e.preventDefault(); pickCharm(n); }
      return;
    }
    if (phase !== "play") return;
    const move = { ArrowLeft: -1, ArrowRight: 1, ArrowUp: -COLS, ArrowDown: COLS, KeyA: -1, KeyD: 1, KeyW: -COLS, KeyS: COLS }[e.code];
    if (move !== undefined) {
      e.preventDefault();
      if (kbIdx < 0) kbIdx = 0;
      else {
        const next = kbIdx + move;
        if (next >= 0 && next < NCARDS) {
          if ((move === 1 && next % COLS === 0) || (move === -1 && kbIdx % COLS === 0)) {} else kbIdx = next;
        }
      }
      return;
    }
    if (e.code === "Enter" || e.code === "Space") {
      e.preventDefault();
      if (kbIdx >= 0) flipCard(kbIdx);
      return;
    }
    if (e.code === "KeyB" || e.code === "KeyX") { e.preventDefault(); bank(); }
  });

  /* ---------- ボタン・オーバーレイ(pointerup) ---------- */
  $("startBtn").addEventListener("pointerup", e => { e.preventDefault(); sBtn(); startGame(); });
  $("retryBtn").addEventListener("pointerup", e => { e.preventDefault(); sBtn(); startGame(); });
  $("mute").addEventListener("pointerup", e => {
    e.preventDefault();
    muted = !muted;
    $("mute").textContent = muted ? "🔇" : "🔊";
    try { localStorage.setItem("undameshi_muted", muted ? "1" : "0"); } catch (er) {}
  });
  $("mute").textContent = muted ? "🔇" : "🔊";
  $("titleBest").textContent = best;

  /* ---------- ダブルタップズーム無効化(3点セット) ---------- */
  document.addEventListener("dblclick", e => e.preventDefault(), { passive: false });
  document.addEventListener("gesturestart", e => e.preventDefault(), { passive: false });
  let lastTouchEnd = 0;
  document.addEventListener("touchend", e => {
    const t = Date.now();
    if (t - lastTouchEnd < 350) e.preventDefault();
    lastTouchEnd = t;
  }, { passive: false });

  /* ---------- テストフック ---------- */
  window.__UND__ = {
    state: () => ({
      phase, round, score, unbanked, hearts, chain, best,
      comp: { ...comp }, liveBad: { ...liveBad },
      charms: { ...charms }, hamayaLeft,
      cards: cards.map(c => ({ kind: c.kind, flipped: c.flipped, negated: c.negated, dim: c.dim })),
    }),
    cardRect: i => {
      const r = cardRectL(i), b = cv.getBoundingClientRect();
      return { x: b.left + r.x, y: b.top + r.y, w: r.w, h: r.h };
    },
    bankRect: () => {
      if (!lay) lay = layout();
      const b = cv.getBoundingClientRect();
      return { x: b.left + lay.bank.x, y: b.top + lay.bank.y, w: lay.bank.w, h: lay.bank.h };
    },
    flip: i => flipCard(i),
    bank: () => bank(),
    start: () => startGame(),
    pick: i => pickCharm(i),
  };
})();
</script>
</body>
</html>
