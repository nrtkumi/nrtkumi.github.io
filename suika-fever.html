<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>スイカフィーバー — 脳汁スイカゲーム</title>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@400;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background: #0b0618;
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255, 60, 160, 0.18), transparent),
    radial-gradient(ellipse 60% 40% at 10% 100%, rgba(60, 120, 255, 0.12), transparent),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(255, 200, 40, 0.10), transparent);
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100%;
  padding: 12px 8px 32px;
  overflow-x: hidden;
}
.cabinet {
  width: 100%;
  max-width: 520px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
h1 {
  font-family: 'DotGothic16', monospace;
  text-align: center;
  font-size: clamp(26px, 7vw, 40px);
  letter-spacing: 0.08em;
  background: linear-gradient(90deg, #ff5a8a, #ffd700, #5ad0ff, #9fff6a, #ff5a8a);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: neonflow 4s linear infinite;
  filter: drop-shadow(0 0 12px rgba(255, 90, 160, 0.55));
  padding-top: 4px;
}
@keyframes neonflow { to { background-position: 300% 0; } }
.hud {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
.panel {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 12px;
  padding: 8px 12px;
  text-align: center;
  backdrop-filter: blur(4px);
}
.panel .label {
  font-size: 11px;
  color: rgba(255, 255, 255, 0.55);
  letter-spacing: 0.15em;
}
.panel .value {
  font-family: 'DotGothic16', monospace;
  font-size: clamp(18px, 5vw, 26px);
  color: #ffd700;
  text-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
}
#comboVal { color: #5ad0ff; text-shadow: 0 0 10px rgba(90, 208, 255, 0.6); }
#bestVal { color: #ff8ab0; text-shadow: 0 0 10px rgba(255, 138, 176, 0.6); }
.value.pop { animation: scorepop 0.3s ease-out; }
@keyframes scorepop { 30% { transform: scale(1.3); } 100% { transform: scale(1); } }
.frame {
  position: relative;
  border-radius: 18px;
  padding: 8px;
  background: linear-gradient(135deg, #2a1340, #11071f 40%, #2a1340 80%);
  border: 2px solid rgba(255, 110, 180, 0.45);
  box-shadow:
    0 0 24px rgba(255, 80, 160, 0.35),
    0 0 60px rgba(120, 60, 255, 0.18),
    inset 0 0 24px rgba(0, 0, 0, 0.6);
}
.frame.feverframe {
  animation: feverborder 0.5s linear infinite;
}
@keyframes feverborder {
  0%   { border-color: #ff5a8a; box-shadow: 0 0 30px #ff5a8a88, inset 0 0 24px #00000099; }
  25%  { border-color: #ffd700; box-shadow: 0 0 36px #ffd70088, inset 0 0 24px #00000099; }
  50%  { border-color: #5ad0ff; box-shadow: 0 0 30px #5ad0ff88, inset 0 0 24px #00000099; }
  75%  { border-color: #9fff6a; box-shadow: 0 0 36px #9fff6a88, inset 0 0 24px #00000099; }
  100% { border-color: #ff5a8a; box-shadow: 0 0 30px #ff5a8a88, inset 0 0 24px #00000099; }
}
canvas {
  width: 100%;
  display: block;
  border-radius: 12px;
  touch-action: none;
  cursor: pointer;
}
.controls {
  display: flex;
  gap: 8px;
  justify-content: center;
}
button {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-weight: 800;
  font-size: 14px;
  color: #fff;
  background: rgba(255, 255, 255, 0.08);
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 999px;
  padding: 10px 22px;
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
}
button:hover { background: rgba(255, 255, 255, 0.16); }
button:active { transform: scale(0.95); }
button:focus-visible { outline: 2px solid #ffd700; outline-offset: 2px; }
.howto {
  text-align: center;
  font-size: 12px;
  color: rgba(255, 255, 255, 0.45);
  line-height: 1.8;
}
.aura-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  justify-content: center;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.6);
}
.aura-legend span::before {
  content: '●';
  margin-right: 3px;
}
.al-b::before { color: #4ac3ff; } .al-g::before { color: #52e06a; }
.al-r::before { color: #ff4a4a; } .al-y::before { color: #ffd700; }
.al-p::before {
  background: linear-gradient(90deg, #ff5a8a, #ffd700, #5ad0ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
@media (prefers-reduced-motion: reduce) {
  h1, .frame.feverframe { animation: none; }
}
</style>
</head>
<body>
<div class="cabinet">
  <h1>スイカ★フィーバー</h1>
  <div class="hud">
    <div class="panel"><div class="label">SCORE</div><div class="value" id="scoreVal">0</div></div>
    <div class="panel"><div class="label">BEST</div><div class="value" id="bestVal">0</div></div>
    <div class="panel"><div class="label">MAX COMBO</div><div class="value" id="comboVal">0</div></div>
  </div>
  <div class="frame" id="frame">
    <canvas id="game" aria-label="スイカゲームの盤面"></canvas>
  </div>
  <div class="controls">
    <button id="restartBtn">リスタート</button>
    <button id="autoBtn">オート落下 ON</button>
    <button id="muteBtn">サウンド ON</button>
  </div>
  <p class="howto">ドラッグ(またはマウス移動)で照準。0.3秒ごとに自動で落下、指を離す/クリックで即落下。<br>同じ果物を合体させてスイカを目指せ! ゲージMAXでFEVER TIME(全得点2倍)!</p>
  <div class="aura-legend">
    保留オーラ予告:
    <span class="al-b">青 ×1.2</span>
    <span class="al-g">緑 ×1.5</span>
    <span class="al-r">赤 ×2</span>
    <span class="al-y">金 ×3</span>
    <span class="al-p">虹 ×5 プレミア</span>
  </div>
</div>
<script>
(function () {
  'use strict';
  const W = 480, H = 700, TOP = 150, WALL = 12, FLOOR = 12;
  const RM = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cv = document.getElementById('game');
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = W * dpr; cv.height = H * dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  const buf = document.createElement('canvas');
  buf.width = cv.width; buf.height = cv.height;
  const bctx = buf.getContext('2d');

  const R = [13, 18, 24, 31, 38, 46, 55, 64, 74, 85, 96];
  const PTS = [1, 3, 6, 10, 15, 21, 28, 36, 45, 55, 66];
  const COL = ['#e8485e', '#f06a40', '#9b6ce8', '#ffb02e', '#ff8c2e', '#f23a3a', '#d4e052', '#ffb0c4', '#ffd24a', '#aef068', '#3fb45a'];
  const NAME = ['さくらんぼ', 'いちご', 'ぶどう', 'デコポン', 'かき', 'りんご', 'なし', 'もも', 'パイン', 'メロン', 'スイカ'];
  const AURA_COL = [null, '#4ac3ff', '#52e06a', '#ff4a4a', '#ffd700', 'rainbow'];
  const AURA_MULT = [1, 1.2, 1.5, 2, 3, 5];
  const AURA_NAME = ['', '青保留', '緑保留', '赤保留!', '金保留!!', '虹保留!!!'];
  const GAUGE_MAX = 260;

  let fruits = [], particles = [], lightnings = [], popups = [], confetti = [], coins = [], trails = [], rockets = [], kanjis = [];
  let score = 0, dispScore = 0, best = 0, combo = 0, maxCombo = 0, lastMerge = 0;
  let shake = 0, punch = 0, flash = 0, flashCol = '#fff', invertT = 0, vignettePulse = 0;
  let fever = false, feverEnd = 0, gauge = 0, hue = 0, frame = 0;
  let slowmo = 0, stormEnd = 0, laserT = 0, autoDrop = true, lastDropAt = 0;
  let rush = false, rushEnd = 0, freezeF = 0, spinT = 0, chroma = 0, danmaku = [];
  let reachPair = null, reachT = 0, flock = [], flockArmed = false;
  let cutIn = null, slot = null;
  let cur, nxt, dropX = W / 2, canDrop = true;
  let state = 'title';
  let muted = false, AC = null, idc = 0;
  let danger = 0;

  const $ = id => document.getElementById(id);

  function rollAura() {
    const r = Math.random();
    if (r < 0.012) return 5;
    if (r < 0.05) return 4;
    if (r < 0.13) return 3;
    if (r < 0.26) return 2;
    if (r < 0.48) return 1;
    return 0;
  }
  function newHand() { return { t: Math.floor(Math.random() * 5 * Math.random() * 1.4) % 5, aura: rollAura() }; }

  function audio() {
    if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (AC && AC.state !== 'running') { try { AC.resume(); } catch (e) {} }
    return AC;
  }
  function unlockAudio() {
    audio();
    if (!AC) return;
    try {
      const b = AC.createBuffer(1, 1, 22050);
      const s = AC.createBufferSource();
      s.buffer = b; s.connect(AC.destination); s.start(0);
    } catch (e) {}
    if (AC.state === 'running') {
      ['pointerdown', 'pointerup', 'touchstart', 'touchend', 'click'].forEach(ev => document.removeEventListener(ev, unlockAudio, true));
    }
  }
  ['pointerdown', 'pointerup', 'touchstart', 'touchend', 'click'].forEach(ev => document.addEventListener(ev, unlockAudio, true));
  document.addEventListener('visibilitychange', () => { if (!document.hidden) audio(); });
  function tone(f, d, type, vol, slideTo) {
    if (muted || !audio()) return;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type || 'sine'; o.frequency.value = f;
    if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, AC.currentTime + d);
    g.gain.value = vol || 0.07;
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + d);
  }
  function noise(d, vol) {
    if (muted || !audio()) return;
    const n = Math.floor(AC.sampleRate * d);
    const buf = AC.createBuffer(1, n, AC.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = AC.createBufferSource(); src.buffer = buf;
    const g = AC.createGain(); g.gain.value = vol || 0.1;
    src.connect(g); g.connect(AC.destination); src.start();
  }
  function arp(notes, step, type, vol) {
    notes.forEach((f, i) => setTimeout(() => tone(f, 0.32, type || 'square', vol || 0.06), i * step));
  }
  function fanfare() { arp([523, 659, 784, 1047, 1319, 1568], 85); }
  function premiumSnd() { tone(200, 0.7, 'sawtooth', 0.07, 1800); noise(0.35, 0.12); setTimeout(fanfare, 250); }
  function riser(d) {
    if (muted || !audio()) return;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sawtooth'; o.frequency.value = 120;
    o.frequency.exponentialRampToValueAtTime(1800, AC.currentTime + d);
    g.gain.value = 0.012;
    g.gain.exponentialRampToValueAtTime(0.09, AC.currentTime + d * 0.85);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime + d);
  }

  function spawn(x, y, t, vx, vy, aura) {
    fruits.push({ x, y, vx: vx || 0, vy: vy || 0, r: R[t], t, id: idc++, age: 0, sq: 1, aura: aura || 0 });
  }

  function burst(x, y, t, level) {
    const n = 16 + t * 8 + level * 12;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * 6.283, s = 2 + Math.random() * (4.5 + t + level * 2);
      particles.push({
        x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 2.5,
        life: 1, dk: 0.015 + Math.random() * 0.02,
        c: level >= 2 ? ['#ffd700', '#fff', '#ffea80', COL[t]][i % 4] : [COL[t], COL[Math.min(t + 1, 10)], '#ffd700', '#fff'][i % 4],
        sz: 3 + Math.random() * 4, star: (t >= 6 || level >= 2) && i % 4 === 0
      });
    }
    particles.push({ x, y, ring: 1, life: 1, dk: 0.035, c: level >= 2 ? '#ffd700' : COL[t], lw: 5 + level * 2 });
    if (t >= 8 || level >= 2) particles.push({ x, y, ring: 1, life: 1, dk: 0.022, c: '#ffffff', lw: 3 });
  }

  function bolt(x, y) {
    const pts = [];
    let bx = x + (Math.random() - 0.5) * 120, by = -10;
    pts.push([bx, by]);
    while (by < y - 14) {
      by += 24 + Math.random() * 26;
      bx += (x - bx) * 0.3 + (Math.random() - 0.5) * 56;
      pts.push([bx, Math.min(by, y)]);
    }
    pts.push([x, y]);
    lightnings.push({ pts, life: 1 });
    noise(0.22, 0.14); tone(90, 0.3, 'square', 0.1);
  }

  function popup(x, y, txt, big, col) {
    popups.push({ x: Math.max(60, Math.min(W - 60, x)), y, txt, life: 1, big, col: col || '#ffd700' });
  }
  function showCut(txt, col, sub, premium) {
    cutIn = { txt, col, sub, t: 0, premium: !!premium };
    tone(300, 0.4, 'sawtooth', 0.06, 900); noise(0.18, 0.08);
  }
  function jackpotRain() {
    for (let i = 0; i < 180; i++) confetti.push({
      x: Math.random() * W, y: -20 - Math.random() * 380,
      vx: (Math.random() - 0.5) * 2.2, vy: 1.6 + Math.random() * 2.8,
      c: ['#ffd700', '#ff5a8a', '#5ad0ff', '#9fff6a', '#c79bff', '#fff'][i % 6],
      w: 4 + Math.random() * 6, a: Math.random() * 6.28, va: (Math.random() - 0.5) * 0.3
    });
    for (let i = 0; i < 70; i++) coins.push({
      x: Math.random() * W, y: -20 - Math.random() * 300,
      vy: 2.2 + Math.random() * 3, r: 7 + Math.random() * 5, ph: Math.random() * 6.28
    });
  }
  function startSlot(prize) {
    const win = prize === 'jackpot' ? true : Math.random() < 0.4;
    slot = { t: 0, stops: [55, 95, prize === 'jackpot' ? 190 : 200], reels: [0, 0, 0], done: false, prize: prize, win: win };
    state = 'slot';
  }
  const JUICE = ['脳汁!!', 'ドーパミン!!', 'キモチイイ~', '最高!!', '止まらない!!', 'ヤバイ!!', 'うおおおお!!', '激アツ!!'];
  function spawnDanmaku(n, gold) {
    for (let i = 0; i < n && danmaku.length < 12; i++) {
      const fromLeft = Math.random() < 0.5;
      danmaku.push({
        x: fromLeft ? -120 : W + 120,
        y: 180 + Math.random() * (H - 320),
        vx: (fromLeft ? 1 : -1) * (4 + Math.random() * 4),
        txt: JUICE[Math.floor(Math.random() * JUICE.length)],
        c: gold ? '#ffd700' : 'hsl(' + Math.floor(Math.random() * 360) + ',90%,65%)',
        sz: 20 + Math.floor(Math.random() * 14), ph: Math.random() * 6.28
      });
    }
    noise(0.08, 0.05);
  }
  function launchFireworks(n) {
    for (let i = 0; i < n; i++) setTimeout(() => {
      rockets.push({
        x: 60 + Math.random() * (W - 120), y: H - 20,
        vy: -7 - Math.random() * 3, ty: 100 + Math.random() * 220,
        c: ['#ff5a8a', '#ffd700', '#5ad0ff', '#9fff6a', '#c79bff'][Math.floor(Math.random() * 5)]
      });
      tone(900 + Math.random() * 400, 0.25, 'sine', 0.04, 1800);
    }, i * 240);
  }
  function spawnKanji() {
    for (let i = 0; i < 8; i++) kanjis.push({
      x: Math.random() * W, y: -60 - Math.random() * 300,
      vy: 1 + Math.random() * 1.4, rot: Math.random() * 6.28,
      vr: (Math.random() - 0.5) * 0.08, s: 34 + Math.random() * 40
    });
  }
  function pulse(el) { el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }

  function merge(a, b) {
    const t = a.t + 1;
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const aura = Math.max(a.aura, b.aura);
    fruits = fruits.filter(f => f !== a && f !== b);
    const now = performance.now();
    combo = (now - lastMerge < 2300) ? combo + 1 : 1;
    lastMerge = now;
    maxCombo = Math.max(maxCombo, combo);
    const mult = (rush ? 4 : fever ? 2 : 1) * AURA_MULT[aura];
    const pts = Math.round(PTS[t] * combo * mult) * 100;
    score += pts;
    gauge = Math.min(GAUGE_MAX, gauge + PTS[t] + combo * 2);
    if (t <= 10) spawn(mx, my, Math.min(t, 10), 0, -2.2);
    burst(mx, my, Math.min(t, 10), aura);
    let label = '+' + pts.toLocaleString();
    if (combo > 1) label += '  ' + combo + 'コンボ!';
    popup(mx, my - R[Math.min(t, 10)], label, t >= 6 || combo >= 3 || aura >= 3, aura >= 4 ? '#ffd700' : (combo >= 5 ? '#5ad0ff' : '#ffd700'));
    if (aura > 0) popup(mx, my - R[Math.min(t, 10)] - 30, AURA_NAME[aura] + ' ×' + AURA_MULT[aura], aura >= 3, aura === 5 ? '#ff5a8a' : AURA_COL[aura] === 'rainbow' ? '#ff5a8a' : AURA_COL[aura]);
    const k = RM ? 0.35 : 1;
    shake = Math.min(shake + (2.5 + t * 1.4 + aura * 3) * k, 30 * k);
    punch = Math.min(punch + (t >= 6 ? 0.05 : 0.02) + aura * 0.015, 0.12) * (RM ? 0.4 : 1);
    flash = (t >= 6 ? 0.4 : 0.15) * k;
    flashCol = aura >= 4 ? '#ffd700' : t >= 8 ? '#ffd700' : '#ffffff';
    if (aura >= 3 || t >= 9) vignettePulse = 1;
    if (combo >= 5) {
      const bf = 300 + t * 85 + combo * 38;
      tone(bf, 0.12, 'triangle', 0.09);
      setTimeout(() => tone(bf * 1.25, 0.12, 'triangle', 0.08), 45);
      setTimeout(() => tone(bf * 1.5, 0.16, 'triangle', 0.08), 90);
    } else tone(300 + t * 85 + combo * 38, 0.18, 'triangle', 0.1);
    if (t >= 6) freezeF = Math.max(freezeF, RM ? 0 : 4);
    if (t >= 9) freezeF = Math.max(freezeF, RM ? 0 : 8);
    if (combo >= 4) spawnDanmaku(2);
    if (t >= 8) {
      slowmo = RM ? 0 : 20;
      chroma = RM ? 0 : 6;
      spawnDanmaku(3, true);
      for (const f of fruits) {
        const dx2 = f.x - mx, dy2 = f.y - my, d2 = Math.hypot(dx2, dy2);
        if (d2 > 1 && d2 < 240) {
          const pw = (1 - d2 / 240) * 10;
          f.vx += (dx2 / d2) * pw; f.vy += (dy2 / d2) * pw - 2;
        }
      }
    }
    if (combo === 3) { showCut('連鎖発生!', '#5ad0ff'); }
    if (combo === 6) { showCut('怒涛の6連鎖!!', '#9fff6a'); }
    if (combo === 7) { stormEnd = now + 3000; showCut('雷神モード!!', '#9fd0ff', '落雷の嵐'); }
    if (combo === 9) { showCut('神連鎖!!!', '#ff5a8a', '見たことない'); launchFireworks(3); }
    if (aura === 5) { showCut('プレミアム!!!', '#ff5a8a', '虹保留 ×5', true); premiumSnd(); invertT = RM ? 0 : 0.25; laserT = RM ? 0 : 55; slowmo = RM ? 0 : 20; freezeF = RM ? 0 : 10; chroma = RM ? 0 : 8; spawnDanmaku(5, true); }
    else if (aura === 4) { showCut('金保留!!', '#ffd700', '×3ボーナス'); }
    if (t === 6) showCut('激アツ!!', '#ff7a3a');
    if (t === 7) bolt(mx, my);
    if (t === 8) { showCut('確変!?', '#c79bff'); bolt(mx, my); bolt(mx, my); }
    if (t === 9) {
      bolt(mx, my); bolt(mx, my); bolt(mx, my);
      if (state === 'play' && Math.random() < 0.5) startSlot('chance');
      else showCut('超激アツ!!!', '#ff5a8a', 'リーチ目');
    }
    if (t === 10) {
      if (state === 'play') startSlot('jackpot');
      else { jackpotRain(); showCut('大当たり!!!', '#ffd700', NAME[10] + '誕生!', true); fanfare(); }
      shake = 30 * k; flash = 0.6 * k; invertT = RM ? 0 : 0.3;
    }
    if (gauge >= GAUGE_MAX && !fever) {
      fever = true; feverEnd = now + 10000; gauge = 0;
      showCut('FEVER TIME!!', '#ffd700', '全得点2倍 満タンでGOD RUSH');
      fanfare(); setTimeout(() => arp([392, 494, 587, 784], 70, 'triangle'), 400);
      launchFireworks(3);
      document.getElementById('frame').classList.add('feverframe');
    }
    if (gauge >= GAUGE_MAX && fever && !rush) {
      rush = true; rushEnd = now + 8000;
      feverEnd = Math.max(feverEnd, rushEnd);
      showCut('GOD RUSH!!', '#ffd700', '全得点4倍!!', true);
      tone(100, 0.5, 'sine', 0.1, 900);
      setTimeout(() => tone(220, 0.9, 'sawtooth', 0.13, 35), 450);
      launchFireworks(8); spawnKanji();
      laserT = RM ? 0 : 80; chroma = RM ? 0 : 8; invertT = RM ? 0 : 0.3;
      spawnDanmaku(6, true);
    }
    if (fever) feverEnd = Math.max(feverEnd, now + 4000);
    pulse($('scoreVal'));
    syncHud();
  }

  function syncHud() {
    $('comboVal').textContent = maxCombo;
    $('bestVal').textContent = best.toLocaleString();
  }

  function physics() {
    const ts = slowmo > 0 ? 0.22 : 1;
    if (slowmo > 0) slowmo--;
    for (const f of fruits) {
      f.vy += 0.33 * ts; f.vx *= 0.995;
      f.x += f.vx * ts; f.y += f.vy * ts; f.age++;
      f.sq += (1 - f.sq) * 0.2;
      if (!f.upg && f.aura < 5 && f.age < 70 && f.vy > 1 && Math.random() < 0.0025) {
        f.upg = true;
        f.aura = Math.min(5, f.aura + (Math.random() < 0.1 ? 2 : 1));
        popup(f.x, f.y - f.r - 12, '保留昇格!! ' + AURA_NAME[f.aura], f.aura >= 4, f.aura === 5 ? '#ff5a8a' : AURA_COL[f.aura]);
        burst(f.x, f.y, f.t, f.aura >= 4 ? 2 : 1);
        tone(600, 0.25, 'triangle', 0.07, 1300);
        if (f.aura === 5) { tone(1200, 0.5, 'sine', 0.06, 2600); invertT = RM ? 0 : 0.15; }
      }
      if ((fever || f.aura >= 3) && (Math.abs(f.vx) + Math.abs(f.vy) > 2) && frame % 2 === 0) {
        trails.push({ x: f.x, y: f.y, r: f.r * 0.8, c: f.aura >= 3 ? (AURA_COL[f.aura] === 'rainbow' ? 'hsl(' + (frame * 9 % 360) + ',95%,60%)' : AURA_COL[f.aura]) : 'hsl(' + (frame * 7 % 360) + ',90%,60%)', life: 0.5 });
      }
      if (f.x - f.r < WALL) { f.x = WALL + f.r; f.vx *= -0.3; }
      if (f.x + f.r > W - WALL) { f.x = W - WALL - f.r; f.vx *= -0.3; }
      if (f.y + f.r > H - FLOOR) {
        f.y = H - FLOOR - f.r;
        if (f.vy > 3.5) { f.sq = 0.82; noise(0.05, 0.025); }
        f.vy *= -0.2; f.vx *= 0.92;
        if (Math.abs(f.vy) < 0.5) f.vy = 0;
      }
    }
    const merges = [];
    for (let it = 0; it < 4; it++) {
      for (let i = 0; i < fruits.length; i++) for (let j = i + 1; j < fruits.length; j++) {
        const a = fruits[i], b = fruits[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d = Math.hypot(dx, dy), md = a.r + b.r;
        if (d < md && d > 0.001) {
          if (a.t === b.t && a.t < 10 && it === 0 && !a.mg && !b.mg) { a.mg = b.mg = true; merges.push([a, b]); continue; }
          const nx = dx / d, ny = dy / d, ov = md - d;
          const ma = a.r * a.r, mb = b.r * b.r, tm = ma + mb;
          a.x -= nx * ov * (mb / tm); a.y -= ny * ov * (mb / tm);
          b.x += nx * ov * (ma / tm); b.y += ny * ov * (ma / tm);
          const rv = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
          if (rv < 0) {
            const imp = -rv * 1.12;
            a.vx -= imp * nx * (mb / tm); a.vy -= imp * ny * (mb / tm);
            b.vx += imp * nx * (ma / tm); b.vy += imp * ny * (ma / tm);
          }
        }
      }
    }
    for (const m of merges) if (fruits.includes(m[0]) && fruits.includes(m[1])) merge(m[0], m[1]);
    for (const f of fruits) f.mg = false;
  }

  function checkOver() {
    let maxOver = 0;
    for (const f of fruits) {
      if (f.age > 30 && f.y - f.r < TOP) f.ovr = (f.ovr || 0) + 1;
      else f.ovr = 0;
      if (f.ovr > maxOver) maxOver = f.ovr;
    }
    danger = maxOver;
    if (danger === 30) tone(880, 0.15, 'square', 0.05);
    if (danger > 100 && state === 'play') {
      state = 'over';
      best = Math.max(best, score);
      syncHud();
      tone(220, 0.5, 'sawtooth', 0.08, 90); noise(0.4, 0.1);
      document.getElementById('frame').classList.remove('feverframe');
    }
  }

  function drawFruit(f, gx, gy) {
    const x = gx !== undefined ? gx : f.x, y = gy !== undefined ? gy : f.y, r = f.r;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(1 / Math.sqrt(f.sq || 1), f.sq || 1);
    if (f.aura > 0) {
      const ac = AURA_COL[f.aura] === 'rainbow' ? 'hsl(' + (frame * 8 % 360) + ',95%,60%)' : AURA_COL[f.aura];
      ctx.shadowColor = ac; ctx.shadowBlur = 18 + 6 * Math.sin(frame / 6);
      ctx.strokeStyle = ac; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(0, 0, r + 5 + 2 * Math.sin(frame / 5), 0, 6.283); ctx.stroke();
      ctx.shadowBlur = 0;
    }
    ctx.fillStyle = COL[f.t];
    ctx.beginPath(); ctx.arc(0, 0, r, 0, 6.283); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 2; ctx.stroke();
    if (f.t === 10) {
      ctx.strokeStyle = '#1d6b30'; ctx.lineWidth = r * 0.16;
      for (let k = -2; k <= 2; k++) { ctx.beginPath(); ctx.arc(k * r * 0.45, 0, r * 0.92, 1.2, 1.94); ctx.stroke(); }
    }
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(-r * 0.35, -r * 0.4, r * 0.22, 0, 6.283); ctx.fill();
    const e = Math.max(2, r * 0.09);
    ctx.fillStyle = '#3a2620';
    ctx.beginPath(); ctx.arc(-r * 0.28, -r * 0.05, e, 0, 6.283); ctx.arc(r * 0.28, -r * 0.05, e, 0, 6.283); ctx.fill();
    ctx.strokeStyle = '#3a2620'; ctx.lineWidth = Math.max(1.5, r * 0.05);
    ctx.beginPath(); ctx.arc(0, r * 0.12, r * 0.22, 0.4, 2.74); ctx.stroke();
    if (r > 20) { ctx.fillStyle = '#2e7d3a'; ctx.beginPath(); ctx.ellipse(r * 0.12, -r * 0.92, r * 0.2, r * 0.1, 0.6, 0, 6.283); ctx.fill(); }
    ctx.restore();
  }

  function drawScene() {
    frame++;
    hue = (hue + (fever ? 4 : 1)) % 360;
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shake > 0) { ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake); shake *= 0.87; if (shake < 0.4) shake = 0; }
    if (punch > 0) { ctx.translate(W / 2, H / 2); ctx.scale(1 + punch, 1 + punch); ctx.translate(-W / 2, -H / 2); punch *= 0.85; if (punch < 0.002) punch = 0; }
    if (spinT > 0) {
      spinT--;
      const pr = 1 - spinT / 30;
      const ang = (1 - Math.pow(1 - pr, 3)) * 6.283;
      ctx.translate(W / 2, H / 2); ctx.rotate(ang); ctx.translate(-W / 2, -H / 2);
    }

    const bg = ctx.createLinearGradient(0, 0, 0, H);
    if (fever) {
      bg.addColorStop(0, 'hsl(' + hue + ',60%,14%)');
      bg.addColorStop(1, 'hsl(' + ((hue + 80) % 360) + ',60%,8%)');
    } else {
      bg.addColorStop(0, '#1b1030'); bg.addColorStop(1, '#0d071c');
    }
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.roundRect(0, 0, W, H, 12); ctx.fill();

    if (rush && !RM) {
      ctx.save();
      ctx.globalAlpha = 0.13;
      ctx.translate(W / 2, H / 2);
      for (let k = 0; k < 12; k++) {
        const a = frame * 0.012 + k * 0.5236;
        ctx.fillStyle = 'hsl(' + ((frame * 6 + k * 30) % 360) + ',95%,60%)';
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, 900, a, a + 0.26);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    if (!RM && frame % 5 === 0) particles.push({ x: Math.random() * W, y: H, vx: 0, vy: -0.5 - Math.random(), life: 1, dk: 0.008, c: fever ? 'hsl(' + Math.random() * 360 + ',90%,65%)' : 'rgba(255,255,255,0.5)', sz: 1 + Math.random() * 2 });

    if (fever && !RM) {
      ctx.globalAlpha = 0.16;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      for (let k = 0; k < 10; k++) {
        const sx = (k * 97 + 30) % W;
        const sy = ((frame * (6 + k % 4) + k * 173) % (H + 140)) - 140;
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy + 60 + (k % 3) * 30); ctx.stroke();
      }
      ctx.globalAlpha = 1;
    }

    for (let i = rockets.length - 1; i >= 0; i--) {
      const r = rockets[i];
      r.y += r.vy; r.vy += 0.02;
      particles.push({ x: r.x + (Math.random() - 0.5) * 3, y: r.y, vx: 0, vy: 1, life: 0.5, dk: 0.04, c: r.c, sz: 2 });
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(r.x, r.y, 3, 0, 6.283); ctx.fill();
      if (r.y < r.ty) {
        rockets.splice(i, 1);
        for (let k = 0; k < 50; k++) {
          const a = Math.random() * 6.283, s = 1.5 + Math.random() * 5;
          particles.push({ x: r.x, y: r.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, dk: 0.012 + Math.random() * 0.015, c: k % 3 ? r.c : '#fff', sz: 2.5 + Math.random() * 3, star: k % 7 === 0 });
        }
        particles.push({ x: r.x, y: r.y, ring: 1, life: 1, dk: 0.04, c: r.c, lw: 4 });
        noise(0.18, 0.08); tone(140, 0.3, 'square', 0.06);
        shake = Math.min(shake + (RM ? 1 : 5), 26);
      }
    }

    for (let i = trails.length - 1; i >= 0; i--) {
      const t = trails[i]; t.life -= 0.04;
      if (t.life <= 0) { trails.splice(i, 1); continue; }
      ctx.globalAlpha = t.life * 0.5;
      ctx.fillStyle = t.c;
      ctx.beginPath(); ctx.arc(t.x, t.y, Math.max(t.r * t.life * 2, 0.1), 0, 6.283); ctx.fill();
      ctx.globalAlpha = 1;
    }

    ctx.strokeStyle = danger > 0 ? 'rgba(255,70,70,' + (0.5 + 0.5 * Math.sin(frame / 3)) + ')' : 'rgba(255,255,255,0.22)';
    ctx.setLineDash([8, 8]); ctx.lineWidth = danger > 0 ? 3 : 1.5;
    ctx.beginPath(); ctx.moveTo(WALL, TOP); ctx.lineTo(W - WALL, TOP); ctx.stroke();
    ctx.setLineDash([]);

    ctx.strokeStyle = fever ? 'hsl(' + hue + ',90%,60%)' : '#c8a85a';
    ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(8, 70); ctx.lineTo(8, H - 8); ctx.lineTo(W - 8, H - 8); ctx.lineTo(W - 8, 70); ctx.stroke();

    if (rush && !RM) {
      for (let fx = 14; fx < W - 14; fx += 22) {
        const fh = 16 + Math.sin(frame * 0.3 + fx) * 7 + Math.random() * 8;
        ctx.fillStyle = 'hsla(' + (18 + Math.random() * 32) + ',95%,55%,0.75)';
        ctx.beginPath();
        ctx.moveTo(fx, H - 10);
        ctx.lineTo(fx + 11, H - 10 - fh);
        ctx.lineTo(fx + 22, H - 10);
        ctx.closePath(); ctx.fill();
      }
    }

    const gw = 150, gx = 14, gy = 16;
    ctx.fillStyle = 'rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.roundRect(gx, gy, gw, 14, 7); ctx.fill();
    const gr = ctx.createLinearGradient(gx, 0, gx + gw, 0);
    gr.addColorStop(0, '#ff5a8a'); gr.addColorStop(0.5, '#ffd700'); gr.addColorStop(1, '#5ad0ff');
    ctx.fillStyle = fever ? 'hsl(' + hue + ',95%,60%)' : gr;
    ctx.beginPath(); ctx.roundRect(gx, gy, gw * (rush ? 1 : Math.min(1, gauge / GAUGE_MAX)), 14, 7); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.font = '800 11px "M PLUS Rounded 1c"'; ctx.textAlign = 'left';
    if (rush) {
      ctx.fillText('GOD RUSH ×4  残り' + Math.max(0, Math.ceil((rushEnd - performance.now()) / 1000)) + '秒', gx + 4, gy + 26);
    } else if (fever) {
      ctx.fillText('FEVER ×2  満タンでGOD RUSH!', gx + 4, gy + 26);
    } else {
      ctx.fillText('FEVERゲージ', gx + 4, gy + 26);
    }

    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = '800 12px "M PLUS Rounded 1c"'; ctx.textAlign = 'right';
    ctx.fillText('つぎ', W - 64, 24);
    drawFruit({ x: 0, y: 0, r: Math.min(R[nxt.t], 15), t: nxt.t, sq: 1, aura: nxt.aura }, W - 38, 26);

    if (state === 'play' && canDrop) {
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.setLineDash([4, 7]);
      ctx.beginPath(); ctx.moveTo(dropX, 78 + R[cur.t]); ctx.lineTo(dropX, H - 14); ctx.stroke();
      ctx.setLineDash([]);
      drawFruit({ x: 0, y: 0, r: R[cur.t], t: cur.t, sq: 1, aura: cur.aura }, dropX, 78);
    }

    for (let i = flock.length - 1; i >= 0; i--) {
      const fc = flock[i];
      fc.x += fc.vx; fc.wob += 0.3;
      const fy = fc.y + Math.sin(fc.wob) * 14;
      ctx.fillStyle = '#e8485e';
      ctx.beginPath(); ctx.arc(fc.x, fy, 7, 0, 6.283); ctx.fill();
      ctx.fillStyle = '#2e7d3a';
      ctx.beginPath(); ctx.ellipse(fc.x + 2, fy - 8, 4, 2, 0.6, 0, 6.283); ctx.fill();
      if (fc.x > W + 40) flock.splice(i, 1);
    }

    for (const f of fruits) drawFruit(f);

    if (reachPair && fruits.includes(reachPair[0]) && fruits.includes(reachPair[1])) {
      const pa = reachPair[0], pb = reachPair[1];
      const pl = 0.5 + 0.5 * Math.sin(frame / 4);
      ctx.save();
      ctx.strokeStyle = 'rgba(255,90,138,' + (0.5 + 0.4 * pl).toFixed(3) + ')';
      ctx.lineWidth = 3 + pl * 3;
      ctx.shadowColor = '#ff5a8a'; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(pa.x, pa.y, pa.r + 8 + pl * 5, 0, 6.283); ctx.stroke();
      ctx.beginPath(); ctx.arc(pb.x, pb.y, pb.r + 8 + pl * 5, 0, 6.283); ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.setLineDash([6, 8]);
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(pa.x, pa.y); ctx.lineTo(pb.x, pb.y); ctx.stroke();
      ctx.restore();
    }

    for (let i = lightnings.length - 1; i >= 0; i--) {
      const L = lightnings[i]; L.life -= 0.07;
      ctx.globalAlpha = Math.max(L.life, 0);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
      ctx.shadowColor = '#9fd0ff'; ctx.shadowBlur = 16;
      ctx.beginPath();
      L.pts.forEach((p, k) => k === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]));
      ctx.stroke();
      ctx.lineWidth = 1.5; ctx.strokeStyle = '#cfe8ff'; ctx.stroke();
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
      if (L.life <= 0) lightnings.splice(i, 1);
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i]; p.life -= p.dk;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      if (p.ring) {
        const rr = (1 - p.life) * 140;
        ctx.strokeStyle = p.c; ctx.globalAlpha = Math.max(p.life, 0);
        ctx.lineWidth = (p.lw || 4) * p.life;
        ctx.beginPath(); ctx.arc(p.x, p.y, rr, 0, 6.283); ctx.stroke();
        ctx.globalAlpha = 1;
      } else {
        p.x += p.vx; p.y += p.vy; p.vy += 0.1;
        ctx.globalAlpha = Math.max(p.life, 0);
        ctx.fillStyle = p.c;
        if (p.star) {
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.life * 6);
          ctx.beginPath();
          for (let k = 0; k < 5; k++) {
            const a = k * 1.2566;
            ctx.lineTo(Math.cos(a) * p.sz * 2, Math.sin(a) * p.sz * 2);
            ctx.lineTo(Math.cos(a + 0.628) * p.sz * 0.8, Math.sin(a + 0.628) * p.sz * 0.8);
          }
          ctx.fill(); ctx.restore();
        } else {
          ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(p.sz * p.life, 0.1), 0, 6.283); ctx.fill();
        }
        ctx.globalAlpha = 1;
      }
    }

    for (let i = confetti.length - 1; i >= 0; i--) {
      const c = confetti[i];
      c.x += c.vx; c.y += c.vy; c.a += c.va;
      ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.a);
      ctx.fillStyle = c.c; ctx.fillRect(-c.w / 2, -c.w / 4, c.w, c.w / 2);
      ctx.restore();
      if (c.y > H + 20) confetti.splice(i, 1);
    }
    for (let i = coins.length - 1; i >= 0; i--) {
      const c = coins[i];
      c.y += c.vy; c.ph += 0.2;
      const sq = Math.abs(Math.cos(c.ph));
      ctx.save(); ctx.translate(c.x, c.y); ctx.scale(sq, 1);
      ctx.fillStyle = '#ffd700';
      ctx.beginPath(); ctx.arc(0, 0, c.r, 0, 6.283); ctx.fill();
      ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = '#b8860b'; ctx.font = '800 ' + c.r + 'px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('¥', 0, 1);
      ctx.restore();
      if (c.y > H + 20) coins.splice(i, 1);
    }

    for (let i = kanjis.length - 1; i >= 0; i--) {
      const k = kanjis[i];
      k.y += k.vy; k.rot += k.vr;
      ctx.save(); ctx.translate(k.x, k.y); ctx.rotate(k.rot);
      ctx.font = '800 ' + Math.round(k.s) + 'px "M PLUS Rounded 1c"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 6; ctx.strokeText('祝', 0, 0);
      ctx.fillStyle = '#ffd700'; ctx.fillText('祝', 0, 0);
      ctx.restore();
      if (k.y > H + 60) kanjis.splice(i, 1);
    }

    for (let i = danmaku.length - 1; i >= 0; i--) {
      const d = danmaku[i];
      d.x += d.vx; d.ph += 0.15;
      ctx.save();
      ctx.translate(d.x, d.y + Math.sin(d.ph) * 10);
      ctx.rotate(Math.sin(d.ph) * 0.08);
      ctx.font = '800 ' + d.sz + 'px "M PLUS Rounded 1c"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = 'rgba(0,0,0,0.75)'; ctx.lineWidth = 6;
      ctx.strokeText(d.txt, 0, 0);
      ctx.fillStyle = d.c; ctx.fillText(d.txt, 0, 0);
      ctx.restore();
      if (d.x < -160 || d.x > W + 160) danmaku.splice(i, 1);
    }

    const since = performance.now() - lastMerge;
    if (combo >= 2 && since < 2300 && (state === 'play' || state === 'slot')) {
      const bounce = 1 + Math.max(0, 1 - since / 200) * 0.5;
      const csz = Math.min(30 + combo * 6, 88) * bounce;
      let cc;
      if (combo >= 10) cc = 'hsl(' + (frame * 12 % 360) + ',95%,60%)';
      else if (combo >= 8) cc = '#ff5a8a';
      else if (combo >= 6) cc = '#ffd700';
      else if (combo >= 4) cc = '#5ad0ff';
      else cc = '#fff';
      ctx.save();
      ctx.translate(W / 2, 112);
      ctx.rotate(Math.sin(frame / 5) * 0.04 * Math.min(combo, 10) * (RM ? 0.2 : 1));
      ctx.font = '800 ' + Math.round(csz) + 'px "M PLUS Rounded 1c"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.globalAlpha = since > 1800 ? Math.max(0, (2300 - since) / 500) : 1;
      ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 8;
      ctx.strokeText(combo + ' COMBO', 0, 0);
      ctx.fillStyle = cc; ctx.fillText(combo + ' COMBO', 0, 0);
      ctx.restore();
    }

    if (laserT > 0) {
      laserT--;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = Math.min(laserT / 10, 1) * 0.5;
      for (let k = 0; k < 5; k++) {
        const a = frame * 0.06 + k * 1.2566;
        const ex = W / 2 + Math.cos(a) * 700, ey = H / 2 + Math.sin(a) * 700;
        const lg = ctx.createLinearGradient(W / 2, H / 2, ex, ey);
        lg.addColorStop(0, 'hsla(' + ((frame * 10 + k * 70) % 360) + ',95%,60%,0.9)');
        lg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.strokeStyle = lg; ctx.lineWidth = 14;
        ctx.beginPath(); ctx.moveTo(W / 2, H / 2); ctx.lineTo(ex, ey); ctx.stroke();
      }
      ctx.restore();
    }

    for (let i = popups.length - 1; i >= 0; i--) {
      const p = popups[i]; p.life -= 0.014; p.y -= 1.2;
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.font = (p.big ? '800 27px' : '800 18px') + ' "M PLUS Rounded 1c"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 5;
      ctx.strokeText(p.txt, p.x, p.y);
      ctx.fillStyle = p.col; ctx.fillText(p.txt, p.x, p.y);
      ctx.globalAlpha = 1;
      if (p.life <= 0) popups.splice(i, 1);
    }

    if (cutIn) {
      cutIn.t += 0.022;
      const t = cutIn.t;
      const sc = t < 0.15 ? (t / 0.15) * 1.35 : (t < 0.27 ? 1.35 - (t - 0.15) * 2.9 : 1);
      const al = t > 0.8 ? (1 - t) / 0.2 : 1;
      ctx.save();
      ctx.globalAlpha = Math.max(al, 0) * 0.88;
      ctx.fillStyle = 'rgba(8,4,20,0.82)';
      ctx.fillRect(0, H / 2 - 86, W, 172);
      if (!RM) {
        ctx.globalAlpha = Math.max(al, 0) * 0.5;
        ctx.strokeStyle = cutIn.premium ? 'hsl(' + (frame * 12 % 360) + ',95%,60%)' : cutIn.col;
        ctx.lineWidth = 2;
        for (let k = 0; k < 28; k++) {
          const a = (k / 28) * 6.283 + frame * 0.02;
          ctx.beginPath();
          ctx.moveTo(W / 2 + Math.cos(a) * 70, H / 2 + Math.sin(a) * 70);
          ctx.lineTo(W / 2 + Math.cos(a) * 600, H / 2 + Math.sin(a) * 600);
          ctx.stroke();
        }
      }
      ctx.globalAlpha = Math.max(al, 0);
      ctx.translate(W / 2, H / 2);
      ctx.scale(sc, sc);
      if (cutIn.premium && !RM) ctx.rotate(Math.sin(frame / 2) * 0.03);
      ctx.font = '800 46px "M PLUS Rounded 1c"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 9;
      ctx.strokeText(cutIn.txt, 0, cutIn.sub ? -16 : 0);
      ctx.fillStyle = cutIn.premium ? 'hsl(' + (frame * 14 % 360) + ',95%,62%)' : cutIn.col;
      ctx.fillText(cutIn.txt, 0, cutIn.sub ? -16 : 0);
      if (cutIn.sub) {
        ctx.font = '800 20px "M PLUS Rounded 1c"';
        ctx.fillStyle = '#fff'; ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.strokeText(cutIn.sub, 0, 30); ctx.fillText(cutIn.sub, 0, 30);
      }
      ctx.restore();
      if (t >= 1) cutIn = null;
    }

    if (state === 'slot' && slot) {
      slot.t++;
      const silenceStart = slot.stops[2] - 20;
      if (slot.t === slot.stops[1] + 5) riser(1.15);
      if (slot.t < silenceStart && slot.t % 3 === 0) noise(0.03, 0.04);
      if (slot.t > slot.stops[1] && slot.t < silenceStart && slot.t % 20 === 0) tone(58, 0.2, 'sine', 0.13);
      if (slot.t === slot.stops[2] + 1) { flash = 1; flashCol = '#ffffff'; }
      ctx.fillStyle = 'rgba(8,4,20,0.9)';
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = '800 26px "M PLUS Rounded 1c"';
      ctx.fillStyle = slot.prize === 'jackpot' ? '#ffd700' : '#ff5a8a';
      ctx.fillText(slot.prize === 'jackpot' ? 'スイカ完成リーチ!!' : '激熱リーチ!?', W / 2, H / 2 - 130);
      if (slot.t > slot.stops[1] && slot.t < slot.stops[2]) {
        ctx.font = '800 18px "M PLUS Rounded 1c"';
        ctx.fillStyle = 'rgba(255,255,255,' + (0.4 + 0.6 * Math.abs(Math.sin(slot.t / 5))) + ')';
        ctx.fillText('くるか…!? くるか…!?', W / 2, H / 2 + 110);
      }
      const rw = 92, gap = 16, x0 = W / 2 - rw * 1.5 - gap;
      for (let k = 0; k < 3; k++) {
        const stopped = slot.t > slot.stops[k];
        const target = (k === 2 && !slot.win) ? 6 : 7;
        if (!stopped) slot.reels[k] = (slot.reels[k] + 0.4 + k * 0.1) % 10;
        else if (slot.reels[k] !== target) {
          slot.reels[k] = target;
          if (k === 2 && !slot.win) { tone(180, 0.5, 'sawtooth', 0.08, 70); }
          else { tone(700 + k * 200, 0.15, 'square', 0.1); }
          shake += RM ? 2 : 8;
        }
        const rx = x0 + k * (rw + gap);
        ctx.fillStyle = '#180d2c';
        ctx.beginPath(); ctx.roundRect(rx, H / 2 - 70, rw, 130, 10); ctx.fill();
        ctx.strokeStyle = stopped ? (target === 7 ? '#ffd700' : '#5a6478') : 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = stopped ? (target === 7 ? '#ffd700' : '#8a93a8') : '#fff';
        ctx.font = '800 64px "DotGothic16"';
        const n = stopped ? target : Math.floor(slot.reels[k]);
        ctx.fillText(String(n), rx + rw / 2, H / 2 - 4 + (stopped ? 0 : Math.sin(slot.t * 2 + k) * 6));
      }
      if (slot.t > silenceStart && slot.t <= slot.stops[2]) {
        const ba = Math.min(1, (slot.t - silenceStart) / 6);
        ctx.fillStyle = 'rgba(0,0,0,' + (0.97 * ba).toFixed(3) + ')';
        ctx.fillRect(0, 0, W, H);
      }
      if (slot.t > slot.stops[2] + 25 && !slot.done) {
        slot.done = true;
        if (slot.prize === 'jackpot') {
          showCut('大当たり!!!', '#ffd700', NAME[10] + '誕生!', true);
          jackpotRain();
          launchFireworks(6);
          spawnKanji();
          spawnDanmaku(5, true);
          laserT = RM ? 0 : 70;
          spinT = RM ? 0 : 30;
          chroma = RM ? 0 : 8;
          fanfare(); setTimeout(fanfare, 450); setTimeout(() => arp([784, 988, 1175, 1568, 1976], 70), 900);
          for (let i = 0; i < 12; i++) setTimeout(() => tone(1400 + Math.random() * 1200, 0.25, 'sine', 0.04), 600 + i * 110);
          shake = RM ? 8 : 26; flash = 0.7; flashCol = '#ffd700'; punch = RM ? 0.03 : 0.1;
          gauge = GAUGE_MAX;
        } else if (slot.win) {
          score += 77700;
          gauge = Math.min(GAUGE_MAX, gauge + 80);
          showCut('チャンス目!!', '#ffd700', '+77,700 & 金保留GET');
          if (cur) cur.aura = Math.max(cur.aura, 4);
          fanfare(); launchFireworks(2); spawnDanmaku(3, true);
          flash = 0.4; flashCol = '#ffd700';
          shake = RM ? 4 : 14;
          pulse($('scoreVal'));
        } else {
          showCut('おしい…!', '#9aa6b8', '次に期待');
          tone(330, 0.45, 'sine', 0.07, 110);
        }
      }
      if (slot.t > slot.stops[2] + 70) { slot = null; state = 'play'; }
    }

    if (vignettePulse > 0) {
      const vg = ctx.createRadialGradient(W / 2, H / 2, H / 3, W / 2, H / 2, H / 1.1);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, 'rgba(255,60,120,' + 0.45 * vignettePulse + ')');
      ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
      vignettePulse -= 0.03;
    }
    if (flash > 0) {
      ctx.globalAlpha = flash; ctx.fillStyle = flashCol;
      ctx.fillRect(0, 0, W, H); ctx.globalAlpha = 1;
      flash -= 0.04;
    }
    if (invertT > 0) {
      ctx.save();
      ctx.globalCompositeOperation = 'difference';
      ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
      ctx.restore();
      invertT -= 0.05;
    }

    if (state === 'title') {
      ctx.fillStyle = 'rgba(8,4,20,0.78)';
      ctx.beginPath(); ctx.roundRect(0, 0, W, H, 12); ctx.fill();
      ctx.textAlign = 'center';
      ctx.font = '800 40px "M PLUS Rounded 1c"';
      ctx.fillStyle = 'hsl(' + hue + ',90%,65%)';
      ctx.fillText('スイカ★フィーバー', W / 2, H / 2 - 60);
      ctx.font = '800 18px "M PLUS Rounded 1c"';
      ctx.fillStyle = 'rgba(255,255,255,' + (0.5 + 0.5 * Math.sin(frame / 12)) + ')';
      ctx.fillText('タップしてスタート', W / 2, H / 2 + 10);
      ctx.font = '400 13px "M PLUS Rounded 1c"';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillText('音が出ます(右下のボタンでOFFにできます)', W / 2, H / 2 + 44);
    }

    if (state === 'over') {
      ctx.fillStyle = 'rgba(8,4,20,0.85)';
      ctx.beginPath(); ctx.roundRect(0, 0, W, H, 12); ctx.fill();
      ctx.textAlign = 'center';
      ctx.font = '800 42px "M PLUS Rounded 1c"';
      ctx.fillStyle = '#ff5a8a';
      ctx.fillText('ゲームオーバー', W / 2, H / 2 - 60);
      ctx.font = '800 26px "DotGothic16"';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('SCORE  ' + score.toLocaleString(), W / 2, H / 2);
      ctx.font = '800 18px "M PLUS Rounded 1c"';
      ctx.fillStyle = '#5ad0ff';
      ctx.fillText('MAX COMBO  ' + maxCombo, W / 2, H / 2 + 40);
      ctx.font = '800 16px "M PLUS Rounded 1c"';
      ctx.fillStyle = 'rgba(255,255,255,' + (0.5 + 0.5 * Math.sin(frame / 12)) + ')';
      ctx.fillText('タップでリスタート', W / 2, H / 2 + 90);
    }
    ctx.restore();

    if (chroma > 0 && !RM) {
      chroma--;
      bctx.setTransform(1, 0, 0, 1, 0, 0);
      bctx.clearRect(0, 0, buf.width, buf.height);
      bctx.drawImage(cv, 0, 0);
      const off = (chroma + 2) * 1.5 * dpr;
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.28;
      ctx.drawImage(buf, off, 0);
      ctx.drawImage(buf, -off, 0);
      ctx.restore();
    }
  }

  function loop() {
    if (state === 'play' || state === 'slot') {
      if (freezeF > 0) { freezeF--; } else { physics(); }
      if (state === 'play') checkOver();
      if (autoDrop && state === 'play' && canDrop && performance.now() - lastDropAt > 300) drop();
      if (performance.now() < stormEnd && frame % 9 === 0) {
        bolt(WALL + 40 + Math.random() * (W - 2 * WALL - 80), TOP + Math.random() * (H - TOP - 120));
        flash = Math.max(flash, RM ? 0.05 : 0.12);
      }
      if (rush && performance.now() > rushEnd) rush = false;
      if (rush && !RM && frame % 70 === 0) launchFireworks(1);
      if (danger > 0 && state === 'play' && (frame % 28 === 0 || frame % 28 === 7)) tone(55, 0.16, 'sine', 0.13);
      reachPair = null;
      if (state === 'play') {
        const bigs = fruits.filter(f => f.t >= 7 && f.t < 10);
        let bt = 6;
        for (let i = 0; i < bigs.length; i++) for (let j = i + 1; j < bigs.length; j++) {
          const a = bigs[i], b = bigs[j];
          if (a.t === b.t && a.t > bt && Math.hypot(b.x - a.x, b.y - a.y) < a.r + b.r + 50) { bt = a.t; reachPair = [a, b]; }
        }
      }
      if (reachPair) {
        reachT++;
        if (reachT === 1) popup((reachPair[0].x + reachPair[1].x) / 2, (reachPair[0].y + reachPair[1].y) / 2 - 40, '接近!!', true, '#ff5a8a');
        const iv = Math.max(10, 26 - Math.floor(reachT / 25));
        if (reachT % iv === 0) tone(52 + reachPair[0].t * 3, 0.15, 'sine', 0.12);
      } else reachT = 0;
      if (fever && performance.now() > feverEnd) {
        fever = false; rush = false; gauge = 0; combo = 0;
        document.getElementById('frame').classList.remove('feverframe');
      }
    }
    dispScore += (score - dispScore) * 0.18;
    if (Math.abs(score - dispScore) < 1) dispScore = score;
    $('scoreVal').textContent = Math.round(dispScore).toLocaleString();
    drawScene();
    requestAnimationFrame(loop);
  }

  function reset() {
    fruits = []; particles = []; lightnings = []; popups = []; confetti = []; coins = []; trails = []; rockets = []; kanjis = [];
    score = 0; dispScore = 0; combo = 0; maxCombo = 0; gauge = 0;
    fever = false; cutIn = null; slot = null; danger = 0;
    slowmo = 0; stormEnd = 0; laserT = 0; lastDropAt = performance.now();
    rush = false; rushEnd = 0; freezeF = 0; spinT = 0; chroma = 0; danmaku = [];
    reachPair = null; reachT = 0; flock = []; flockArmed = false;
    cur = newHand(); nxt = newHand();
    canDrop = true; state = 'play';
    document.getElementById('frame').classList.remove('feverframe');
    $('scoreVal').textContent = '0'; $('comboVal').textContent = '0';
  }

  function px(e) {
    const r = cv.getBoundingClientRect();
    return (e.clientX - r.left) * (W / r.width);
  }
  function aim(e) {
    if (cur) dropX = Math.max(WALL + R[cur.t], Math.min(W - WALL - R[cur.t], px(e)));
  }
  function drop() {
    if (state !== 'play' || !canDrop) return;
    canDrop = false;
    lastDropAt = performance.now();
    spawn(dropX, 78, cur.t, 0, 1.5, cur.aura);
    tone(220 + cur.t * 40, 0.08, 'sine', 0.05);
    if (cur.aura >= 4) { popup(dropX, 120, AURA_NAME[cur.aura] + '降臨!', true, '#ffd700'); tone(880, 0.3, 'triangle', 0.07, 1760); }
    cur = nxt; nxt = newHand();
    if (nxt.aura === 5) tone(1200, 0.4, 'sine', 0.05, 2400);
    if (!flockArmed && flock.length === 0 && Math.random() < 0.025) {
      flockArmed = true;
      for (let i = 0; i < 12; i++) flock.push({ x: -30 - Math.random() * 140, y: 190 + Math.random() * 140, vx: 5 + Math.random() * 2.5, wob: Math.random() * 6.28 });
      for (let i = 0; i < 8; i++) setTimeout(() => tone(900 + i * 70, 0.06, 'sine', 0.04), i * 45);
      nxt.aura = Math.max(nxt.aura, 4);
      showCut('群予告!!', '#ffd700', '金保留確定!!');
      setTimeout(() => { flockArmed = false; }, 2500);
    }
    setTimeout(() => { canDrop = true; }, 250);
  }
  let aiming = false;
  cv.addEventListener('pointermove', e => { aim(e); });
  cv.addEventListener('pointerdown', e => {
    e.preventDefault();
    audio();
    if (state === 'title' || state === 'over') { reset(); tone(660, 0.15, 'square', 0.06); return; }
    if (state !== 'play') return;
    aiming = true;
    try { cv.setPointerCapture(e.pointerId); } catch (err) {}
    aim(e);
  });
  cv.addEventListener('pointerup', e => {
    if (!aiming) return;
    aiming = false;
    aim(e);
    drop();
  });
  cv.addEventListener('pointercancel', () => { aiming = false; });
  cv.addEventListener('contextmenu', e => e.preventDefault());
  $('restartBtn').addEventListener('click', () => { audio(); reset(); });
  $('autoBtn').addEventListener('click', () => {
    autoDrop = !autoDrop;
    $('autoBtn').textContent = autoDrop ? 'オート落下 ON' : 'オート落下 OFF';
    if (autoDrop) lastDropAt = performance.now();
  });
  $('muteBtn').addEventListener('click', () => {
    muted = !muted;
    $('muteBtn').textContent = muted ? 'サウンド OFF' : 'サウンド ON';
    if (!muted) audio();
  });

  cur = newHand(); nxt = newHand();
  loop();
})();
</script>
</body>
</html>
