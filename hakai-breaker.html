<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>HAKAI — 壊して、強くなれ。</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f1d;
    --surface: #171a2e;
    --surface-2: #1f2340;
    --line: #2a2f52;
    --text: #eef1ff;
    --muted: #8a91b4;
    --accent: #ffd166;
    --danger: #ff5d73;
    --cyan: #7ef9ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Zen Kaku Gothic New", sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  .wrap {
    width: min(100vw, calc((100dvh - 86px) / 1.524), 460px);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: 100%;
    justify-content: center;
  }
  /* ---------- HUD ---------- */
  .hud {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 6px 8px;
  }
  .stat {
    font-family: "Space Mono", monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    line-height: 1.2;
  }
  .stat b {
    display: block;
    font-size: 1rem;
    color: var(--text);
  }
  .stat.grow { flex: 1; }
  .stat .accent { color: var(--accent); }
  #speedBtn {
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--cyan);
    font-family: "Space Mono", monospace;
    font-weight: 700;
    font-size: 0.85rem;
    border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    touch-action: manipulation;
  }
  #speedBtn:active { transform: scale(0.94); }
  /* ---------- stage ---------- */
  .stage {
    position: relative;
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--line);
    background: var(--surface);
  }
  canvas {
    display: block;
    width: 100%;
    height: auto;
    touch-action: none;
  }
  /* ---------- overlays ---------- */
  .ov {
    position: absolute;
    inset: 0;
    background: rgba(13, 15, 29, 0.86);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 24px;
    text-align: center;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .ov.show { opacity: 1; pointer-events: auto; }
  .logo {
    font-family: "Bungee", cursive;
    font-size: 3rem;
    line-height: 1;
  }
  .logo span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 0.9rem; }
  .rules {
    text-align: left;
    color: var(--muted);
    font-size: 0.82rem;
    line-height: 2;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 18px;
  }
  .rules b { color: var(--text); }
  .btn {
    background: var(--accent);
    color: #1c1500;
    border: none;
    border-radius: 999px;
    font-family: "Zen Kaku Gothic New", sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    padding: 14px 44px;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.12s, filter 0.12s;
  }
  .btn:active { transform: scale(0.95); }
  .big-title {
    font-family: "Bungee", cursive;
    font-size: 2rem;
    color: var(--danger);
  }
  .result {
    font-family: "Space Mono", monospace;
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 2;
  }
  .result b { color: var(--text); font-size: 1.3rem; }
  .record {
    font-family: "Bungee", cursive;
    color: var(--accent);
    font-size: 1rem;
    animation: blink 0.8s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0.25; } }
  /* ---------- upgrade cards ---------- */
  .up-title {
    font-family: "Bungee", cursive;
    font-size: 1.3rem;
    color: var(--cyan);
  }
  .cards { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
  .ucard {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    cursor: pointer;
    color: var(--text);
    font-family: inherit;
    text-align: left;
    transition: transform 0.12s, border-color 0.12s;
    touch-action: manipulation;
    animation: rise 0.3s ease both;
  }
  .ucard:nth-child(2) { animation-delay: 0.07s; }
  .ucard:nth-child(3) { animation-delay: 0.14s; }
  @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; } }
  .ucard:active { transform: scale(0.97); }
  .ucard:hover { border-color: var(--accent); }
  .ucard .ic { font-size: 1.7rem; flex-shrink: 0; }
  .ucard .nm { font-weight: 700; font-size: 0.95rem; }
  .ucard .nm small {
    font-family: "Space Mono", monospace;
    color: var(--accent);
    font-size: 0.65rem;
    margin-left: 6px;
  }
  .ucard .ds { color: var(--muted); font-size: 0.78rem; margin-top: 2px; }
  @media (prefers-reduced-motion: reduce) {
    .ucard, .record { animation: none !important; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="hud">
    <div class="stat">WAVE<b id="hWave">1</b></div>
    <div class="stat grow">SCORE<b id="hScore">0</b></div>
    <div class="stat">BEST<b id="hBest" class="accent">0</b></div>
    <button id="speedBtn" aria-label="ゲーム速度切り替え">&times;1</button>
  </div>

  <div class="stage">
    <canvas id="cv" width="840" height="1280" aria-label="ゲーム画面"></canvas>

    <div class="ov show" id="startOv">
      <div class="logo">HA<span>KAI</span></div>
      <div class="sub">壊して、強くなれ。ブロック崩し&times;ローグライト</div>
      <div class="rules">
        <b>ドラッグ</b>で狙いを定めて、<b>離して発射</b><br>
        ボールは壁とブロックで跳ね返る<br>
        <b style="color:var(--cyan)">+1</b> を拾うとボールが増える<br>
        5ウェーブごとに<b style="color:var(--accent)">強化</b>を1つ選択<br>
        ブロックが下のラインに届いたら終了
      </div>
      <button class="btn" id="startBtn">スタート</button>
    </div>

    <div class="ov" id="upOv">
      <div class="up-title">POWER UP</div>
      <div class="sub">強化を1つ選んでください</div>
      <div class="cards" id="cards"></div>
    </div>

    <div class="ov" id="overOv">
      <div class="big-title">GAME OVER</div>
      <div class="record" id="recordBadge" style="display:none">NEW RECORD!</div>
      <div class="result" id="resultText"></div>
      <button class="btn" id="retryBtn">もう一度</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";
  const $ = id => document.getElementById(id);
  const cv = $("cv"), ctx = cv.getContext("2d");
  const DPR = 2; // canvas属性は840x1280(=2x)固定
  ctx.scale(DPR, DPR);

  /* ---------- 定数 ---------- */
  const W = 420, H = 640;
  const COLS = 7, CELL = 60, TOP = 10;
  const DANGER_ROW = 9;                 // この行に到達したらゲームオーバー
  const DANGER_Y = TOP + DANGER_ROW * CELL;
  const LAUNCH_Y = 602;
  const BALL_R = 7;
  const SPEED = 820;                    // px/s
  const FIRE_INTERVAL = 0.055;
  const MAX_BALLS = 99;

  /* ---------- audio (iOS消音スイッチ対策込み) ---------- */
  let AC = null, muted = false;
  function audio() {
    if (!AC) {
      try {
        AC = new (window.AudioContext || window.webkitAudioContext)();
        AC.onstatechange = () => { if (AC.state !== "running" && !document.hidden) { try { AC.resume(); } catch (e) {} } };
      } catch (e) {}
    }
    if (AC && AC.state !== "running") { try { AC.resume(); } catch (e) {} }
    return AC;
  }
  let silentEl = null;
  function silentWavUrl() {
    const sr = 8000, n = 800, buf = new ArrayBuffer(44 + n), v = new DataView(buf);
    const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
    str(0, "RIFF"); v.setUint32(4, 36 + n, true); str(8, "WAVE");
    str(12, "fmt "); v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
    v.setUint32(24, sr, true); v.setUint32(28, sr, true); v.setUint16(32, 1, true); v.setUint16(34, 8, true);
    str(36, "data"); v.setUint32(40, n, true);
    for (let i = 0; i < n; i++) v.setUint8(44 + i, 0x80);
    return URL.createObjectURL(new Blob([buf], { type: "audio/wav" }));
  }
  function unlockAudio() {
    if (!silentEl) {
      silentEl = document.createElement("audio");
      silentEl.setAttribute("playsinline", "");
      silentEl.loop = true;
      silentEl.volume = 0.01;
      silentEl.src = silentWavUrl();
    }
    const p = silentEl.play();
    if (p && p.catch) p.catch(() => {});
    audio();
    if (!AC) return;
    const done = () => {
      if (AC.state === "running") {
        ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.removeEventListener(ev, unlockAudio, true));
      }
    };
    try { AC.resume().then(done); } catch (e) { done(); }
  }
  ["pointerdown", "pointerup", "touchend", "click"].forEach(ev => document.addEventListener(ev, unlockAudio, true));
  document.addEventListener("visibilitychange", () => { if (!document.hidden) audio(); });

  function tone(f, d, type, vol, slideTo) {
    if (muted || !audio()) return;
    try {
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = type || "sine"; o.frequency.value = f;
      if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, AC.currentTime + d);
      g.gain.value = vol || 0.06;
      g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime + d);
      o.connect(g); g.connect(AC.destination);
      o.start(); o.stop(AC.currentTime + d);
    } catch (e) {}
  }
  function noise(d, vol) {
    if (muted || !audio()) return;
    try {
      const n = Math.floor(AC.sampleRate * d);
      const buf = AC.createBuffer(1, n, AC.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < n; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / n);
      const src = AC.createBufferSource(); src.buffer = buf;
      const g = AC.createGain(); g.gain.value = vol || 0.08;
      src.connect(g); g.connect(AC.destination); src.start();
    } catch (e) {}
  }
  const sHit = c => tone(Math.min(220 + c * 14, 1300), 0.045, "square", 0.025);
  const sBreak = () => { noise(0.07, 0.07); tone(95, 0.12, "sawtooth", 0.05); };
  const sGem = () => { tone(880, 0.07, "sine", 0.06); setTimeout(() => tone(1320, 0.09, "sine", 0.05), 60); };
  const sCrit = () => tone(1500, 0.08, "square", 0.045);
  const sExpl = () => { noise(0.16, 0.12); tone(70, 0.22, "sawtooth", 0.07); };
  const sLaunch = () => tone(340, 0.05, "triangle", 0.03);
  const sUpOpen = () => [523, 659, 784].forEach((f, i) => setTimeout(() => tone(f, 0.2, "square", 0.04), i * 70));
  const sUpPick = () => [659, 880, 1319].forEach((f, i) => setTimeout(() => tone(f, 0.22, "square", 0.05), i * 70));
  const sOver = () => [392, 311, 233, 156].forEach((f, i) => setTimeout(() => tone(f, 0.3, "sawtooth", 0.05), i * 160));
  const vibe = ms => { try { navigator.vibrate && navigator.vibrate(ms); } catch (e) {} };

  /* ---------- 永続化 ---------- */
  const store = {
    load(k, fb) { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch { return fb; } },
    save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
  };
  let best = store.load("hakai_best", { score: 0, wave: 0 });

  /* ---------- 状態 ---------- */
  // state: start | aim | flight | shift | upgrade | over
  // ※メインループはスタート前から回るため、全て宣言時に初期化しておく
  let state = "start";
  let wave = 1, score = 0, balls = 3, dmg = 1;
  let critL = 0, explL = 0, pierceL = 0, wreckL = 0;
  let blocks = [], gems = [], flying = [], particles = [], floats = [];
  let launchX = W / 2, aimDir = null, aiming = false, pointerMoved = false;
  let toFire = 0, fireTimer = 0, firstLand = null, collected = 0;
  let combo = 0, flightTime = 0, shiftT = 1, shake = 0, hasFired = false;
  let speedBase = 1;
  let pendingUpgrade = false;

  function init() {
    wave = 1; score = 0; balls = 3; dmg = 1;
    critL = 0; explL = 0; pierceL = 0; wreckL = 0;
    blocks = []; gems = []; flying = []; particles = []; floats = [];
    launchX = W / 2; aimDir = null; aiming = false;
    toFire = 0; fireTimer = 0; firstLand = null; collected = 0;
    combo = 0; flightTime = 0; shiftT = 1; shake = 0; hasFired = false;
    pendingUpgrade = false;
    spawnRow();
    state = "aim";
    syncHud();
  }

  function syncHud() {
    $("hWave").textContent = wave;
    $("hScore").textContent = score;
    $("hBest").textContent = best.score;
  }

  /* ---------- ブロック生成 ---------- */
  function blockAt(col, row) {
    return blocks.find(b => b.col === col && b.row === row);
  }
  function spawnRow() {
    const cols = [0, 1, 2, 3, 4, 5, 6];
    // 1マスはジェム(+1ボール)用に確保
    const gemCol = cols.splice(Math.floor(Math.random() * cols.length), 1)[0];
    gems.push({ col: gemCol, row: 0 });
    let placed = 0;
    cols.forEach(c => {
      if (Math.random() < 0.52) {
        const heavy = Math.random() < 0.15;
        const hp = Math.max(1, Math.ceil(wave * (0.7 + Math.random() * 0.5))) * (heavy ? 2 : 1);
        blocks.push({ col: c, row: 0, hp, max: hp, flash: 0 });
        placed++;
      }
    });
    // 最低2個は保証
    while (placed < 2 && cols.length) {
      const c = cols.splice(Math.floor(Math.random() * cols.length), 1)[0];
      if (!blockAt(c, 0)) {
        const hp = Math.max(1, Math.ceil(wave * 0.8));
        blocks.push({ col: c, row: 0, hp, max: hp, flash: 0 });
        placed++;
      }
    }
  }

  /* ---------- ダメージ / 破壊 ---------- */
  function blockRect(b) {
    return { x: b.col * CELL + 3, y: TOP + b.row * CELL + 3, w: CELL - 6, h: CELL - 6 };
  }
  function damageBlock(b, amount, fromExpl) {
    if (!blocks.includes(b)) return;
    b.hp -= amount;
    b.flash = 1;
    if (b.hp <= 0) destroyBlock(b, fromExpl);
  }
  function destroyBlock(b, fromExpl) {
    const idx = blocks.indexOf(b);
    if (idx < 0) return;
    blocks.splice(idx, 1);
    combo++;
    const pts = b.max * 10;
    score += pts;
    const r = blockRect(b);
    const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
    burst(cx, cy, blockHue(b), fromExpl ? 22 : 14);
    floats.push({ x: cx, y: cy, txt: "+" + pts, life: 1, color: "#ffd166" });
    shake = Math.min(shake + (fromExpl ? 5 : 2.5), 10);
    sBreak();
    vibe(8);
    syncHud();
    // 爆裂弾: 周囲8方向に連鎖ダメージ
    if (explL > 0) {
      if (!fromExpl) sExpl();
      for (let dc = -1; dc <= 1; dc++) for (let dr = -1; dr <= 1; dr++) {
        if (!dc && !dr) continue;
        const n = blockAt(b.col + dc, b.row + dr);
        if (n) damageBlock(n, explL, true);
      }
    }
  }
  function blockHue(b) {
    const t = Math.min(b.max / Math.max(wave, 1), 2.2);
    return Math.max(10, 170 - t * 75); // 170(緑) -> 10(赤) ※heavyはさらに低く
  }

  /* ---------- パーティクル ---------- */
  function burst(x, y, hue, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * 6.283, s = 60 + Math.random() * 240;
      particles.push({
        x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60,
        life: 0.5 + Math.random() * 0.4,
        max: 0.9,
        color: `hsl(${hue + Math.random() * 30 - 15}, 90%, ${55 + Math.random() * 25}%)`,
        size: 2 + Math.random() * 3.5
      });
    }
    if (particles.length > 400) particles.splice(0, particles.length - 400);
  }

  /* ---------- 発射 / 弾の物理 ---------- */
  function fire() {
    if (!aimDir) return;
    state = "flight";
    toFire = balls;
    fireTimer = 0;
    firstLand = null;
    collected = 0;
    combo = 0;
    flightTime = 0;
    hasFired = true;
    sLaunch();
  }

  function stepFlight(dt) {
    flightTime += dt;
    // 長引いたら自動加速
    const ts = speedBase + (flightTime > 6 ? Math.min(2, (flightTime - 6) / 3) : 0);
    const sdt = dt * ts;

    fireTimer -= sdt;
    while (fireTimer <= 0 && toFire > 0) {
      flying.push({ x: launchX, y: LAUNCH_Y, ux: aimDir.x, uy: aimDir.y, active: true, ignore: null });
      toFire--;
      fireTimer += FIRE_INTERVAL;
    }

    const move = SPEED * sdt;
    flying.forEach(b => {
      if (!b.active) return;
      let remaining = move;
      while (remaining > 0) {
        const step = Math.min(5, remaining);
        remaining -= step;
        b.x += b.ux * step;
        b.y += b.uy * step;
        // 壁
        if (b.x < BALL_R) { b.x = BALL_R; b.ux = -b.ux; nudge(b); }
        else if (b.x > W - BALL_R) { b.x = W - BALL_R; b.ux = -b.ux; nudge(b); }
        if (b.y < BALL_R) { b.y = BALL_R; b.uy = Math.abs(b.uy); nudge(b); }
        // 着地
        if (b.y > LAUNCH_Y) {
          b.active = false;
          if (firstLand === null) firstLand = Math.max(BALL_R + 8, Math.min(W - BALL_R - 8, b.x));
          break;
        }
        collideBlocks(b);
        collideGems(b);
        if (!b.active) break;
      }
    });

    if (toFire === 0 && flying.every(b => !b.active)) {
      flying = [];
      endShot();
    }
  }

  // 水平往復のスタック防止: 跳ね返り時に角度が浅すぎたら補正
  function nudge(b) {
    if (Math.abs(b.uy) < 0.09) {
      b.uy = (b.uy === 0 ? -1 : Math.sign(b.uy)) * 0.12;
      const len = Math.hypot(b.ux, b.uy);
      b.ux /= len; b.uy /= len;
    }
  }

  function collideBlocks(b) {
    const col = Math.floor(b.x / CELL), row = Math.floor((b.y - TOP) / CELL);
    for (let dc = -1; dc <= 1; dc++) for (let dr = -1; dr <= 1; dr++) {
      const blk = blockAt(col + dc, row + dr);
      if (!blk) continue;
      const r = blockRect(blk);
      const cx = Math.max(r.x, Math.min(b.x, r.x + r.w));
      const cy = Math.max(r.y, Math.min(b.y, r.y + r.h));
      const dx = b.x - cx, dy = b.y - cy;
      const d2 = dx * dx + dy * dy;
      if (d2 >= BALL_R * BALL_R) {
        if (b.ignore === blk) b.ignore = null;
        continue;
      }
      if (b.ignore === blk) continue; // 貫通中のブロックは抜けるまで無視

      // ダメージ
      const crit = critL > 0 && Math.random() < critL * 0.15;
      const amount = crit ? dmg * 3 : dmg;
      if (crit) {
        sCrit();
        floats.push({ x: b.x, y: b.y - 12, txt: "CRIT!", life: 0.8, color: "#7ef9ff" });
      } else {
        sHit(combo);
      }
      damageBlock(blk, amount, false);

      // 貫通判定
      const pierce = pierceL > 0 && Math.random() < Math.min(pierceL * 0.2, 0.8);
      if (pierce && blocks.includes(blk)) {
        b.ignore = blk;
        return;
      }
      if (!blocks.includes(blk)) return; // 破壊済みならそのまま直進

      // 反射
      if (Math.abs(dx) > Math.abs(dy)) {
        b.ux = Math.sign(dx || 1) * Math.abs(b.ux);
        b.x = cx + Math.sign(dx || 1) * (BALL_R + 0.5);
      } else {
        b.uy = Math.sign(dy || -1) * Math.abs(b.uy);
        b.y = cy + Math.sign(dy || -1) * (BALL_R + 0.5);
      }
      nudge(b);
      return;
    }
  }

  function collideGems(b) {
    for (let i = gems.length - 1; i >= 0; i--) {
      const g = gems[i];
      const gx = g.col * CELL + CELL / 2, gy = TOP + g.row * CELL + CELL / 2;
      const d = Math.hypot(b.x - gx, b.y - gy);
      if (d < BALL_R + 13) {
        gems.splice(i, 1);
        collected++;
        sGem();
        burst(gx, gy, 185, 10);
        floats.push({ x: gx, y: gy, txt: "+1 BALL", life: 1, color: "#7ef9ff" });
      }
    }
  }

  function endShot() {
    if (firstLand !== null) launchX = firstLand;
    balls = Math.min(MAX_BALLS, balls + collected);
    collected = 0;
    beginShift();
  }

  /* ---------- ウェーブ進行 ---------- */
  function beginShift() {
    wave++;
    blocks.forEach(b => b.row++);
    gems.forEach(g => g.row++);
    spawnRow();
    shiftT = 0;
    state = "shift";
    pendingUpgrade = (wave - 1) % 5 === 0;
    syncHud();
  }

  function finishShift() {
    // 下まで来たジェムは自動回収
    for (let i = gems.length - 1; i >= 0; i--) {
      if (gems[i].row >= DANGER_ROW - 1) {
        const g = gems.splice(i, 1)[0];
        balls = Math.min(MAX_BALLS, balls + 1);
        const gx = g.col * CELL + CELL / 2, gy = TOP + g.row * CELL + CELL / 2;
        floats.push({ x: gx, y: gy, txt: "+1 BALL", life: 1, color: "#7ef9ff" });
        sGem();
      }
    }
    // 粉砕: ウェーブ開始時にランダム破壊
    for (let i = 0; i < wreckL; i++) {
      if (!blocks.length) break;
      const b = blocks[Math.floor(Math.random() * blocks.length)];
      destroyBlock(b, true);
    }
    // ゲームオーバー判定
    if (blocks.some(b => b.row >= DANGER_ROW)) { gameOver(); return; }
    if (pendingUpgrade) { showUpgrades(); return; }
    state = "aim";
  }

  /* ---------- 強化 ---------- */
  const UPGRADES = [
    { id: "ball",   icon: "🟡", name: "マルチボール", desc: "ボールが2個増える", f: () => { balls = Math.min(MAX_BALLS, balls + 2); }, lv: () => "" },
    { id: "dmg",    icon: "💥", name: "パワーアップ", desc: "ボールの威力 +1", f: () => dmg++, lv: () => "Lv" + dmg },
    { id: "crit",   icon: "✨", name: "会心の一撃", desc: "15%の確率で3倍ダメージ(重複可)", f: () => critL++, lv: () => critL ? "Lv" + critL : "" },
    { id: "expl",   icon: "🧨", name: "爆裂弾", desc: "破壊時、周囲8マスに爆発ダメージ", f: () => explL++, lv: () => explL ? "Lv" + explL : "" },
    { id: "pierce", icon: "🪡", name: "貫通", desc: "20%の確率でブロックを貫通(重複可)", f: () => pierceL++, lv: () => pierceL ? "Lv" + pierceL : "" },
    { id: "wreck",  icon: "🔨", name: "粉砕", desc: "毎ウェーブ開始時にブロック1個を自動破壊", f: () => wreckL++, lv: () => wreckL ? "Lv" + wreckL : "" }
  ];
  function showUpgrades() {
    state = "upgrade";
    const pool = UPGRADES.slice();
    const picks = [];
    while (picks.length < 3 && pool.length) {
      picks.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
    }
    const wrap = $("cards");
    wrap.innerHTML = "";
    picks.forEach(u => {
      const btn = document.createElement("button");
      btn.className = "ucard";
      btn.innerHTML = `<span class="ic">${u.icon}</span><span><span class="nm">${u.name}<small>${u.lv()}</small></span><div class="ds">${u.desc}</div></span>`;
      btn.addEventListener("click", () => {
        u.f();
        sUpPick();
        $("upOv").classList.remove("show");
        state = "aim";
        syncHud();
      });
      wrap.appendChild(btn);
    });
    sUpOpen();
    $("upOv").classList.add("show");
  }

  /* ---------- ゲームオーバー ---------- */
  function gameOver() {
    state = "over";
    sOver();
    vibe([30, 60, 30]);
    const isRecord = score > best.score;
    if (isRecord) {
      best = { score, wave };
      store.save("hakai_best", best);
    }
    $("recordBadge").style.display = isRecord ? "" : "none";
    $("resultText").innerHTML =
      `SCORE <b>${score}</b><br>WAVE ${wave} まで到達<br>BEST ${best.score} / WAVE ${best.wave}`;
    $("overOv").classList.add("show");
    syncHud();
  }

  /* ---------- 入力 ---------- */
  function toLogical(e) {
    const r = cv.getBoundingClientRect();
    return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
  }
  let downPos = null;
  cv.addEventListener("pointerdown", e => {
    e.preventDefault();
    if (state !== "aim") return;
    const p = toLogical(e);
    downPos = p;
    pointerMoved = false;
    aiming = true;
    updateAim(p);
    try { cv.setPointerCapture(e.pointerId); } catch (err) {}
  });
  cv.addEventListener("pointermove", e => {
    if (!aiming || state !== "aim") return;
    const p = toLogical(e);
    if (downPos && Math.hypot(p.x - downPos.x, p.y - downPos.y) > 8) pointerMoved = true;
    updateAim(p);
  });
  cv.addEventListener("pointerup", () => {
    if (!aiming) return;
    aiming = false;
    if (state === "aim" && aimDir && pointerMoved) fire();
    else aimDir = null;
  });
  cv.addEventListener("pointercancel", () => { aiming = false; aimDir = null; });
  cv.addEventListener("contextmenu", e => e.preventDefault());

  function updateAim(p) {
    let dx = p.x - launchX, dy = p.y - LAUNCH_Y;
    const len = Math.hypot(dx, dy);
    if (len < 14) { aimDir = null; return; }
    dx /= len; dy /= len;
    if (dy > -0.06) { // 上向き以外は無効(浅すぎる角度はクランプ)
      if (dy > 0.35) { aimDir = null; return; }
      dy = -0.06;
      const l2 = Math.hypot(dx, dy);
      dx /= l2; dy /= l2;
    }
    aimDir = { x: dx, y: dy };
  }

  $("speedBtn").addEventListener("click", () => {
    speedBase = speedBase >= 3 ? 1 : speedBase + 1;
    $("speedBtn").innerHTML = "&times;" + speedBase;
  });
  $("startBtn").addEventListener("click", () => {
    $("startOv").classList.remove("show");
    init();
  });
  $("retryBtn").addEventListener("click", () => {
    $("overOv").classList.remove("show");
    init();
  });

  /* ---------- 描画 ---------- */
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shake > 0.3) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }

    // 背景グリッド
    ctx.strokeStyle = "rgba(255,255,255,0.03)";
    ctx.lineWidth = 1;
    for (let c = 1; c < COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, DANGER_Y); ctx.stroke();
    }

    // デンジャーライン
    const nearDanger = blocks.some(b => b.row >= DANGER_ROW - 2);
    ctx.strokeStyle = nearDanger
      ? `rgba(255,93,115,${0.5 + Math.sin(performance.now() / 150) * 0.35})`
      : "rgba(255,93,115,0.25)";
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 8]);
    ctx.beginPath(); ctx.moveTo(0, DANGER_Y); ctx.lineTo(W, DANGER_Y); ctx.stroke();
    ctx.setLineDash([]);

    const yOff = state === "shift" ? -(1 - shiftT) * CELL : 0;

    // ジェム
    gems.forEach(g => {
      const x = g.col * CELL + CELL / 2, y = TOP + g.row * CELL + CELL / 2 + yOff;
      const pulse = 1 + Math.sin(performance.now() / 250 + g.col) * 0.08;
      ctx.strokeStyle = "#7ef9ff";
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(x, y, 13 * pulse, 0, 6.283); ctx.stroke();
      ctx.fillStyle = "#7ef9ff";
      ctx.font = '700 12px "Space Mono", monospace';
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("+1", x, y + 1);
    });

    // ブロック
    blocks.forEach(b => {
      const r = blockRect(b);
      const y = r.y + yOff;
      const hue = blockHue(b);
      const heavy = b.max > wave * 1.4;
      ctx.fillStyle = b.flash > 0
        ? `hsl(${hue}, 95%, ${72 + b.flash * 20}%)`
        : `hsl(${hue}, ${heavy ? 75 : 62}%, ${heavy ? 38 : 46}%)`;
      roundRect(r.x, y, r.w, r.h, 9);
      ctx.fill();
      ctx.strokeStyle = `hsla(${hue}, 90%, 70%, 0.5)`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.fillStyle = "rgba(10,12,24,0.85)";
      ctx.font = '700 17px "Space Mono", monospace';
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(b.hp, r.x + r.w / 2, y + r.h / 2 + 1);
      if (b.flash > 0) b.flash = Math.max(0, b.flash - 0.12);
    });

    // 弾道プレビュー
    if (state === "aim" && aiming && aimDir) {
      ctx.fillStyle = "rgba(255,209,102,0.9)";
      let x = launchX, y = LAUNCH_Y, dx = aimDir.x, dy = aimDir.y;
      let traveled = 0, maxLen = 999, dotGap = 0;
      while (traveled < maxLen) {
        x += dx * 6; y += dy * 6; traveled += 6; dotGap += 6;
        if (x < BALL_R) { x = BALL_R; dx = -dx; maxLen = Math.min(maxLen, traveled + 130); }
        if (x > W - BALL_R) { x = W - BALL_R; dx = -dx; maxLen = Math.min(maxLen, traveled + 130); }
        if (y < BALL_R) break;
        const col = Math.floor(x / CELL), row = Math.floor((y - TOP) / CELL);
        let hit = false;
        for (let dc = -1; dc <= 1 && !hit; dc++) for (let dr = -1; dr <= 1 && !hit; dr++) {
          const blk = blockAt(col + dc, row + dr);
          if (!blk) continue;
          const br = blockRect(blk);
          const cx = Math.max(br.x, Math.min(x, br.x + br.w));
          const cy = Math.max(br.y, Math.min(y, br.y + br.h));
          if ((x - cx) ** 2 + (y - cy) ** 2 < BALL_R * BALL_R) hit = true;
        }
        if (hit) break;
        if (dotGap >= 18) {
          dotGap = 0;
          ctx.beginPath(); ctx.arc(x, y, 3, 0, 6.283); ctx.fill();
        }
      }
    }

    // 弾
    flying.forEach(b => {
      if (!b.active) return;
      ctx.fillStyle = "rgba(126,249,255,0.25)";
      ctx.beginPath(); ctx.arc(b.x - b.ux * 8, b.y - b.uy * 8, BALL_R * 0.8, 0, 6.283); ctx.fill();
      ctx.fillStyle = "#eef9ff";
      ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, 6.283); ctx.fill();
    });

    // パーティクル
    particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life / p.max);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    });
    ctx.globalAlpha = 1;

    // フロートテキスト
    floats.forEach(f => {
      ctx.globalAlpha = Math.max(0, Math.min(1, f.life * 1.4));
      ctx.fillStyle = f.color;
      ctx.font = '700 14px "Space Mono", monospace';
      ctx.textAlign = "center";
      ctx.fillText(f.txt, f.x, f.y - (1 - f.life) * 36);
    });
    ctx.globalAlpha = 1;

    // ランチャー
    if (state !== "over" && state !== "start") {
      ctx.fillStyle = "#ffd166";
      ctx.beginPath(); ctx.arc(launchX, LAUNCH_Y, 9, 0, 6.283); ctx.fill();
      ctx.fillStyle = "#eef1ff";
      ctx.font = '700 13px "Space Mono", monospace';
      ctx.textAlign = "center";
      const shown = state === "flight" ? toFire + flying.filter(b => b.active).length : balls;
      ctx.fillText("×" + shown + (collected ? " +" + collected : ""), launchX, LAUNCH_Y + 26);
      // コンボ表示
      if (state === "flight" && combo >= 5) {
        ctx.fillStyle = "rgba(255,209,102,0.9)";
        ctx.font = '700 22px "Bungee", cursive';
        ctx.fillText(combo + " COMBO", W / 2, DANGER_Y + 40);
      }
      // 初回ヒント
      if (state === "aim" && !hasFired && !aiming) {
        ctx.fillStyle = "rgba(138,145,180," + (0.6 + Math.sin(performance.now() / 400) * 0.3) + ")";
        ctx.font = '500 15px "Zen Kaku Gothic New", sans-serif';
        ctx.fillText("ドラッグで狙って、離して発射", W / 2, LAUNCH_Y - 60);
      }
    }

    ctx.restore();
  }

  /* ---------- メインループ ---------- */
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;

    if (state === "flight") stepFlight(dt);
    if (state === "shift") {
      shiftT = Math.min(1, shiftT + dt * 5);
      if (shiftT >= 1) finishShift();
    }

    particles.forEach(p => {
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 500 * dt;
      p.life -= dt;
    });
    particles = particles.filter(p => p.life > 0);
    floats.forEach(f => { f.life -= dt * 1.1; });
    floats = floats.filter(f => f.life > 0);
    shake = Math.max(0, shake - dt * 22);

    draw();
    requestAnimationFrame(loop);
  }

  syncHud();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
